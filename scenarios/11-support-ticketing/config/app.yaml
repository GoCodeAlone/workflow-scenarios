modules:
    - name: server
      type: http.server
      config:
        address: ":8080"
    - name: router
      type: http.router
      dependsOn: [server]
    - name: db
      type: storage.sqlite
      config:
        dbPath: "/data/scenario.db"
        maxConnections: 5
        walMode: true
    - name: broker
      type: messaging.broker
      config:
        maxQueueSize: 1000
        deliveryTimeout: "30s"
workflows:
    http:
        router: router
        server: server
        routes: []
pipelines:
    health:
        trigger:
            type: http
            config:
                path: /healthz
                method: GET
        steps:
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    scenario: "11-support-ticketing"
    init-db:
        trigger:
            type: http
            config:
                path: /internal/init-db
                method: POST
        steps:
            - name: create_tickets_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS tickets (
                      id TEXT PRIMARY KEY,
                      subject TEXT NOT NULL,
                      description TEXT NOT NULL,
                      priority TEXT NOT NULL DEFAULT 'medium',
                      status TEXT NOT NULL DEFAULT 'open',
                      assigned_to TEXT,
                      created_at TEXT NOT NULL DEFAULT (datetime('now')),
                      updated_at TEXT NOT NULL DEFAULT (datetime('now'))
                    )
            - name: create_comments_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS ticket_comments (
                      id INTEGER PRIMARY KEY AUTOINCREMENT,
                      ticket_id TEXT NOT NULL,
                      author TEXT NOT NULL,
                      body TEXT NOT NULL,
                      created_at TEXT NOT NULL DEFAULT (datetime('now'))
                    )
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    message: database initialized
    create-ticket:
        trigger:
            type: http
            config:
                path: /api/v1/tickets
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: validate_ticket
              type: step.validate
              config:
                strategy: required_fields
                required_fields: [subject, description]
                source: "steps.parse_body.body"
            - name: gen_id
              type: step.set
              config:
                values:
                    ticket_id: "ticket-{{ uuidv4 }}"
            - name: set_priority
              type: step.set
              config:
                values:
                    priority: "{{ .body.priority | default \"medium\" }}"
            - name: insert_ticket
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO tickets (id, subject, description, priority, status, created_at, updated_at) VALUES (?, ?, ?, ?, 'open', datetime('now'), datetime('now'))"
                params:
                    - "{{ .ticket_id }}"
                    - "{{ .body.subject }}"
                    - "{{ .body.description }}"
                    - "{{ .priority }}"
            - name: check_priority_escalate
              type: step.conditional
              config:
                field: priority
                routes:
                    critical: log_escalation
                    high: log_escalation
                default: publish_created
            - name: log_escalation
              type: step.log
              config:
                level: warn
                message: "High/critical priority ticket created - auto-escalation flagged"
            - name: publish_created
              type: step.publish
              config:
                topic: "ticket-events"
                broker: broker
            - name: respond
              type: step.json_response
              config:
                status: 201
                body:
                    id: "{{ .ticket_id }}"
                    status: open
                    priority: "{{ .priority }}"
                    message: ticket created
    list-tickets:
        trigger:
            type: http
            config:
                path: /api/v1/tickets
                method: GET
        steps:
            - name: get_tickets
              type: step.db_query
              config:
                database: db
                query: "SELECT id, subject, priority, status, assigned_to, created_at FROM tickets ORDER BY created_at DESC LIMIT 100"
                mode: list
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.get_tickets.rows"
    get-ticket:
        trigger:
            type: http
            config:
                path: /api/v1/tickets/{id}
                method: GET
        steps:
            - name: fetch_db
              type: step.db_query
              config:
                database: db
                query: "SELECT id, subject, description, priority, status, assigned_to, created_at, updated_at FROM tickets WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_exists
              type: step.conditional
              config:
                field: steps.fetch_db.row.id
                routes:
                    "": not_found
                default: respond_db
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: ticket not found
            - name: respond_db
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch_db.row"
    assign-ticket:
        trigger:
            type: http
            config:
                path: /api/v1/tickets/{id}/assign
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: validate_assign
              type: step.validate
              config:
                strategy: required_fields
                required_fields: [agent]
                source: "steps.parse_body.body"
            - name: fetch_ticket
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM tickets WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_assignable
              type: step.conditional
              config:
                field: steps.fetch_ticket.row.status
                routes:
                    open: do_assign
                    assigned: do_assign
                    in_progress: do_assign
                    resolved: cannot_assign
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: ticket not found
            - name: cannot_assign
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot assign resolved ticket
            - name: do_assign
              type: step.db_exec
              config:
                database: db
                query: "UPDATE tickets SET status = 'assigned', assigned_to = ?, updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .body.agent }}"
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: assigned
                    assigned_to: "{{ .body.agent }}"
                    message: ticket assigned
    escalate-ticket:
        trigger:
            type: http
            config:
                path: /api/v1/tickets/{id}/escalate
                method: POST
        steps:
            - name: fetch_ticket
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status, priority FROM tickets WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_exists
              type: step.conditional
              config:
                field: steps.fetch_ticket.row.id
                routes:
                    "": not_found
                default: do_escalate
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: ticket not found
            - name: do_escalate
              type: step.db_exec
              config:
                database: db
                query: "UPDATE tickets SET priority = 'critical', updated_at = datetime('now') WHERE id = ? AND priority != 'critical'"
                params:
                    - "{{ .id }}"
            - name: publish_escalated
              type: step.publish
              config:
                topic: "ticket-escalations"
                broker: broker
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    priority: critical
                    message: ticket escalated to critical priority
    add-comment:
        trigger:
            type: http
            config:
                path: /api/v1/tickets/{id}/comment
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: validate_comment
              type: step.validate
              config:
                strategy: required_fields
                required_fields: [author, body]
                source: "steps.parse_body.body"
            - name: check_ticket
              type: step.db_query
              config:
                database: db
                query: "SELECT id FROM tickets WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_exists
              type: step.conditional
              config:
                field: steps.check_ticket.row.id
                routes:
                    "": not_found
                default: insert_comment
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: ticket not found
            - name: insert_comment
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO ticket_comments (ticket_id, author, body, created_at) VALUES (?, ?, ?, datetime('now'))"
                params:
                    - "{{ .id }}"
                    - "{{ .body.author }}"
                    - "{{ .body.body }}"
            - name: respond
              type: step.json_response
              config:
                status: 201
                body:
                    ticket_id: "{{ .id }}"
                    message: comment added
    resolve-ticket:
        trigger:
            type: http
            config:
                path: /api/v1/tickets/{id}/resolve
                method: POST
        steps:
            - name: fetch_ticket
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM tickets WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_ticket.row.status
                routes:
                    assigned: do_resolve
                    in_progress: do_resolve
                    open: cannot_resolve_unassigned
                    resolved: already_resolved
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: ticket not found
            - name: cannot_resolve_unassigned
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot resolve unassigned ticket — assign to an agent first
            - name: already_resolved
              type: step.json_response
              config:
                status: 409
                body:
                    error: ticket already resolved
            - name: do_resolve
              type: step.db_exec
              config:
                database: db
                query: "UPDATE tickets SET status = 'resolved', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: resolved
                    message: ticket resolved
    reopen-ticket:
        trigger:
            type: http
            config:
                path: /api/v1/tickets/{id}/reopen
                method: POST
        steps:
            - name: fetch_ticket
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM tickets WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_ticket.row.status
                routes:
                    resolved: do_reopen
                    open: already_open
                    assigned: already_open
                    in_progress: already_open
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: ticket not found
            - name: already_open
              type: step.json_response
              config:
                status: 409
                body:
                    error: ticket is not resolved
            - name: do_reopen
              type: step.db_exec
              config:
                database: db
                query: "UPDATE tickets SET status = 'open', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: open
                    message: ticket reopened
    ticket-event-log:
        steps:
            - name: log
              type: step.log
              config:
                level: info
                message: "Ticket event received"
triggers:
    event:
        subscriptions:
            - topic: "ticket-events"
              workflow: "pipeline:ticket-event-log"
              action: "log"
            - topic: "ticket-escalations"
              workflow: "pipeline:ticket-event-log"
              action: "log"
