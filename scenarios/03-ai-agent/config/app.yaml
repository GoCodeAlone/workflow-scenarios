# Scenario 03: AI Agent Platform
# Ratchet is pre-deployed; this config documents expected endpoints and settings.
# No workflow-server needed for this scenario — tests target ratchet directly.

ratchet:
  namespace: default
  service: ratchet
  port: 9090

# Test targets (ratchet uses workflow HTTP pipeline — no /api/v1 prefix)
endpoints:
  status: /api/status
  login: /api/auth/login
  providers: /api/providers
  agents: /api/agents
  tasks: /api/tasks
  # Auth: POST /api/auth/login with {"username":"admin","password":"admin"}
  # Returns Bearer token for protected routes
