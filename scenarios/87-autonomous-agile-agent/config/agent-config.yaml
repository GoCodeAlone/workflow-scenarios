# ============================================================
# Scenario 87 — Autonomous Agile Agent
#
# Architecture: Full autonomy. The agent audits the application,
# plans improvements, and iterates like an agile team. Each
# iteration produces a deployable increment committed to git.
# ============================================================

modules:
  - name: ratchet-db
    type: storage.sqlite
    config:
      dbPath: /data/agent-state.db
      walMode: true

  - name: ratchet-tool-policy-engine
    type: ratchet.tool_policy_engine
    config:
      default_policy: allow

  - name: server
    type: http.server
    config:
      address: ":8081"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: ai
    type: agent.provider
    config:
      provider: ollama
      model: gemma4:e2b
      base_url: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      max_tokens: 8192
      context_window: 16384

  - name: guardrails
    type: agent.guardrails
    config:
      defaults:
        enable_self_improvement: true
        enable_iac_modification: false
        require_human_approval: false
        require_diff_review: true
        max_iterations_per_cycle: 5
        deploy_strategy: hot_reload
        allowed_tools:
          - "mcp:wfctl:*"
          - "mcp_wfctl__*"
          - "mcp:wfctl:detect_project_features"
          - "mcp:wfctl:api_extract"
          - "file_read"
          - "file_write"
          - "file_list"
          - "git_status"
          - "git_commit"
          - "web_fetch"
          - "shell_exec"
        command_policy:
          mode: allowlist
          allowed_commands:
            - "go build"
            - "go test"
            - "wfctl"
            - "curl"
          enable_static_analysis: true
          block_pipe_to_shell: true
          block_script_execution: true
      immutable_sections:
        - path: "modules.guardrails"
          override: challenge_token
      override:
        mechanism: challenge_token
        admin_secret_env: "${WFCTL_ADMIN_SECRET:-scenario-87-admin-secret}"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  autonomous_improvement_loop:
    trigger:
      type: http
      config:
        path: /improve
        method: POST
    steps:
      # NOTE: system_prompt and task must be in step.set values, not in step.agent_execute config.
      - name: set_context
        type: step.set
        config:
          values:
            config_path: "${CONFIG_PATH}"
            base_app_url: "${BASE_APP_URL}"
            provider: ai
            repo_path: "${REPO_PATH}"
            system_prompt: |
              You are an autonomous agile development agent.

              TOOLS (call by EXACT name, one at a time):
              | Tool | Description | Required Args |
              |------|-------------|---------------|
              | file_read | Read a file | {"path": "/data/config/app.yaml"} |
              | mcp_wfctl__detect_project_features | Detect project features | {"yaml_content": "full yaml here"} |
              | mcp_wfctl__api_extract | Extract API surface | {"yaml_content": "full yaml here"} |
              | mcp_wfctl__inspect_config | Inspect config structure | {"yaml_content": "full yaml here"} |
              | web_fetch | Fetch a URL | {"url": "http://..."} |

              RULES:
              1. Call ONE tool at a time. Wait for the result before calling the next tool.
              2. Use EXACT tool names from the table above.
              3. The config file is at: ${CONFIG_PATH}
              4. After file_read returns content, use that actual content in all subsequent calls.
              5. Never write placeholder text — always use real content.
            task: |
              Step 1: Call file_read with {"path": "${CONFIG_PATH}"} to read the config.
              Step 2: Call mcp_wfctl__detect_project_features with {"yaml_content": <full YAML from step 1>}.
              Step 3: Call mcp_wfctl__api_extract with {"yaml_content": <same full YAML from step 1>}.
              Step 4: Report what endpoints exist and what to add next.

      - name: audit
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 10
          parallel_tool_calls: false
          context:
            compaction_threshold: 0.80
          # system_prompt and task come from set_context step.set above

      - name: post_audit
        type: step.blackboard_post
        config:
          phase: audit
          artifact_type: audit_report

      - name: set_plan_context
        type: step.set
        config:
          values:
            system_prompt: |
              You are an autonomous agile development agent.

              TOOLS (call by EXACT name, one at a time):
              | Tool | Description | Required Args |
              |------|-------------|---------------|
              | file_read | Read a file | {"path": "/data/config/app.yaml"} |
              | file_write | Write a file | {"path": "/data/config/app.yaml", "content": "full yaml here"} |
              | mcp_wfctl__validate_config | Validate YAML config | {"yaml_content": "full yaml here"} |
              | mcp_wfctl__list_step_types | List available step types | {} |
              | mcp_wfctl__get_step_schema | Get schema for a step type | {"step_type": "step.db_query"} |

              RULES:
              1. Call ONE tool at a time. Wait for the result before calling the next tool.
              2. Use EXACT tool names from the table above.
              3. The config file is at: ${CONFIG_PATH}
              4. After file_read returns content, use that actual content in all subsequent calls.
              5. Never write placeholder text — always use real YAML content.
              6. YAML rules: database not module; params not args; mode list/single; step.json_response.
            task: |
              Step 1: Call file_read with {"path": "${CONFIG_PATH}"} to read the config.
              Step 2: Add search (GET /tasks/search, step.db_query, database:db, mode:list, query: SELECT id,title,status FROM tasks WHERE title LIKE :q) and stats (GET /tasks/stats, step.db_query, database:db, mode:single, query: SELECT COUNT(*) as total FROM tasks) pipelines.
              Step 3: Call mcp_wfctl__validate_config with {"yaml_content": <full modified YAML from step 2>}.
              Step 4: Call file_write with {"path": "${CONFIG_PATH}", "content": <same full YAML from step 3>}.
              Use the actual YAML content — never use placeholder text.

      - name: plan
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 10
          parallel_tool_calls: false
          context:
            compaction_threshold: 0.80
          # system_prompt and task come from set_plan_context above

      - name: post_plan
        type: step.blackboard_post
        config:
          phase: plan
          artifact_type: improvement_plan

      - name: validate
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: deploy
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH}"

      - name: post_deploy
        type: step.blackboard_post
        config:
          phase: deploy
          artifact_type: deployment_result

      - name: set_verify_context
        type: step.set
        config:
          values:
            system_prompt: |
              You are an autonomous agile development agent.

              TOOLS (call by EXACT name, one at a time):
              | Tool | Description | Required Args |
              |------|-------------|---------------|
              | web_fetch | Fetch a URL | {"url": "http://..."} |
              | file_read | Read a file | {"path": "/data/config/app.yaml"} |

              RULES:
              1. Call ONE tool at a time. Wait for the result before calling the next tool.
              2. Use EXACT tool names from the table above.
            task: |
              Step 1: Call web_fetch with {"url": "${BASE_APP_URL}/tasks/search?q=test"} to verify the search endpoint works.
              Step 2: Call web_fetch with {"url": "${BASE_APP_URL}/tasks/stats"} to verify the stats endpoint works.
              Step 3: Report what each endpoint returned and whether they are working correctly.

      - name: verify
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 10
          parallel_tool_calls: false
          context:
            compaction_threshold: 0.80
          # system_prompt and task come from set_verify_context above

      - name: post_verify
        type: step.blackboard_post
        config:
          phase: verify
          artifact_type: verification_result

      - name: commit_iteration
        type: step.git_commit
        config:
          message: "feat(autonomous): iterative improvement — search and stats endpoints"
          paths:
            - "${CONFIG_PATH}"

  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "87-autonomous-agile-agent"
            component: agent
