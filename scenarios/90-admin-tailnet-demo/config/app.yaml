modules:
  - name: http
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [http]

  - name: auth
    type: auth.jwt
    config:
      secret: scenario-90-admin-jwt-secret-do-not-use-in-prod
      issuer: scenario-90-admin
      tokenExpiry: 24h
      allowRegistration: true
    dependsOn: [router]

  - name: admin
    type: admin.dashboard
    config:
      route_prefix: /admin
      app_name: Scenario 90 - Workflow Admin Tailnet Demo
      target_app: scenario-90-workflow-native

  - name: authz-ui-static
    type: static.fileserver
    config:
      root: /opt/workflow-authz-ui
      prefix: /admin/authz
      spaFallback: true
      router: router
    dependsOn: [router]

  - name: admin-ui-static
    type: static.fileserver
    config:
      root: /opt/workflow-admin-ui
      prefix: /admin
      spaFallback: true
      router: router
    dependsOn: [router]

  - name: app-ui-static
    type: static.fileserver
    config:
      root: /opt/workflow-app-ui
      prefix: /app
      spaFallback: false
      router: router
    dependsOn: [router]

  - name: authn
    type: auth.credential
    config:
      rp_id: 127.0.0.1
      origin: http://127.0.0.1:18080
      rp_display_name: Scenario 90 Workflow App

  - name: authz-ui
    type: authz.ui
    config:
      api_base_path: /api/authz
      admin_base_path: /admin/authz
      app_context: app
      frontend_context: frontend
      admin_context: admin
      scopes:
        - name: frontend:orders:read
          context: frontend
          resource: orders
          actions: [read]
          description: Read customer orders in the primary app.
        - name: frontend:orders:update
          context: frontend
          resource: orders
          actions: [update]
          description: Update customer orders in the primary app.
        - name: admin:authz.roles:read
          context: admin
          resource: authz.roles
          actions: [read]
          description: View role and scope assignments in admin.
        - name: admin:authz.roles:update
          context: admin
          resource: authz.roles
          actions: [update]
          description: Manage role and scope assignments in admin.
      admin:
        enabled: true
        module: admin
        id: authz-roles
        title: Authorization
        category: security
        path: /admin/authz/
        render_mode: iframe
        app_context: admin
        permissions:
          - admin:authz.roles:read

workflows:
  http:
    server: http
    router: router
    routes:
      - method: POST
        path: /api/admin/auth/register
        handler: auth
      - method: POST
        path: /api/admin/auth/login
        handler: auth
      - method: GET
        path: /api/admin/auth/profile
        handler: auth
      - method: POST
        path: /api/app/auth/register
        handler: auth
      - method: POST
        path: /api/app/auth/login
        handler: auth
      - method: GET
        path: /api/app/auth/profile
        handler: auth

pipelines:
  app-root:
    trigger:
      type: http
      config:
        path: /
        method: GET
    steps:
      - name: respond
        type: step.raw_response
        config:
          status: 200
          content_type: text/html; charset=utf-8
          body: |
            <!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Scenario 90 Workflow App</title>
              <link rel="stylesheet" href="/app/styles.css">
            </head>
            <body>
              <main>
                <header>
                  <div>
                    <h1>Scenario 90 Workflow App</h1>
                    <p>Primary app served by Workflow at the root. Admin is available at /admin/.</p>
                  </div>
                  <a class="button primary" href="/admin/">Open admin</a>
                </header>
                <div class="layout">
                  <section class="panel">
                    <h2>Sign in</h2>
                    <div class="form">
                      <label>Email <input id="email" type="email" value="app-user@tailnet"></label>
                      <label>Password <input id="password" type="password" value="app-password"></label>
                      <div class="buttons">
                        <button id="register" class="primary" type="button">Register</button>
                        <button id="login" type="button">Sign in</button>
                        <button id="logout" type="button">Sign out</button>
                      </div>
                      <div id="status" class="status">Not signed in</div>
                    </div>
                  </section>
                  <div class="stack">
                    <section class="panel">
                      <h2>SPA access projection</h2>
                      <pre id="access">Loading...</pre>
                    </section>
                    <section class="panel">
                      <h2>Orders API</h2>
                      <div class="buttons"><button id="update" class="primary" type="button">Update order</button></div>
                      <pre id="orders">Loading...</pre>
                    </section>
                  </div>
                </div>
              </main>
              <script src="/app/app.js"></script>
            </body>
            </html>

  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            runtime: workflow-go-server

  admin-redirect:
    trigger:
      type: http
      config:
        path: /admin
        method: GET
    steps:
      - name: redirect
        type: step.raw_response
        config:
          status: 308
          content_type: text/plain
          headers:
            Location: /admin/
          body: ""

  scenario-status:
    trigger:
      type: http
      config:
        path: /api/status
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            scenario: "90-admin-tailnet-demo"
            runtime: "workflow-go-server"
            harness: "workflow"
            app_server_language: "go"
            plugin_runtime: "external-go-binaries"
            primary_app: "/"
            admin_app: "/admin/"

  app-access:
    trigger:
      type: http
      config:
        path: /api/app/access
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: route-by-user
        type: step.conditional
        config:
          field: steps.authenticate.email
          routes:
            admin@tailnet: admin-access
            app-user@tailnet: support-access
          default: viewer-access
      - name: admin-access
        type: step.json_response
        config:
          status: 200
          body:
            email: { _from: "steps.authenticate.email" }
            role: admin
            frontend_scopes: ["frontend:orders:read", "frontend:orders:update"]
            admin_scopes: ["admin:auth.config:read", "admin:auth.config:update", "admin:authz.roles:read", "admin:authz.roles:update"]
            visible_panels: ["orders", "order-update", "admin-auth", "admin-authz"]
      - name: support-access
        type: step.json_response
        config:
          status: 200
          body:
            email: { _from: "steps.authenticate.email" }
            role: support
            frontend_scopes: ["frontend:orders:read"]
            admin_scopes: ["admin:authz.roles:read"]
            visible_panels: ["orders", "admin-authz-readonly"]
      - name: viewer-access
        type: step.json_response
        config:
          status: 200
          body:
            email: { _from: "steps.authenticate.email" }
            role: viewer
            frontend_scopes: []
            admin_scopes: []
            visible_panels: []

  app-orders-read:
    trigger:
      type: http
      config:
        path: /api/app/orders
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: route-by-user
        type: step.conditional
        config:
          field: steps.authenticate.email
          routes:
            admin@tailnet: admin-read-enforce
            app-user@tailnet: support-read-enforce
          default: deny-read-enforce
      - name: admin-read-enforce
        type: step.authz_enforce
        config:
          subject: admin@tailnet
          resource: orders
          action: read
          permitted: true
          reason: frontend:orders:read granted by admin role
      - name: admin-read-response
        type: step.json_response
        config:
          status: 200
          body:
            allowed: { _from: "steps.admin-read-enforce.permitted" }
            reason: { _from: "steps.admin-read-enforce.reason" }
            orders:
              - id: ORD-1001
                customer: Northwind
                status: ready
              - id: ORD-1002
                customer: Contoso
                status: review
      - name: support-read-enforce
        type: step.authz_enforce
        config:
          subject: app-user@tailnet
          resource: orders
          action: read
          permitted: true
          reason: frontend:orders:read granted by support role
      - name: support-read-response
        type: step.json_response
        config:
          status: 200
          body:
            allowed: { _from: "steps.support-read-enforce.permitted" }
            reason: { _from: "steps.support-read-enforce.reason" }
            orders:
              - id: ORD-1001
                customer: Northwind
                status: ready
              - id: ORD-1002
                customer: Contoso
                status: review
      - name: deny-read-enforce
        type: step.authz_enforce
        config:
          subject: viewer
          resource: orders
          action: read
          permitted: false
          reason: missing frontend:orders:read
      - name: deny-read-response
        type: step.json_response
        config:
          status: 403
          body:
            allowed: false
            reason: { _from: "steps.deny-read-enforce.reason" }

  app-orders-update:
    trigger:
      type: http
      config:
        path: /api/app/orders/update
        method: POST
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: route-by-user
        type: step.conditional
        config:
          field: steps.authenticate.email
          routes:
            admin@tailnet: admin-update-enforce
          default: deny-update-enforce
      - name: admin-update-enforce
        type: step.authz_enforce
        config:
          subject: admin@tailnet
          resource: orders
          action: update
          permitted: true
          reason: frontend:orders:update granted by admin role
      - name: admin-update-response
        type: step.json_response
        config:
          status: 200
          body:
            allowed: { _from: "steps.admin-update-enforce.permitted" }
            reason: { _from: "steps.admin-update-enforce.reason" }
            updated_order:
              id: ORD-1002
              status: priority-review
      - name: deny-update-enforce
        type: step.authz_enforce
        config:
          subject: non-admin
          resource: orders
          action: update
          permitted: false
          reason: missing frontend:orders:update
      - name: deny-update-response
        type: step.json_response
        config:
          status: 403
          body:
            allowed: false
            reason: { _from: "steps.deny-update-enforce.reason" }

  list-admin-contributions:
    trigger:
      type: http
      config:
        path: /api/admin/contributions
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: route-by-user
        type: step.conditional
        config:
          field: steps.authenticate.email
          routes:
            admin@tailnet: admin-grants
            app-user@tailnet: support-grants
          default: viewer-grants
      - name: admin-grants
        type: step.set
        config:
          values:
            app_context: admin
            granted_permissions:
              - admin:auth.config:read
              - admin:auth.config:update
              - admin:authz.roles:read
              - admin:authz.roles:update
      - name: describe-auth-contribution
        type: step.auth_admin_contribution_describe
        config: {}
      - name: register-auth
        type: step.admin_register_contribution
        config:
          module: admin
        input:
          contribution: { _from: "steps.describe-auth-contribution.contribution" }
      - name: admin-authz-contribution
        type: step.set
        config:
          values:
            contribution:
              id: authz-roles
              title: Authorization
              category: security
              path: /admin/authz/
              render_mode: iframe
              app_context: admin
              permissions:
                - permission: admin:authz.roles:read
                  resource: authz.roles
                  action: read
                - permission: admin:authz.roles:update
                  resource: authz.roles
                  action: update
      - name: register-authz
        type: step.admin_register_contribution
        config:
          module: admin
        input:
          contribution: { _from: "steps.admin-authz-contribution.contribution" }
      - name: list
        type: step.admin_list_contributions
        config:
          module: admin
        input:
          app_context: { _from: "steps.admin-grants.app_context" }
          granted_permissions: { _from: "steps.admin-grants.granted_permissions" }
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list.contributions" }
      - name: support-grants
        type: step.set
        config:
          values:
            app_context: admin
            granted_permissions:
              - admin:authz.roles:read
      - name: support-authz-contribution
        type: step.set
        config:
          values:
            contribution:
              id: authz-roles
              title: Authorization
              category: security
              path: /admin/authz/
              render_mode: iframe
              app_context: admin
              permissions:
                - permission: admin:authz.roles:read
                  resource: authz.roles
                  action: read
      - name: support-register-authz
        type: step.admin_register_contribution
        config:
          module: admin
        input:
          contribution: { _from: "steps.support-authz-contribution.contribution" }
      - name: support-list
        type: step.admin_list_contributions
        config:
          module: admin
        input:
          app_context: { _from: "steps.support-grants.app_context" }
          granted_permissions: { _from: "steps.support-grants.granted_permissions" }
      - name: support-respond
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.support-list.contributions" }
      - name: viewer-grants
        type: step.set
        config:
          values:
            app_context: admin
            granted_permissions: []
      - name: viewer-list
        type: step.admin_list_contributions
        config:
          module: admin
        input:
          app_context: { _from: "steps.viewer-grants.app_context" }
          granted_permissions: { _from: "steps.viewer-grants.granted_permissions" }
      - name: viewer-respond
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.viewer-list.contributions" }

  auth-provider-catalog:
    trigger:
      type: http
      config:
        path: /api/admin/auth/providers
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: catalog
        type: step.auth_provider_catalog
        config: &auth_provider_catalog_config
          providers: &auth_provider_descriptors
            - id: local-auth
              label: Workflow local auth
              description: Credential, passkey, TOTP, passwordless, and password policy contracts from workflow-plugin-auth.
              categories: [identity_management, passwordless, passkeys, mfa]
              implementation: workflow-plugin-auth
              version: v0.2.11
              support_level: management
              capabilities:
                - key: workflow_passkeys
                  label: Passkeys
                  category: passkeys
                  supported: true
                  admin_read_scopes: [admin.auth.providers.read]
                  admin_write_scopes: [admin.auth.providers.write]
                  config_fields:
                    - key: webauthn_rp_id
                      label: Passkey relying party ID
                      input_type: text
                      required: true
                    - key: webauthn_origin
                      label: Passkey origin
                      input_type: url
                      required: true
            - id: auth0
              label: Auth0
              description: Auth0 identity and OAuth/OIDC administration through workflow-plugin-auth0.
              categories: [identity_management, oauth2_oidc, rbac]
              implementation: workflow-plugin-auth0
              version: v0.1.0
              support_level: management
              capabilities:
                - key: auth0_applications
                  label: Applications and OIDC clients
                  category: oauth2_oidc
                  supported: true
                  app_scopes: ["create:clients", "read:clients", "update:clients", "delete:clients"]
                  admin_read_scopes: [admin.auth.providers.read]
                  admin_write_scopes: [admin.auth.providers.write]
                  config_fields:
                    - key: auth0_domain
                      label: Auth0 domain
                      input_type: text
                      required: true
                    - key: auth0_client_id
                      label: M2M client ID
                      input_type: text
                    - key: auth0_client_secret
                      label: M2M client secret
                      input_type: secret
                      secret: true
            - id: entra
              label: Microsoft Entra ID
              description: Microsoft Entra OIDC and directory administration through workflow-plugin-entra.
              categories: [identity_management, oauth2_oidc, enterprise_sso]
              implementation: workflow-plugin-entra
              version: v0.1.0
              support_level: management
            - id: okta
              label: Okta
              description: Okta user, group, application, authorization server, and policy administration through workflow-plugin-okta.
              categories: [identity_management, oauth2_oidc, rbac, enterprise_sso]
              implementation: workflow-plugin-okta
              version: v0.2.4
              support_level: management
            - id: sso
              label: Generic SSO/OIDC
              description: Generic OIDC token validation and exchange through workflow-plugin-sso.
              categories: [oauth2_oidc, enterprise_sso]
              implementation: workflow-plugin-sso
              version: v0.1.6
              support_level: runtime
            - id: ory-kratos
              label: Ory Kratos
              description: Ory Kratos identity, login, registration, recovery, verification, and session administration.
              categories: [identity_management, passwordless, passkeys, mfa]
              implementation: workflow-plugin-ory-kratos
              version: v0.1.0
              support_level: management
            - id: ory-hydra
              label: Ory Hydra
              description: Ory Hydra OAuth2/OIDC client and consent administration.
              categories: [oauth2_oidc]
              implementation: workflow-plugin-ory-hydra
              version: v0.1.0
              support_level: management
            - id: ory-polis
              label: Ory Polis
              description: Ory Polis enterprise SSO, SAML/OIDC, and SCIM administration.
              categories: [enterprise_sso, scim]
              implementation: workflow-plugin-ory-polis
              version: v0.1.0
              support_level: management
            - id: scalekit
              label: Scalekit
              description: Scalekit enterprise SSO and directory sync administration.
              categories: [enterprise_sso, scim]
              implementation: workflow-plugin-scalekit
              version: v0.1.0
              support_level: management
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            providers: { _from: "steps.catalog.providers" }
            warnings: { _from: "steps.catalog.warnings" }

  auth-admin-config:
    trigger:
      type: http
      config:
        path: /api/admin/auth/config
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: catalog
        type: step.auth_provider_catalog
        config: *auth_provider_catalog_config
      - name: describe
        type: step.auth_admin_config_describe
        config: {}
        input:
          config:
            environment: development
            auth_routes_enabled: true
            password_auth_enabled: false
            webauthn_rp_id: 127.0.0.1
            webauthn_origin: http://127.0.0.1:18080
            providers: *auth_provider_descriptors
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            groups: { _from: "steps.describe.groups" }
            effective_config: { _from: "steps.describe.effective_config" }
            methods_policy: { _from: "steps.describe.methods_policy" }
            providers: { _from: "steps.catalog.providers" }
            warnings: { _from: "steps.describe.warnings" }
            secret_fields: { _from: "steps.describe.secret_fields" }

  auth-admin-config-validate:
    trigger:
      type: http
      config:
        path: /api/admin/auth/config/validate
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: validate
        type: step.auth_admin_config_validate
        config:
          require_primary_method: true
        input:
          desired_config: { _from: "steps.parse_request.body.desired_config" }
          providers: *auth_provider_descriptors
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            valid: { _from: "steps.validate.valid" }
            accepted_config: { _from: "steps.validate.accepted_config" }
            methods_policy: { _from: "steps.validate.methods_policy" }
            errors: { _from: "steps.validate.errors" }
            warnings: { _from: "steps.validate.warnings" }
            secret_fields: { _from: "steps.validate.secret_fields" }

  describe-auth0-provider:
    trigger:
      type: http
      config:
        path: /api/admin/auth/providers/auth0
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: describe
        type: step.auth0_auth_provider_describe
        config:
          provider_id: auth0
          domain: demo.us.auth0.com
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            providers: { _from: "steps.describe.providers" }

  describe-entra-provider:
    trigger:
      type: http
      config:
        path: /api/admin/auth/providers/entra
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: describe
        type: step.entra_auth_provider_describe
        config:
          provider_id: entra
          tenant_id: common
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            providers: { _from: "steps.describe.providers" }

  describe-ory-kratos-provider:
    trigger:
      type: http
      config:
        path: /api/admin/auth/providers/ory-kratos
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: describe
        type: step.ory_kratos_auth_provider_describe
        config:
