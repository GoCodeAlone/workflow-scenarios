# ============================================================
# Scenario 92 — Infra Admin Phase 2/3 Demo (workflow v0.74.0 / workflow-plugin-infra v1.2.0)
#
# Demonstrates the Phase-2/3 features:
#   - DYNAMIC specs: plan/apply read specs from the POST body (specs_from), not static config
#   - step.iac_secret_reachability: pre-flight gate (409 when remote exec_env + host-local secrets)
#   - step.iac_commit_back: real git branch-push on the working clone mounted at /gitops/workclone
#   - step.iac_provider_reconcile: drift → import → approximate YAML → draft branch
#   - sandbox.remote_runners: named remote runner "remote" pointing at sandbox-runner agent
#   - step.sandbox_exec with exec_env: remote: proof the agent container executes commands
#   - /api/infra/exec-envs: static exec-env list (local-docker, remote)
#
# Architecture:
#   - auth.jwt: JWT authentication (Bearer scheme; iss=scenario-92; sub=operator|viewer)
#   - http.server + http.router: HTTP layer on :8080
#   - health.checker: /healthz
#   - admin.dashboard (external workflow-plugin-admin): admin shell at /admin/
#   - iac.state (memory): state store
#   - infra.admin (external workflow-plugin-infra v1.2.0): SPA at /admin/infra
#   - secrets.keychain (scenario-secrets): host-local secrets backend for reachability gate
#   - sandbox.remote_runners (scenario-runners): named runner "remote" → sandbox-runner:50051
#
# Auth/RBAC:
#   - step.auth_validate (Bearer JWT) on all mutation pipelines
#   - step.conditional routing on JWT sub claim:
#       operator → plan / apply / commit / reconcile allowed
#       viewer   → 403 on mutations
#       unauthenticated → 401 via auth_validate
#
# IMPORTANT git paths (mounted in docker-compose):
#   bare repo:    /gitops/bare.git  (read-only; used as remote)
#   working clone: /gitops/workclone (writable; iac_commit_back and iac_provider_reconcile push here)
#
# NOTE: step.iac_secret_reachability uses "scenario-secrets" (a secrets.keychain module).
# On the local exec_env (local-docker) host-local secrets ARE reachable.
# With exec_env: remote (the named sandbox agent) host-local secrets are UNREACHABLE → 409.
# ============================================================

modules:
  - name: auth
    type: auth.jwt
    config:
      issuer: "scenario-92"
      secret: "scenario-92-jwt-secret-do-not-use-in-prod"

  - name: http
    type: http.server
    config:
      address: ":8080"

  - name: health
    type: health.checker
    config:
      healthPath: /healthz
      autoDiscover: true

  - name: http-router
    type: http.router
    dependsOn: [http]

  - name: admin
    type: admin.dashboard
    config:
      route_prefix: /admin
      app_name: "Scenario 92 — Infra Admin Phase 2/3 Demo"
      auth_module: auth

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  # infra.admin module provided by workflow-plugin-infra (external gRPC plugin).
  # It supplies InvokeMethod("AdminContribution") which returns the nav contribution
  # for the Infrastructure Management SPA.  The plugin's ConfigFragment() injects a
  # companion static.fileserver that serves the SPA assets at /admin/infra.
  - name: infra-admin
    type: infra.admin
    config:
      api_base_path: "/api/infra"
      prefix: "/admin/infra"

  # secrets.keychain: host-local secrets backend used by step.iac_secret_reachability
  # to gate applies when specs reference secret:// values that cannot be read from a
  # remote exec_env (ADR 0017 fail-safe: host-local backend → unreachable from remote).
  # In the distroless container there is no real keychain daemon — that is intentional:
  # the reachability check uses a type-switch (not an actual keychain Get) to decide
  # whether *KeychainProvider is reachable from the configured exec_env.
  - name: scenario-secrets
    type: secrets.keychain
    config:
      service: "scenario-92-demo"

  # sandbox.remote_runners: registers named remote sandbox agent "remote".
  # The agent is the workflow-sandbox-runner running in the sandbox-runner container
  # (docker-compose service). allow_insecure: true because the hermetic demo does
  # not use mTLS certificates (documented dev-mode path per ADR 0019).
  - name: scenario-runners
    type: sandbox.remote_runners
    config:
      remote_runners:
        - name: remote
          address: "sandbox-runner:50051"
          allow_insecure: true

workflows:
  http:
    server: http
    router: http-router

pipelines:
  # ── admin contributions ────────────────────────────────────────────────────

  list-admin-contributions:
    trigger:
      type: http
      config:
        path: /api/admin/contributions
        method: GET
    steps:
      - name: set-infra-contribution
        type: step.set
        config:
          values:
            contribution:
              id: infra-resources
              title: Infrastructure
              category: operations
              path: /admin/infra
              render_mode: iframe
              app_context: app
      - name: register-infra
        type: step.admin_register_contribution
        config:
          module: admin
      - name: list
        type: step.admin_list_contributions
        config:
          module: admin
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list.contributions" }

  # ── catalog (operator-authed view) ────────────────────────────────────────

  infra-catalog:
    trigger:
      type: http
      config:
        path: /api/infra/catalog
        method: GET
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: catalog
        type: step.iac_provider_catalog
        config:
          provider: stub-iac-provider
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: { _from: "steps.catalog.provider" }
            regions: { _from: "steps.catalog.regions" }
            types: { _from: "steps.catalog.types" }
            source: { _from: "steps.catalog.source" }

  # ── list resources (read-only, no auth required for demo SPA) ─────────────

  infra-list:
    trigger:
      type: http
      config:
        path: /api/infra/resources
        method: GET
    steps:
      - name: list
        type: step.iac_provider_list
        config:
          provider: stub-iac-provider
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: { _from: "steps.list.provider" }
            resources: { _from: "steps.list.resources" }
            count: { _from: "steps.list.count" }

  # ── plan (operator only, DYNAMIC specs from POST body) ─────────────────────
  #
  # Phase-2 change: specs are read from the POST body (specs_from), NOT baked in
  # static config. The SPA (api.ts) posts { provider, specs } to /plan; the
  # operator edits specs before submit. The stub provider treats every spec as
  # a "create" action.
  #
  # Body shape expected: { "specs": [ { "name": "...", "type": "...", "config": {...} } ] }
  # The desired_hash returned reflects the operator-supplied specs — it changes
  # when the operator changes specs (demonstrating the dynamic two-phase guard).

  infra-plan:
    trigger:
      type: http
      config:
        path: /api/infra/plan
        method: POST
    steps:
      - name: parse-request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-request.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: plan-exec
          default: deny-plan
      - name: plan-exec
        type: step.iac_provider_plan
        config:
          provider: stub-iac-provider
          # specs_from resolves the operator-supplied spec list from the POST body.
          # The operator MUST include at least one spec; the step rejects empty specs
          # to prevent the destroy-everything footgun.
          specs_from: steps.parse-request.body.specs
      - name: respond-plan
        type: step.json_response
        config:
          status: 200
          body:
            plan: { _from: "steps.plan-exec.plan" }
            desired_hash: { _from: "steps.plan-exec.desired_hash" }
            provider: { _from: "steps.plan-exec.provider" }
      - name: deny-plan
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required for plan"

  # ── apply (operator only, DYNAMIC specs + hash + reachability pre-flight) ──
  #
  # Phase-2 change:
  #   1. step.iac_secret_reachability: pre-flight — checks whether the
  #      secret:// refs in the posted specs are reachable from the LOCAL exec_env
  #      (exec_env: "" = local-docker path). For host-local secrets.keychain +
  #      local exec_env → reachable → proceed.
  #   2. step.iac_provider_apply: specs_from + desired_hash_from both read
  #      from the POST body (not static config). The two-phase hash guard
  #      recomputes the hash at apply time against live state; mismatch → error.
  #   3. step.iac_commit_back: pushes a branch to the working clone mounted at
  #      /gitops/workclone. The working clone's "origin" remote points to the
  #      bare repo at /gitops/bare.git. secret:// refs survive verbatim in the
  #      committed resources.yaml (specgen.SpecToYAML does NOT resolve them).
  #
  # Body shape expected:
  #   {
  #     "specs": [ { "name": "...", "type": "...", "config": { "api_key": "secret://scenario/api_key" } } ],
  #     "desired_hash": "<64-char hex from /plan response>"
  #   }
  #
  # For the 409 pre-flight demo (remote exec_env → unreachable), use POST /api/infra/apply-remote.

  infra-apply:
    timeout: 120s
    trigger:
      type: http
      config:
        path: /api/infra/apply
        method: POST
    steps:
      - name: parse-request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-request.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: reachability-check
          default: deny-apply
      # Pre-flight: verify secret:// refs in specs are reachable from LOCAL exec_env.
      # exec_env: "" = local-docker path → host-local secrets.keychain IS reachable.
      - name: reachability-check
        type: step.iac_secret_reachability
        config:
          provider: scenario-secrets
          specs_from: steps.parse-request.body.specs
          exec_env: ""
      - name: check-reachability
        type: step.conditional
        config:
          field: 'steps.reachability-check.all_reachable'
          routes:
            "true": apply-exec
          default: deny-reachability
      - name: deny-reachability
        type: step.json_response
        config:
          status: 409
          body:
            error: "secret references in specs are not reachable from the exec_env"
            secrets: { _from: "steps.reachability-check.secrets" }
      - name: apply-exec
        type: step.iac_provider_apply
        config:
          provider: stub-iac-provider
          specs_from: steps.parse-request.body.specs
          desired_hash_from: steps.parse-request.body.desired_hash
      # Commit the applied specs back to the working clone (branch-push).
      # repo_dir is the working clone mounted from the host at /gitops/workclone.
      # specs_from mirrors the apply step's specs so the same operator-edited
      # specs (including any secret:// refs) are serialised to resources.yaml.
      # The secret:// refs are written VERBATIM (specgen.SpecToYAML does not resolve
      # them — this is the Phase-2 assertion: refs survive round-trip).
      - name: commit-back
        type: step.iac_commit_back
        config:
          specs_from: steps.parse-request.body.specs
          apply_result_from: steps.apply-exec.apply_result
          branch: "gitops/infra-apply-demo"
          message: "feat(infra): apply stub-iac-provider plan (scenario-92 demo)"
          target: branch-push
          repo_dir: /gitops/workclone
      - name: respond-apply
        type: step.json_response
        config:
          status: 200
          body:
            apply_result: { _from: "steps.apply-exec.apply_result" }
            desired_hash: { _from: "steps.apply-exec.desired_hash" }
            provider: { _from: "steps.apply-exec.provider" }
            action_count: { _from: "steps.apply-exec.action_count" }
            committed: { _from: "steps.commit-back.committed" }
            ref: { _from: "steps.commit-back.ref" }
            state_diverged: { _from: "steps.commit-back.state_diverged" }
      - name: deny-apply
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required for apply"

  # ── apply-remote: 409 demo (remote exec_env → host-local secrets unreachable) ─
  #
  # Phase-2 assertion (b): demonstrates the reachability pre-flight returning 409.
  # This dedicated endpoint hard-codes exec_env: remote so the reachability check
  # always fails for specs containing secret:// refs (host-local secrets.keychain
  # backend is unreachable from a remote exec_env per ADR 0017 fail-safe).
  #
  # In production the plan/apply route would read exec_env from the request body;
  # for the hermetic demo a separate route with static exec_env: remote is the
  # correct approach (step.iac_secret_reachability exec_env is static in config).

  infra-apply-remote:
    timeout: 30s
    trigger:
      type: http
      config:
        path: /api/infra/apply-remote
        method: POST
    steps:
      - name: parse-request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-request.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: reachability-check-remote
          default: deny-apply-remote
      # Pre-flight with exec_env: remote → host-local secrets.keychain UNREACHABLE → 409.
      - name: reachability-check-remote
        type: step.iac_secret_reachability
        config:
          provider: scenario-secrets
          specs_from: steps.parse-request.body.specs
          exec_env: remote
      - name: check-reachability-remote
        type: step.conditional
        config:
          field: 'steps.reachability-check-remote.all_reachable'
          routes:
            "true": apply-exec-remote
          default: deny-reachability-remote
      - name: deny-reachability-remote
        type: step.json_response
        config:
          status: 409
          body:
            error: "secret references in specs are not reachable from remote exec_env (host-local backend unreachable from remote runner — ADR 0017 fail-safe)"
            secrets: { _from: "steps.reachability-check-remote.secrets" }
      - name: apply-exec-remote
        type: step.iac_provider_apply
        config:
          provider: stub-iac-provider
          specs_from: steps.parse-request.body.specs
          desired_hash_from: steps.parse-request.body.desired_hash
      - name: respond-apply-remote
        type: step.json_response
        config:
          status: 200
          body:
            apply_result: { _from: "steps.apply-exec-remote.apply_result" }
            desired_hash: { _from: "steps.apply-exec-remote.desired_hash" }
      - name: deny-apply-remote
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required for apply-remote"

  # ── reconcile (operator only) ──────────────────────────────────────────────
  #
  # Phase-3: drift → import → approximate YAML → draft branch-push.
  # The stub DetectDrift returns Drifted:false for all refs → count=0 → no commit.
  # To get a non-zero count in the hermetic stack the test uses a spec whose
  # name is not in the current Status() list (Status returns []) — all specs
  # are "drifted" from the perspective of the reconcile step since they don't
  # exist in the live state. But DetectDrift itself returns Drifted:false for
  # every ref, so count will always be 0 (no drift). Response: draft=false, count=0.
  # The test asserts the reconcileWarning field is present (even when count=0
  # it is returned as empty string — the assertion checks the response shape).
  #
  # Body shape: {}  (no parameters needed for the hermetic demo)

  infra-reconcile:
    timeout: 120s
    trigger:
      type: http
      config:
        path: /api/infra/reconcile
        method: POST
    steps:
      - name: parse-request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-request.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: reconcile-exec
          default: deny-reconcile
      - name: reconcile-exec
        type: step.iac_provider_reconcile
        config:
          provider: stub-iac-provider
          branch: "infra/reconcile-demo"
          target: branch-push
          repo_dir: /gitops/workclone
      - name: respond-reconcile
        type: step.json_response
        config:
          status: 200
          body:
            draft: { _from: "steps.reconcile-exec.draft" }
            ref: { _from: "steps.reconcile-exec.ref" }
            warning: { _from: "steps.reconcile-exec.warning" }
            count: { _from: "steps.reconcile-exec.count" }
      - name: deny-reconcile
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required for reconcile"

  # ── exec-envs (static list of configured exec environments) ─────────────────
  #
  # Returns the configured execution environments for the SPA's exec_env selector.
  # "local-docker" is always available (local Docker daemon on the engine host).
  # "remote" is the named sandbox-runner agent registered in scenario-runners module.
  # "ephemeral" (Argo) is NOT configured in the hermetic demo — omitted.

  infra-exec-envs:
    trigger:
      type: http
      config:
        path: /api/infra/exec-envs
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            exec_envs:
              - local-docker
              - remote

  # ── sandbox-exec demo route (proves the remote agent executes commands) ─────
  #
  # POST /api/infra/sandbox-demo runs a command on the "remote" sandbox agent.
  # The command writes a MARKER file to stdout (echo) which the test captures.
  # security_profile: permissive → clamped to standard by the agent (ADR 0019).
  # The agent logs: "sandbox-runner: clamped requested profile requested=permissive effective=standard"
  # The test asserts: marker in stdout AND the agent's clamp log line via docker logs.

  infra-sandbox-demo:
    timeout: 60s
    trigger:
      type: http
      config:
        path: /api/infra/sandbox-demo
        method: POST
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: sandbox-exec
          default: deny-sandbox
      - name: sandbox-exec
        type: step.sandbox_exec
        config:
          exec_env: remote
          image: "alpine:3.19"
          security_profile: permissive
          command:
            - sh
            - -c
            - "echo SCENARIO92_REMOTE_AGENT_MARKER && echo 'remote agent executed' >&2"
          fail_on_error: true
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            stdout: { _from: "steps.sandbox-exec.stdout" }
            stderr: { _from: "steps.sandbox-exec.stderr" }
            exit_code: { _from: "steps.sandbox-exec.exit_code" }
      - name: deny-sandbox
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required for sandbox demo"

  # ── drift check (read-only) ────────────────────────────────────────────────

  infra-drift:
    trigger:
      type: http
      config:
        path: /api/infra/drift
        method: GET
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: drift
        type: step.iac_provider_drift
        config:
          provider: stub-iac-provider
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: { _from: "steps.drift.provider" }
            supported: { _from: "steps.drift.supported" }
            any_drifted: { _from: "steps.drift.any_drifted" }
            drifts: { _from: "steps.drift.drifts" }
            count: { _from: "steps.drift.count" }

  # ── secrets metadata (read-only) ───────────────────────────────────────────

  infra-secrets-list:
    trigger:
      type: http
      config:
        path: /api/infra/secrets
        method: GET
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            secrets:
              - name: STUB_IAC_PROVIDER_API_KEY
                description: "API key for stub IaC provider (use secret://scenario/api_key)"
                required: true
                configured: false
              - name: STUB_IAC_PROVIDER_REGION_ACCESS
                description: "Region access token for stub IaC provider"
                required: false
                configured: false
            metadata_only: true

  # ── SPA-compatible catalog endpoint ──────────────────────────────────────

  infra-spa-catalog:
    trigger:
      type: http
      config:
        path: /api/infra/providers/{provider}/catalog
        method: GET
    steps:
      - name: catalog
        type: step.iac_provider_catalog
        config:
          provider: stub-iac-provider
      - name: transform-types
        type: step.jq
        config:
          input_from: steps.catalog.types
          expression: "[.[] | .resource_type]"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: { _from: "steps.catalog.provider" }
            regions: { _from: "steps.catalog.regions" }
            types: { _from: "steps.transform-types.result" }
            source: { _from: "steps.catalog.source" }

  # ── secrets declare (mutation, operator only) ─────────────────────────────

  infra-secrets-declare:
    trigger:
      type: http
      config:
        path: /api/infra/secrets
        method: POST
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: respond-declared
          default: deny-secrets
      - name: respond-declared
        type: step.json_response
        config:
          status: 200
          body:
            declared: true
            metadata_only: true
            message: "Secret declaration registered (value not stored in response)"
      - name: deny-secrets
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required to declare secrets"
