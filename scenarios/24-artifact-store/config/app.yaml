modules:
  - name: server
    type: http.server
    config:
      address: ":18124"
  - name: router
    type: http.router
    dependsOn: [server]
  - name: artifacts
    type: storage.artifact
    config:
      backend: filesystem
      basePath: artifacts
workflows:
  http:
    router: router
    server: server
pipelines:
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "24-artifact-store"

  upload-artifact:
    trigger:
      type: http
      config:
        path: /api/artifacts
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          parse_body: true
          merge_body: true
      - name: upload
        type: step.artifact_upload
        config:
          store: artifacts
          key: "{{ .key }}"
          content_from: content_b64
          content_encoding: base64
          metadata:
            owner: "{{ .owner }}"
            version: "{{ .version }}"
            content_type: "{{ .content_type }}"
      - name: respond
        type: step.json_response
        config:
          status: 201
          body:
            uploaded: true
            key: "{{ .key }}"
            size:
              _from: size

  download-artifact:
    trigger:
      type: http
      config:
        path: /api/artifacts/download
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          parse_body: true
          merge_body: true
      - name: download
        type: step.artifact_download
        config:
          store: artifacts
          key: "{{ .key }}"
          content_encoding: base64
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            key: "{{ .key }}"
            content_b64:
              _from: artifact_content
            size:
              _from: size
            metadata:
              _from: metadata

  list-artifacts:
    trigger:
      type: http
      config:
        path: /api/artifacts/list
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          parse_body: true
          merge_body: true
      - name: list
        type: step.artifact_list
        config:
          store: artifacts
          prefix: "{{ .prefix }}"
          output: artifacts
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            count:
              _from: count
            artifacts:
              _from: artifacts

  delete-artifact:
    trigger:
      type: http
      config:
        path: /api/artifacts/delete
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          parse_body: true
          merge_body: true
      - name: delete
        type: step.artifact_delete
        config:
          store: artifacts
          key: "{{ .key }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            deleted:
              _from: deleted
            key: "{{ .key }}"
