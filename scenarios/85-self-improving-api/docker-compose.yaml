services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30

  app:
    image: ghcr.io/gocodealone/workflow:latest
    ports:
      - "8080:8080"
    volumes:
      - app-data:/data
      - ./config:/data/config
    environment:
      - WORKFLOW_ADMIN_SECRET=scenario-85-admin-secret
    command: ["-config", "/data/config/base-app.yaml", "-data-dir", "/data"]
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  agent:
    image: ghcr.io/gocodealone/workflow:latest
    volumes:
      - app-data:/data
      - ./config:/data/config
      - agent-repo:/data/repo
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WORKFLOW_ADMIN_SECRET=scenario-85-admin-secret
      - IMPROVEMENT_GOAL=Add full-text search with FTS5, cursor-based pagination, rate limiting per IP, and structured JSON logging with response times. Implement search ranking as a custom Yaegi module.
    command: ["-config", "/data/config/agent-config.yaml", "-data-dir", "/data/agent"]
    depends_on:
      ollama:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  ollama-data:
  app-data:
  agent-repo:
