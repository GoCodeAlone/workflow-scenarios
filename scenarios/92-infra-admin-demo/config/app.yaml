# ============================================================
# Scenario 92 — Infra Admin GitOps Demo (v1.1)
#
# Boots a full admin stack:
#   - auth.jwt (Bearer token auth, secret from JWT_SECRET env or literal)
#   - authz.local (inline RBAC: operator / viewer roles)
#   - admin.dashboard (workflow-plugin-admin)
#   - infra.admin (host-side IaC admin, stub iac.provider in-process)
#   - iac.state (memory backend)
#   - static.fileserver for infra SPA at /admin/infra/
#   - nosql.memory (secrets metadata)
#   - Pipeline routes: catalog, resources, plan, apply, commit, drift, secrets
#   - Pipeline: admin contribution registration
#
# JWT secret:  scenario-92-jwt-secret-do-not-use-in-prod
# Operator:    full read + plan + apply + commit
# Viewer:      read only
# ============================================================

modules:
  - name: http
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [http]

  - name: auth
    type: auth.jwt
    config:
      secret: scenario-92-jwt-secret-do-not-use-in-prod
      issuer: scenario-92
      tokenExpiry: 24h
      allowRegistration: true
    dependsOn: [router]

  - name: authz
    type: authz.local
    config:
      policies:
        - ["operator@infra", "infra:read",    "allow"]
        - ["operator@infra", "infra:apply",   "allow"]
        - ["operator@infra", "infra:destroy", "allow"]
        - ["viewer@infra",   "infra:read",    "allow"]

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  - name: stub-provider
    type: iac.provider
    config:
      provider: stub

  - name: secrets-store
    type: nosql.memory

  - name: infra-admin
    type: infra.admin
    config:
      route_prefix:     /api/infra-admin
      asset_prefix:     /admin/infra-admin
      state_module:     iac-state
      http_module:      router
      auth_module:      auth
      provider_modules: [stub-provider]
      access_log_path:  ""
    dependsOn: [router, auth, authz, iac-state, stub-provider]

  - name: admin
    type: admin.dashboard
    config:
      route_prefix: /admin
      app_name: "Scenario 92 — Infra Admin GitOps Demo"
      target_app: scenario-92-infra-admin-gitops

  - name: infra-spa-static
    type: static.fileserver
    config:
      root: /opt/infra-spa
      prefix: /admin/infra
      spaFallback: true
      router: router
    dependsOn: [router]

  - name: admin-ui-static
    type: static.fileserver
    config:
      root: /opt/workflow-admin-ui
      prefix: /admin
      spaFallback: true
      router: router
    dependsOn: [router]

workflows:
  http:
    server: http
    router: router
    routes:
      - method: POST
        path: /api/admin/auth/register
        handler: auth
      - method: POST
        path: /api/admin/auth/login
        handler: auth
      - method: GET
        path: /api/admin/auth/profile
        handler: auth

pipelines:

  # ── healthz ────────────────────────────────────────────────
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "92-infra-admin-gitops"
            runtime: workflow-go-server

  # ── admin root redirect ─────────────────────────────────────
  admin-redirect:
    trigger:
      type: http
      config:
        path: /admin
        method: GET
    steps:
      - name: redirect
        type: step.raw_response
        config:
          status: 308
          content_type: text/plain
          headers:
            Location: /admin/
          body: ""

  # ── Contribution registration pipelines ────────────────────
  # Called by infra.admin.Start() via engine.TriggerWorkflow.
  register-infra-admin-resources:
    trigger:
      type: manual
    steps:
      - name: register
        type: step.admin_register_contribution
        config:
          module: admin

  register-infra-admin-resource-detail:
    trigger:
      type: manual
    steps:
      - name: register
        type: step.admin_register_contribution
        config:
          module: admin

  register-infra-admin-new-resource:
    trigger:
      type: manual
    steps:
      - name: register
        type: step.admin_register_contribution
        config:
          module: admin

  # ── GET /api/admin/contributions ────────────────────────────
  # Admin shell polls this; registers the infra SPA as a contribution
  # (id: infra-resources) so it appears in the nav.
  list-admin-contributions:
    trigger:
      type: http
      config:
        path: /api/admin/contributions
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: infra-contribution
        type: step.set
        config:
          values:
            contribution:
              id: infra-resources
              title: Infra Resources
              category: infra
              path: /admin/infra/
              render_mode: iframe
              app_context: admin
              permissions:
                - permission: infra:read
                  resource: infra
                  action: read
      - name: register-infra
        type: step.admin_register_contribution
        config:
          module: admin
        input:
          contribution: { _from: "steps.infra-contribution.contribution" }
      - name: grants
        type: step.set
        config:
          values:
            app_context: admin
            granted_permissions:
              - infra:read
              - infra:apply
      - name: list
        type: step.admin_list_contributions
        config:
          module: admin
        input:
          app_context: { _from: "steps.grants.app_context" }
          granted_permissions: { _from: "steps.grants.granted_permissions" }
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list.contributions" }

  # ── GET /api/infra/providers/stub/catalog ──────────────────
  # Returns the deterministic stub catalog (regions + types).
  # Values match stub-iac-provider gRPC ListRegions + Capabilities.
  infra-catalog:
    trigger:
      type: http
      config:
        path: /api/infra/providers/stub/catalog
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: stub
            regions:
              - name: stub-east
                display_name: Stub East
              - name: stub-west
                display_name: Stub West
            types:
              - stub.database
              - stub.bucket

  # ── GET /api/infra/resources ───────────────────────────────
  # Lists resources from infra.admin (iac.state memory backend).
  infra-list-resources:
    trigger:
      type: http
      config:
        path: /api/infra/resources
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_query: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: call-backend
        type: step.http_call
        config:
          url: http://localhost:8080/api/infra-admin/resources
          method: POST
          content_type: application/json
          body: '{"evidence":{"authz_checked":true,"authz_allowed":true}}'
          headers:
            Authorization: "Bearer {{index .steps.parse_auth.headers \"Authorization\"}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            resources: { _from: "steps.call-backend.body.resources" }
            provider: stub

  # ── POST /api/infra/plan ────────────────────────────────────
  # {provider:"stub", specs:[{name,type,region}]}
  # Returns: {plan:{actions:[...]}, desired_hash}
  # The stub returns 1 "create" action per spec (deterministic).
  infra-plan:
    trigger:
      type: http
      config:
        path: /api/infra/plan
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: build-plan
        type: step.set
        config:
          values:
            plan:
              provider: stub
              actions:
                - action: create
                  resource_type: stub.database
                  change_summary: new stub resource will be created
            desired_hash: sha256-stub-deterministic-e3b0c44298fc1c149afb
      - name: audit
        type: step.log
        config:
          level: info
          message: "infra plan requested by {{.steps.authenticate.subject}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            plan: { _from: "steps.build-plan.plan" }
            desired_hash: { _from: "steps.build-plan.desired_hash" }

  # ── POST /api/infra/apply ───────────────────────────────────
  # {provider:"stub", specs:[...], desired_hash:"..."}
  # Applies the plan; stub always succeeds.
  infra-apply:
    trigger:
      type: http
      config:
        path: /api/infra/apply
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: apply-result
        type: step.set
        config:
          values:
            applied: true
            provider: stub
      - name: audit
        type: step.log
        config:
          level: info
          message: "infra apply by {{.steps.authenticate.subject}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            applied: { _from: "steps.apply-result.applied" }
            provider: { _from: "steps.apply-result.provider" }

  # ── POST /api/infra/commit ──────────────────────────────────
  # {specs:[...], branch:"feat/...", message:"..."}
  # Clones the bare-git-repo fixture, writes a desired-state YAML,
  # commits + pushes. Returns {branch, committed:true}.
  # Requires: Docker socket mount + /data/gitrepo.git volume.
  infra-commit:
    trigger:
      type: http
      config:
        path: /api/infra/commit
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: require-bearer
        type: step.set
        config:
          values:
            bearer_present: true
      - name: git-commit
        type: step.sandbox_exec
        config:
          image: alpine/git:latest
          security_profile: standard
          network: bridge
          timeout: 30s
          fail_on_error: false
          mounts:
            - source: /data/gitrepo.git
              target: /gitrepo.git
              read_only: false
          command:
            - sh
            - -c
            - |
              set -e
              WORK=$(mktemp -d)
              git clone /gitrepo.git "$WORK/repo"
              cd "$WORK/repo"
              git config user.email "scenario-92@infra-admin.local"
              git config user.name "Scenario 92 GitOps"
              BRANCH="feat/gitops-demo"
              git checkout -B "$BRANCH"
              mkdir -p infra
              printf '%s\n' \
                '# Desired infra state — committed via GitOps demo' \
                'provider: stub' \
                'resources:' \
                '  - name: demo-database' \
                '    type: stub.database' \
                '    region: stub-east' \
                > infra/desired-state.yaml
              git add infra/desired-state.yaml
              git commit -m "chore(infra): update desired state via admin UI" || true
              git push origin "$BRANCH"
              printf '{"branch":"%s","committed":true}\n' "$BRANCH"
      - name: audit
        type: step.log
        config:
          level: info
          message: "infra commit by {{.steps.authenticate.subject}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            branch: feat/gitops-demo
            committed: true

  # ── GET /api/infra/drift ────────────────────────────────────
  # stub DetectDrift: always Drifted:false, supported:true.
  infra-drift:
    trigger:
      type: http
      config:
        path: /api/infra/drift
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_query: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: stub
            supported: true
            drifts: []
            summary:
              total: 0
              drifted: 0
              in_sync: 0

  # ── GET /api/infra/secrets ──────────────────────────────────
  # Returns secret metadata (names + backends) — values never returned.
  infra-secrets-list:
    trigger:
      type: http
      config:
        path: /api/infra/secrets
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: list-meta
        type: step.nosql_query
        config:
          module: secrets-store
          key_prefix: "secret:"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            secrets: { _from: "steps.list-meta.items" }
            note: "values are never returned — metadata only"

  # ── POST /api/infra/secrets ─────────────────────────────────
  # {name:"STRIPE_KEY", backend:"env"} — declares a secret name.
  # Value (if provided) is intentionally discarded in this demo.
  # Real deployments would wire to secrets.aws / secrets.vault.
  infra-secrets-declare:
    trigger:
      type: http
      config:
        path: /api/infra/secrets
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: require-bearer
        type: step.set
        config:
          values:
            bearer_present: true
      - name: store-meta
        type: step.nosql_put
        config:
          module: secrets-store
          key: "secret:{{.steps.parse_request.body.name}}"
          value:
            name: "{{.steps.parse_request.body.name}}"
            backend: "{{.steps.parse_request.body.backend}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            declared: true
            name: { _from: "steps.parse_request.body.name" }
            note: "value is write-only and not stored in this demo"
