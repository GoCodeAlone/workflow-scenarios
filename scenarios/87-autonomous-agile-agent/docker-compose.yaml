services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - app-data:/data
      - ./config:/data/config
    environment:
      - WORKFLOW_ADMIN_SECRET=scenario-87-admin-secret
    depends_on:
      ollama:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8081:8081"
    volumes:
      - app-data:/data
      - ./config:/data/config
      - agent-repo:/data/repo
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma4
      - WORKFLOW_ADMIN_SECRET=scenario-87-admin-secret
      - IMPROVEMENT_GOAL=You are in full control of this application's design and evolution. Audit the current state, identify missing features, gaps, and improvements. Plan and execute iterative improvements as an agile team would — each iteration should be a deployable increment. Interact with the running application to verify functionality. Continue improving until you believe the application is production-ready or you have completed 5 iterations.
    depends_on:
      ollama:
        condition: service_healthy
      app:
        condition: service_started

volumes:
  ollama-data:
  app-data:
  agent-repo:
