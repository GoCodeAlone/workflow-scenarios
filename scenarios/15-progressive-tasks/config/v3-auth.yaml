# ============================================================
# Scenario 15 — Phase 3: Add Auth
#
# Extends Phase 2 by adding JWT authentication for user
# registration, login, and profile. Auth endpoints are handled
# natively by the auth.jwt module via handler: jwt routes.
#
# Tasks created in Phase 1/2 have user_id=NULL and remain
# accessible. New tasks store null user_id (engine v0.2.9
# does not inject JWT user context into pipeline steps).
# ============================================================

modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: db
    type: storage.sqlite
    config:
      dbPath: "/data/tasks.db"
      maxConnections: 5
      walMode: true

  - name: jwt
    type: auth.jwt
    config:
      secret: "${JWT_SECRET}"
      issuer: "scenario-15-tasks"
      tokenExpiry: "24h"
    dependsOn: [router]

workflows:
  http:
    router: router
    server: server
    routes:
      # Auth endpoints — handled natively by the jwt module
      - method: POST
        path: /api/v1/auth/register
        handler: jwt

      - method: POST
        path: /api/v1/auth/login
        handler: jwt

      - method: GET
        path: /api/v1/auth/profile
        handler: jwt

pipelines:
  # ----------------------------------------------------------------
  # Health
  # ----------------------------------------------------------------
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "15-progressive-tasks"
            phase: "v3-auth"

  # ----------------------------------------------------------------
  # Internal — idempotent schema init (v3)
  # Preserves tasks + categories tables, adds user_id to tasks
  # ----------------------------------------------------------------
  init-db:
    trigger:
      type: http
      config:
        path: /internal/init-db
        method: POST
    steps:
      - name: create-tasks-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS tasks (
              id          INTEGER PRIMARY KEY AUTOINCREMENT,
              title       TEXT    NOT NULL,
              description TEXT    DEFAULT '',
              status      TEXT    NOT NULL DEFAULT 'open',
              created_at  TEXT    NOT NULL DEFAULT (datetime('now')),
              updated_at  TEXT    NOT NULL DEFAULT (datetime('now'))
            )
      - name: create-categories-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS categories (
              id         INTEGER PRIMARY KEY AUTOINCREMENT,
              name       TEXT    NOT NULL UNIQUE,
              color      TEXT    DEFAULT '#6366f1',
              created_at TEXT    NOT NULL DEFAULT (datetime('now'))
            )
      - name: add-category-id-column
        type: step.db_exec
        config:
          database: db
          query: "ALTER TABLE tasks ADD COLUMN category_id INTEGER"
          ignore_error: true
      - name: add-user-id-column
        type: step.db_exec
        config:
          database: db
          # NULL means "legacy task from pre-auth era" — still accessible
          query: "ALTER TABLE tasks ADD COLUMN user_id TEXT"
          ignore_error: true
      - name: create-users-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS jwt_users (
              id         TEXT    PRIMARY KEY,
              email      TEXT    NOT NULL UNIQUE,
              name       TEXT    DEFAULT '',
              created_at TEXT    NOT NULL DEFAULT (datetime('now'))
            )
          ignore_error: true
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            message: "v3 schema initialised"

  # ----------------------------------------------------------------
  # Tasks CRUD — accessible to all authenticated users
  # Legacy tasks (user_id IS NULL) are visible to all
  # New tasks are created without user_id (v0.2.9 limitation)
  # ----------------------------------------------------------------
  task-create:
    trigger:
      type: http
      config:
        path: /api/v1/tasks
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [title]
          source: "steps.parse-body.body"
      - name: insert
        type: step.db_exec
        config:
          database: db
          query: |
            INSERT INTO tasks (title, description, status, category_id, user_id)
            VALUES (?, ?, 'open', ?, ?)
          params:
            - "{{ .body.title }}"
            - "{{ .body.description }}"
            - "{{ .body.category_id }}"
            - "{{ .body.user_id }}"
      - name: fetch-created
        type: step.db_query
        config:
          database: db
          query: |
            SELECT t.id, t.title, t.description, t.status, t.category_id,
                   c.name AS category_name, t.user_id, t.created_at
            FROM tasks t
            LEFT JOIN categories c ON c.id = t.category_id
            WHERE t.id = last_insert_rowid()
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 201
          body_from: "steps.fetch-created.row"

  task-list:
    trigger:
      type: http
      config:
        path: /api/v1/tasks
        method: GET
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: check-auth
        type: step.conditional
        config:
          field: steps.parse-auth.headers.Authorization
          routes:
            "": unauthorized
          default: get-tasks
      - name: get-tasks
        type: step.db_query
        config:
          database: db
          query: |
            SELECT t.id, t.title, t.description, t.status, t.category_id,
                   c.name AS category_name, t.user_id, t.created_at, t.updated_at
            FROM tasks t
            LEFT JOIN categories c ON c.id = t.category_id
            ORDER BY t.created_at DESC LIMIT 100
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-tasks.rows"
      - name: unauthorized
        type: step.json_response
        config:
          status: 401
          body:
            error: unauthorized

  task-get:
    trigger:
      type: http
      config:
        path: /api/v1/tasks/{id}
        method: GET
    steps:
      - name: fetch
        type: step.db_query
        config:
          database: db
          query: |
            SELECT t.id, t.title, t.description, t.status, t.category_id,
                   c.name AS category_name, t.user_id, t.created_at, t.updated_at
            FROM tasks t
            LEFT JOIN categories c ON c.id = t.category_id
            WHERE t.id = ?
          params:
            - "{{ .id }}"
          mode: single
      - name: check-exists
        type: step.conditional
        config:
          field: steps.fetch.row.id
          routes:
            "": not-found
          default: respond-task
      - name: not-found
        type: step.json_response
        config:
          status: 404
          body:
            error: task not found
      - name: respond-task
        type: step.json_response
        config:
          status: 200
          body_from: "steps.fetch.row"

  task-update:
    trigger:
      type: http
      config:
        path: /api/v1/tasks/{id}
        method: PUT
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: update
        type: step.db_exec
        config:
          database: db
          query: |
            UPDATE tasks
            SET title       = COALESCE(?, title),
                description = COALESCE(?, description),
                status      = COALESCE(?, status),
                updated_at  = datetime('now')
            WHERE id = ?
          params:
            - "{{ .body.title }}"
            - "{{ .body.description }}"
            - "{{ .body.status }}"
            - "{{ .id }}"
      - name: fetch-updated
        type: step.db_query
        config:
          database: db
          query: |
            SELECT t.id, t.title, t.description, t.status, t.category_id,
                   c.name AS category_name, t.user_id, t.updated_at
            FROM tasks t
            LEFT JOIN categories c ON c.id = t.category_id
            WHERE t.id = ?
          params:
            - "{{ .id }}"
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.fetch-updated.row"

  task-delete:
    trigger:
      type: http
      config:
        path: /api/v1/tasks/{id}
        method: DELETE
    steps:
      - name: delete
        type: step.db_exec
        config:
          database: db
          query: "DELETE FROM tasks WHERE id = ?"
          params:
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            message: task deleted

  task-set-category:
    trigger:
      type: http
      config:
        path: /api/v1/tasks/{id}/category
        method: PUT
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [category_id]
          source: "steps.parse-body.body"
      - name: update
        type: step.db_exec
        config:
          database: db
          query: "UPDATE tasks SET category_id = ?, updated_at = datetime('now') WHERE id = ?"
          params:
            - "{{ .body.category_id }}"
            - "{{ .id }}"
      - name: fetch-updated
        type: step.db_query
        config:
          database: db
          query: |
            SELECT t.id, t.title, t.category_id, c.name AS category_name, t.user_id, t.updated_at
            FROM tasks t
            LEFT JOIN categories c ON c.id = t.category_id
            WHERE t.id = ?
          params:
            - "{{ .id }}"
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.fetch-updated.row"

  # ----------------------------------------------------------------
  # Categories (same as v2)
  # ----------------------------------------------------------------
  category-create:
    trigger:
      type: http
      config:
        path: /api/v1/categories
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [name]
          source: "steps.parse-body.body"
      - name: insert
        type: step.db_exec
        config:
          database: db
          query: "INSERT OR IGNORE INTO categories (name, color) VALUES (?, ?)"
          params:
            - "{{ .body.name }}"
            - "{{ .body.color }}"
      - name: fetch-created
        type: step.db_query
        config:
          database: db
          query: "SELECT id, name, color, created_at FROM categories WHERE name = ?"
          params:
            - "{{ .body.name }}"
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 201
          body_from: "steps.fetch-created.row"

  category-list:
    trigger:
      type: http
      config:
        path: /api/v1/categories
        method: GET
    steps:
      - name: get-categories
        type: step.db_query
        config:
          database: db
          query: "SELECT id, name, color, created_at FROM categories ORDER BY name ASC"
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-categories.rows"
