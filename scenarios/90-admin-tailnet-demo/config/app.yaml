        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: lookup
        type: step.authz_role_lookup
        config:
          subject: admin@tailnet
          roles: [admin]
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            - user: admin@tailnet
              role: admin
              context: admin
              scopes: ["admin:authz.roles:read", "admin:authz.roles:update"]
            - user: app-user@tailnet
              role: support
              context: frontend
              scopes: ["frontend:orders:read"]

  authz-roles-add:
    trigger:
      type: http
      config:
        path: /api/authz/roles
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: route-by-user
        type: step.conditional
        config:
          field: steps.authenticate.email
          routes:
            admin@tailnet: allow-update
          default: deny-update
      - name: allow-update
        type: step.authz_enforce
        config:
          subject: admin@tailnet
          resource: authz.roles
          action: update
          permitted: true
          reason: admin:authz.roles:update granted
      - name: allow-response
        type: step.json_response
        config:
          status: 200
          body:
            updated: true
            assignment: { _from: "steps.parse_request.body" }
            reason: { _from: "steps.allow-update.reason" }
      - name: deny-update
        type: step.authz_enforce
        config:
          subject: non-admin
          resource: authz.roles
          action: update
          permitted: false
          reason: missing admin:authz.roles:update
      - name: deny-response
        type: step.json_response
        config:
          status: 403
          body:
            updated: false
            reason: { _from: "steps.deny-update.reason" }

  authz-roles-delete:
    trigger:
      type: http
      config:
        path: /api/authz/roles
        method: DELETE
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
