modules:
    - name: server
      type: http.server
      config:
        address: ":8080"
    - name: router
      type: http.router
      dependsOn: [server]
    - name: db
      type: storage.sqlite
      config:
        dbPath: "/data/scenario.db"
        maxConnections: 5
        walMode: true
    - name: broker
      type: messaging.broker
      config:
        maxQueueSize: 1000
        deliveryTimeout: "30s"
workflows:
    http:
        router: router
        server: server
        routes: []
pipelines:
    health:
        trigger:
            type: http
            config:
                path: /healthz
                method: GET
        steps:
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    scenario: "10-content-moderation"
    init-db:
        trigger:
            type: http
            config:
                path: /internal/init-db
                method: POST
        steps:
            - name: create_content_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS content_items (
                      id TEXT PRIMARY KEY,
                      author TEXT NOT NULL,
                      content_type TEXT NOT NULL,
                      body TEXT NOT NULL,
                      status TEXT NOT NULL DEFAULT 'submitted',
                      rejection_reason TEXT,
                      reviewer TEXT,
                      created_at TEXT NOT NULL DEFAULT (datetime('now')),
                      updated_at TEXT NOT NULL DEFAULT (datetime('now'))
                    )
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    message: database initialized
    submit-content:
        trigger:
            type: http
            config:
                path: /api/v1/content/submit
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: validate_content
              type: step.validate
              config:
                strategy: required_fields
                required_fields: [author, content_type, body]
                source: "steps.parse_body.body"
            - name: gen_id
              type: step.set
              config:
                values:
                    content_id: "content-{{ uuidv4 }}"
            - name: check_auto_reject
              type: step.conditional
              config:
                field: body.content_type
                routes:
                    spam: do_auto_reject
                default: store_submitted
            - name: store_submitted
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO content_items (id, author, content_type, body, status, created_at, updated_at) VALUES (?, ?, ?, ?, 'submitted', datetime('now'), datetime('now'))"
                params:
                    - "{{ .content_id }}"
                    - "{{ .body.author }}"
                    - "{{ .body.content_type }}"
                    - "{{ .body.body }}"
            - name: publish_submitted
              type: step.publish
              config:
                topic: "content-events"
                broker: broker
            - name: respond_submitted
              type: step.json_response
              config:
                status: 201
                body:
                    id: "{{ .content_id }}"
                    status: submitted
                    message: content submitted for review
            - name: do_auto_reject
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO content_items (id, author, content_type, body, status, rejection_reason, created_at, updated_at) VALUES (?, ?, ?, ?, 'rejected', 'Auto-rejected: spam content type', datetime('now'), datetime('now'))"
                params:
                    - "{{ .content_id }}"
                    - "{{ .body.author }}"
                    - "{{ .body.content_type }}"
                    - "{{ .body.body }}"
            - name: respond_auto_rejected
              type: step.json_response
              config:
                status: 201
                body:
                    id: "{{ .content_id }}"
                    status: rejected
                    message: content auto-rejected as spam
    get-queue:
        trigger:
            type: http
            config:
                path: /api/v1/content/queue
                method: GET
        steps:
            - name: get_pending
              type: step.db_query
              config:
                database: db
                query: "SELECT id, author, content_type, status, created_at FROM content_items WHERE status IN ('submitted', 'in_review') ORDER BY created_at ASC"
                mode: list
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.get_pending.rows"
    get-content-status:
        trigger:
            type: http
            config:
                path: /api/v1/content/{id}/status
                method: GET
        steps:
            - name: fetch_item
              type: step.db_query
              config:
                database: db
                query: "SELECT id, author, content_type, status, rejection_reason, reviewer, created_at, updated_at FROM content_items WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_exists
              type: step.conditional
              config:
                field: steps.fetch_item.row.id
                routes:
                    "": not_found
                default: respond_status
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: content item not found
            - name: respond_status
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch_item.row"
    approve-content:
        trigger:
            type: http
            config:
                path: /api/v1/content/{id}/approve
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: fetch_item
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM content_items WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_item.row.status
                routes:
                    submitted: do_approve
                    in_review: do_approve
                    approved: already_decided
                    rejected: already_decided
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: content item not found
            - name: already_decided
              type: step.json_response
              config:
                status: 409
                body:
                    error: content already has a final decision
            - name: do_approve
              type: step.db_exec
              config:
                database: db
                query: "UPDATE content_items SET status = 'approved', reviewer = ?, updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .body.reviewer | default \"system\" }}"
                    - "{{ .id }}"
            - name: publish_approved
              type: step.publish
              config:
                topic: "content-approved"
                broker: broker
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: approved
                    message: content approved
    reject-content:
        trigger:
            type: http
            config:
                path: /api/v1/content/{id}/reject
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: validate_rejection
              type: step.validate
              config:
                strategy: required_fields
                required_fields: [reason]
                source: "steps.parse_body.body"
            - name: fetch_item
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM content_items WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_item.row.status
                routes:
                    submitted: do_reject
                    in_review: do_reject
                    approved: already_decided
                    rejected: already_decided
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: content item not found
            - name: already_decided
              type: step.json_response
              config:
                status: 409
                body:
                    error: content already has a final decision
            - name: do_reject
              type: step.db_exec
              config:
                database: db
                query: "UPDATE content_items SET status = 'rejected', rejection_reason = ?, reviewer = ?, updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .body.reason }}"
                    - "{{ .body.reviewer | default \"system\" }}"
                    - "{{ .id }}"
            - name: publish_rejected
              type: step.publish
              config:
                topic: "content-rejected"
                broker: broker
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: rejected
                    reason: "{{ .body.reason }}"
                    message: content rejected
    webhook-content:
        trigger:
            type: http
            config:
                path: /api/v1/webhooks/content
                method: POST
        steps:
            - name: verify_webhook
              type: step.webhook_verify
              config:
                provider: generic
                secret: "webhook-secret-scenario-10"
                header: "X-Webhook-Signature"
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: log_webhook
              type: step.log
              config:
                level: info
                message: "Webhook received and verified"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    message: webhook processed
    content-event-log:
        steps:
            - name: log
              type: step.log
              config:
                level: info
                message: "Content event received"
triggers:
    event:
        subscriptions:
            - topic: "content-events"
              workflow: "pipeline:content-event-log"
              action: "log"
            - topic: "content-approved"
              workflow: "pipeline:content-event-log"
              action: "log"
            - topic: "content-rejected"
              workflow: "pipeline:content-event-log"
              action: "log"
