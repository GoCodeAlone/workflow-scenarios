# ============================================================
# Scenario 86 — Self-Extending MCP Tooling: Agent Config
#
# Architecture: Two-phase agent loop.
# Phase 1: Create task_analytics pipeline with mcp_tool trigger
# Phase 2: Use the new tool, then create task_forecast tool
# ============================================================

modules:
  - name: ratchet-db
    type: storage.sqlite
    config:
      dbPath: /data/agent-state.db
      walMode: true

  - name: server
    type: http.server
    config:
      address: ":8081"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: ai
    type: agent.provider
    config:
      provider: ollama
      model: gemma4:e2b
      base_url: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      max_tokens: 8192

  - name: guardrails
    type: agent.guardrails
    config:
      defaults:
        enable_self_improvement: true
        enable_iac_modification: false
        require_human_approval: false
        require_diff_review: true
        max_iterations_per_cycle: 5
        deploy_strategy: hot_reload
        allowed_tools:
          - "mcp:wfctl:*"
          - "mcp:self_improve:*"
          - "file_read"
          - "file_write"
          - "file_list"
          - "git_status"
          - "git_commit"
          - "web_fetch"
          - "shell_exec"
        command_policy:
          mode: allowlist
          allowed_commands:
            - "wfctl"
            - "curl"
          enable_static_analysis: true
          block_pipe_to_shell: true
          block_script_execution: true
      immutable_sections:
        - path: "modules.guardrails"
          override: challenge_token
      override:
        mechanism: challenge_token
        admin_secret_env: "${WFCTL_ADMIN_SECRET:-scenario-86-admin-secret}"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "86-self-extending-mcp"
            component: agent

  mcp_tool_creation_loop:
    trigger:
      type: http
      config:
        path: /create-tools
        method: POST
    steps:
      - name: load_config
        type: step.set
        config:
          values:
            config_path: "${CONFIG_PATH:-/data/config/app.yaml}"
            provider: ai

      - name: inspect
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 5
          workspace: /data
          system_prompt: |
            You are a workflow MCP tool designer. Inspect the running workflow
            application config and identify what new endpoints can be added.

            AVAILABLE TOOLS:
            - file_read: Read a file. Args: {"path": "/path/to/file"}
            - mcp:wfctl:inspect_config: Inspect config structure. Args: {"yaml_content": "..."}
            - mcp:wfctl:list_step_types: List available pipeline step types. Args: {}

            TASK:
            1. Read the current config using file_read
            2. Inspect it with mcp:wfctl:inspect_config
            3. Report what analytics and forecast endpoints should be added

      - name: post_design
        type: step.blackboard_post
        config:
          phase: design
          artifact_type: mcp_tool_proposal

      - name: create_analytics_tool
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 20
          workspace: /data
          system_prompt: |
            You are a workflow MCP tool designer. Create a task_analytics endpoint.

            AVAILABLE TOOLS:
            - file_read: Read a file. Args: {"path": "/path/to/file"}
            - file_write: Write a file. Args: {"path": "/path", "content": "..."}
            - mcp:wfctl:validate_config: Validate workflow YAML. Args: {"yaml_content": "..."}
            - mcp:wfctl:inspect_config: Inspect config structure. Args: {"yaml_content": "..."}
            - mcp:wfctl:list_step_types: List available pipeline step types. Args: {}
            - mcp:wfctl:get_step_schema: Get schema for a step. Args: {"type": "step.db_query"}
            - git_commit: Commit changes. Args: {"message": "...", "paths": ["file1"]}

            WORKFLOW ENGINE YAML RULES:
            1. http.server uses 'address: ":8080"' NOT 'port: 8080'
            2. Database steps use 'database: db' NOT 'module: db'
            3. Query parameters use 'params:' NOT 'args:'
            4. DB query mode is 'list' or 'single' NOT 'many' or 'one'
            5. Response step type is 'step.json_response' NOT 'step.response'
            6. Pipelines have inline trigger blocks (type: http with path/method)

            TASK:
            1. Read the current config using file_read
            2. Add a task_analytics pipeline:
               - Trigger: GET /tasks/analytics
               - step.db_query: SELECT COUNT(*) as total,
                   SUM(CASE WHEN status='completed' THEN 1 ELSE 0 END) as completed,
                   SUM(CASE WHEN status='pending' THEN 1 ELSE 0 END) as pending
                   FROM tasks
               - step.json_response with the query results
            3. Validate with mcp:wfctl:validate_config
            4. Write the updated config using file_write
            5. Commit with git_commit

      - name: validate
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: deploy_tool
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH:-/data/config/app.yaml}"

      - name: use_tool
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 20
          workspace: /data
          system_prompt: |
            The task_analytics endpoint was just deployed. Verify it works,
            then create the task_forecast endpoint.

            AVAILABLE TOOLS:
            - file_read: Read a file. Args: {"path": "/path/to/file"}
            - file_write: Write a file. Args: {"path": "/path", "content": "..."}
            - mcp:wfctl:validate_config: Validate workflow YAML. Args: {"yaml_content": "..."}
            - web_fetch: Fetch a URL. Args: {"url": "http://..."}
            - git_commit: Commit changes. Args: {"message": "...", "paths": ["file1"]}

            TASK:
            1. Verify /tasks/analytics works using web_fetch
            2. Read the current config using file_read
            3. Add a task_forecast pipeline:
               - Trigger: GET /tasks/forecast
               - step.db_query: query that counts tasks per status and calculates trends
               - step.json_response with task_forecast data
            4. Validate, write, commit

      - name: post_iteration
        type: step.blackboard_post
        config:
          phase: iterate
          artifact_type: second_tool_proposal

      - name: validate_forecast
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: deploy_forecast
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH:-/data/config/app.yaml}"
