# ============================================================
# Scenario 20 — Auth Service
#
# JWT authentication microservice. Uses auth.jwt module's
# native handlers for register/login/validate(profile).
#
# The jwt module's in-memory user store handles auth natively.
# Register: POST /api/v1/auth/register (open self-registration)
# Login:    POST /api/v1/auth/login
# Validate: GET  /api/v1/auth/profile  (Bearer token → user claims)
# Admin create users: POST /api/v1/auth/users (requires admin token)
#
# Cross-namespace DNS:
#   http://workflow-server.wf-scenario-20.svc.cluster.local:8080
# ============================================================

modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: jwt
    type: auth.jwt
    config:
      secret: "scenario-20-auth-secret-key-minimum-32-bytes"
      issuer: "scenario-20-auth"
      tokenExpiry: "24h"
      allowRegistration: true
    dependsOn: [router]

workflows:
  http:
    router: router
    server: server
    routes:
      # Register — native jwt handler (first-user self-reg)
      - method: POST
        path: /api/v1/auth/register
        handler: jwt

      # Login — native jwt handler
      - method: POST
        path: /api/v1/auth/login
        handler: jwt

      # Validate token via profile — native jwt handler
      # Path must end with /auth/profile for jwt module to handle it
      - method: GET
        path: /api/v1/auth/profile
        handler: jwt

      # Admin: create additional users (requires admin Bearer token)
      - method: POST
        path: /api/v1/auth/users
        handler: jwt

pipelines:
  # ----------------------------------------------------------------
  # Health
  # ----------------------------------------------------------------
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "20-auth-service"

  # ----------------------------------------------------------------
  # Internal — no-op (jwt uses in-memory store, no DDL needed)
  # ----------------------------------------------------------------
  init-db:
    trigger:
      type: http
      config:
        path: /internal/init-db
        method: POST
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            message: "auth service ready (jwt in-memory store)"
