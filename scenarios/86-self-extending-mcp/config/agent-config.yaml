# ============================================================
# Scenario 86 — Self-Extending MCP Tooling: Agent Config
#
# Architecture: Two-phase agent loop.
# Phase 1: Create task_analytics pipeline with mcp_tool trigger
# Phase 2: Use the new tool, then create task_forecast tool
# ============================================================

modules:
  - name: ratchet-db
    type: storage.sqlite
    config:
      dbPath: /data/agent-state.db
      walMode: true

  - name: ratchet-tool-policy-engine
    type: ratchet.tool_policy_engine
    config:
      default_policy: allow

  - name: server
    type: http.server
    config:
      address: ":8081"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: ai
    type: agent.provider
    config:
      provider: ollama
      model: gemma4:e2b
      base_url: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      max_tokens: 8192

  - name: guardrails
    type: agent.guardrails
    config:
      defaults:
        enable_self_improvement: true
        enable_iac_modification: false
        require_human_approval: false
        require_diff_review: true
        max_iterations_per_cycle: 5
        deploy_strategy: hot_reload
        allowed_tools:
          - "mcp:wfctl:*"
          - "mcp:self_improve:*"
          - "file_read"
          - "file_write"
          - "file_list"
          - "git_status"
          - "git_commit"
          - "web_fetch"
          - "shell_exec"
        command_policy:
          mode: allowlist
          allowed_commands:
            - "wfctl"
            - "curl"
          enable_static_analysis: true
          block_pipe_to_shell: true
          block_script_execution: true
      immutable_sections:
        - path: "modules.guardrails"
          override: challenge_token
      override:
        mechanism: challenge_token
        admin_secret_env: "${WFCTL_ADMIN_SECRET:-scenario-86-admin-secret}"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "86-self-extending-mcp"
            component: agent

  mcp_tool_creation_loop:
    trigger:
      type: http
      config:
        path: /create-tools
        method: POST
    steps:
      - name: load_config
        type: step.set
        config:
          values:
            config_path: "${CONFIG_PATH}"
            provider: ai
            system_prompt: >-
              You are a workflow MCP tool designer. Use file_read to read the config,
              mcp_wfctl__inspect_config to inspect it, mcp_wfctl__list_step_types to list steps.
              Only use these tools: file_read, mcp_wfctl__inspect_config, mcp_wfctl__list_step_types.
            task: >-
              Read the config at ${CONFIG_PATH} using file_read, inspect it with
              mcp_wfctl__inspect_config, then report what analytics and forecast endpoints can be added.

      - name: inspect
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 5
          # NOTE: system_prompt and task come from load_config step.set above
            2. Inspect it with mcp:wfctl:inspect_config
            3. Report what analytics and forecast endpoints should be added

      - name: post_design
        type: step.blackboard_post
        config:
          phase: design
          artifact_type: mcp_tool_proposal

      - name: set_analytics_context
        type: step.set
        config:
          values:
            system_prompt: >-
              You are a workflow MCP tool designer. Use file_read, file_write,
              mcp_wfctl__validate_config, mcp_wfctl__list_step_types, git_commit only.
              YAML rules: database not module; params not args; mode list/single; step.json_response.
            task: >-
              Read ${CONFIG_PATH} with file_read. Add task_analytics pipeline
              (GET /tasks/analytics, step.db_query database:db mode:single
              query: SELECT COUNT(*) total FROM tasks). Validate with mcp_wfctl__validate_config,
              write with file_write, commit with git_commit.

      - name: create_analytics_tool
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 20

      - name: validate
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: deploy_tool
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH}"

      - name: use_tool
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 20
          # system_prompt and task come from set_analytics_context above

      - name: set_forecast_context
        type: step.set
        config:
          values:
            system_prompt: >-
              Verify the analytics endpoint works then add a forecast pipeline.
              Use web_fetch, file_read, file_write, mcp_wfctl__validate_config, git_commit only.
            task: >-
              Use web_fetch to verify GET ${BASE_APP_URL}/tasks/analytics works. Then read
              ${CONFIG_PATH} with file_read, add task_forecast pipeline (GET /tasks/forecast,
              step.db_query database:db mode:list), validate, write, commit.

      - name: post_iteration
        type: step.blackboard_post
        config:
          phase: iterate
          artifact_type: second_tool_proposal

      - name: validate_forecast
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: deploy_forecast
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH}"
