name: Signal Outbox Batch Enqueue
id: "135-signal-outbox-batch-enqueue"
category: C
description: |
  Local-only Workflow app proof that workflow-plugin-signal v0.35.1 persists
  atomic Signal outbox batch enqueue behavior in a scenario-owned SQLite
  envelope store. The app encrypts two caller-supplied messages through
  Workflow HTTP routes, enqueues them with step.signal_outbox_enqueue_batch,
  rejects an invalid duplicate-idempotency batch without partial persistence,
  and verifies queued records survive restart without exposing plaintext,
  custody refs, or authorization refs from public status responses.
components:
  - workflow-plugin-signal
  - workflow-server
  - HTTP trigger routes
  - Workflow external plugin loader
  - signal.identity_store
  - signal.envelope_store
  - step.signal_session_prepare
  - step.signal_encrypt
  - step.signal_outbox_enqueue_batch
  - step.signal_envelope_status
status: testable
tags:
  - signal
  - batch-enqueue
  - outbox
  - workflow-plugin
  - local-only
  - encrypted
  - sqlite
  - atomicity
  - restart-persistence
runtime: local
