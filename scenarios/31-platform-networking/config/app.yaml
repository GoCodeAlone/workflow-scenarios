modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: aws-provider
    type: iac.provider
    config:
      provider: aws
      credentials: env
      region: us-east-1

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  - name: prod-vpc
    type: infra.vpc
    config:
      provider: aws-provider
      cidr: "10.0.0.0/16"
      name: prod-vpc
      subnets:
        - name: public-a
          cidr: "10.0.1.0/24"
          az: us-east-1a
          public: true
        - name: public-b
          cidr: "10.0.2.0/24"
          az: us-east-1b
          public: true
        - name: private-a
          cidr: "10.0.10.0/24"
          az: us-east-1a
          public: false
        - name: private-b
          cidr: "10.0.11.0/24"
          az: us-east-1b
          public: false
      nat_gateway: true

  - name: prod-firewall
    type: infra.firewall
    config:
      provider: aws-provider
      vpc: prod-vpc
      security_groups:
        - name: web
          rules:
            - protocol: tcp
              port: 443
              source: "0.0.0.0/0"
            - protocol: tcp
              port: 80
              source: "0.0.0.0/0"
        - name: internal
          rules:
            - protocol: tcp
              port: 5432
              source: "10.0.0.0/16"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "31-platform-networking"

  network-plan:
    trigger:
      type: http
      config:
        path: /api/v1/networks/plan
        method: POST
    steps:
      - name: plan_vpc
        type: step.iac_plan
        config:
          platform: prod-vpc
          resource_id: prod-vpc
          state_store: iac-state
      - name: plan_firewall
        type: step.iac_plan
        config:
          platform: prod-firewall
          resource_id: prod-firewall
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  network-apply:
    trigger:
      type: http
      config:
        path: /api/v1/networks/apply
        method: POST
    steps:
      - name: apply_vpc
        type: step.iac_apply
        config:
          platform: prod-vpc
          resource_id: prod-vpc
          state_store: iac-state
      - name: apply_firewall
        type: step.iac_apply
        config:
          platform: prod-firewall
          resource_id: prod-firewall
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  network-status:
    trigger:
      type: http
      config:
        path: /api/v1/networks/status
        method: GET
    steps:
      - name: status_vpc
        type: step.iac_status
        config:
          platform: prod-vpc
          resource_id: prod-vpc
          state_store: iac-state
      - name: status_firewall
        type: step.iac_status
        config:
          platform: prod-firewall
          resource_id: prod-firewall
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."
