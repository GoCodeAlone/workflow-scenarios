# ============================================================
# Scenario 17 — Phase 2: Add Notes, Tags, Search
#
# Extends Phase 1 by adding:
#   - contact_notes: freeform notes per contact
#   - contact_tags: many-to-many tags per contact
#   - POST /api/v1/contacts/{id}/notes — add note
#   - GET /api/v1/contacts/{id}/notes — list notes
#   - POST /api/v1/contacts/{id}/tags — add tag
#   - GET /api/v1/contacts/search?tag=X — search by tag
#
# contacts table (and all data in it) is preserved via
# CREATE TABLE IF NOT EXISTS. New tables are additive only.
#
# This config is also input to:
#   wfctl api extract v2-notes.yaml → openapi-v2.json
#   wfctl ui scaffold -spec openapi-v2.json -output generated/ui-v2/
# ============================================================

modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: db
    type: storage.sqlite
    config:
      dbPath: "/data/contacts.db"
      maxConnections: 5
      walMode: true

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  # ----------------------------------------------------------------
  # Health
  # ----------------------------------------------------------------
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "17-full-lifecycle"
            phase: "v2-notes"

  # ----------------------------------------------------------------
  # Internal — idempotent schema init (v2)
  # ----------------------------------------------------------------
  init-db:
    trigger:
      type: http
      config:
        path: /internal/init-db
        method: POST
    steps:
      - name: create-contacts-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS contacts (
              id         INTEGER PRIMARY KEY AUTOINCREMENT,
              name       TEXT    NOT NULL,
              email      TEXT    NOT NULL UNIQUE,
              phone      TEXT    DEFAULT '',
              company    TEXT    DEFAULT '',
              created_at TEXT    NOT NULL DEFAULT (datetime('now')),
              updated_at TEXT    NOT NULL DEFAULT (datetime('now'))
            )
      - name: create-notes-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS contact_notes (
              id         INTEGER PRIMARY KEY AUTOINCREMENT,
              contact_id INTEGER NOT NULL,
              note       TEXT    NOT NULL,
              created_at TEXT    NOT NULL DEFAULT (datetime('now'))
            )
      - name: create-tags-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS contact_tags (
              id         INTEGER PRIMARY KEY AUTOINCREMENT,
              contact_id INTEGER NOT NULL,
              tag        TEXT    NOT NULL,
              created_at TEXT    NOT NULL DEFAULT (datetime('now')),
              UNIQUE(contact_id, tag)
            )
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            message: "v2 schema initialised"

  # ----------------------------------------------------------------
  # Contacts CRUD (same as v1)
  # ----------------------------------------------------------------
  contact-create:
    trigger:
      type: http
      config:
        path: /api/v1/contacts
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [name, email]
          source: "steps.parse-body.body"
      - name: insert
        type: step.db_exec
        config:
          database: db
          query: |
            INSERT INTO contacts (name, email, phone, company)
            VALUES (?, ?, ?, ?)
          params:
            - "{{ .body.name }}"
            - "{{ .body.email }}"
            - "{{ .body.phone }}"
            - "{{ .body.company }}"
      - name: fetch-created
        type: step.db_query
        config:
          database: db
          query: "SELECT id, name, email, phone, company, created_at FROM contacts WHERE id = last_insert_rowid()"
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 201
          body_from: "steps.fetch-created.row"

  contact-list:
    trigger:
      type: http
      config:
        path: /api/v1/contacts
        method: GET
    steps:
      - name: get-contacts
        type: step.db_query
        config:
          database: db
          query: "SELECT id, name, email, phone, company, created_at, updated_at FROM contacts ORDER BY name ASC LIMIT 100"
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-contacts.rows"

  contact-get:
    trigger:
      type: http
      config:
        path: /api/v1/contacts/{id}
        method: GET
    steps:
      - name: fetch
        type: step.db_query
        config:
          database: db
          query: "SELECT id, name, email, phone, company, created_at, updated_at FROM contacts WHERE id = ?"
          params:
            - "{{ .id }}"
          mode: single
      - name: check-exists
        type: step.conditional
        config:
          field: steps.fetch.row.id
          routes:
            "": not-found
          default: respond-contact
      - name: not-found
        type: step.json_response
        config:
          status: 404
          body:
            error: contact not found
      - name: respond-contact
        type: step.json_response
        config:
          status: 200
          body_from: "steps.fetch.row"

  contact-update:
    trigger:
      type: http
      config:
        path: /api/v1/contacts/{id}
        method: PUT
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: update
        type: step.db_exec
        config:
          database: db
          query: |
            UPDATE contacts
            SET name    = COALESCE(?, name),
                email   = COALESCE(?, email),
                phone   = COALESCE(?, phone),
                company = COALESCE(?, company),
                updated_at = datetime('now')
            WHERE id = ?
          params:
            - "{{ .body.name }}"
            - "{{ .body.email }}"
            - "{{ .body.phone }}"
            - "{{ .body.company }}"
            - "{{ .id }}"
      - name: fetch-updated
        type: step.db_query
        config:
          database: db
          query: "SELECT id, name, email, phone, company, updated_at FROM contacts WHERE id = ?"
          params:
            - "{{ .id }}"
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.fetch-updated.row"

  contact-delete:
    trigger:
      type: http
      config:
        path: /api/v1/contacts/{id}
        method: DELETE
    steps:
      - name: delete
        type: step.db_exec
        config:
          database: db
          query: "DELETE FROM contacts WHERE id = ?"
          params:
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            message: contact deleted

  # ----------------------------------------------------------------
  # Notes — per contact
  # ----------------------------------------------------------------
  contact-add-note:
    trigger:
      type: http
      config:
        path: /api/v1/contacts/{id}/notes
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [note]
          source: "steps.parse-body.body"
      - name: insert
        type: step.db_exec
        config:
          database: db
          query: "INSERT INTO contact_notes (contact_id, note) VALUES (?, ?)"
          params:
            - "{{ .id }}"
            - "{{ .body.note }}"
      - name: fetch-created
        type: step.db_query
        config:
          database: db
          query: "SELECT id, contact_id, note, created_at FROM contact_notes WHERE id = last_insert_rowid()"
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 201
          body_from: "steps.fetch-created.row"

  contact-list-notes:
    trigger:
      type: http
      config:
        path: /api/v1/contacts/{id}/notes
        method: GET
    steps:
      - name: get-notes
        type: step.db_query
        config:
          database: db
          query: "SELECT id, contact_id, note, created_at FROM contact_notes WHERE contact_id = ? ORDER BY created_at DESC"
          params:
            - "{{ .id }}"
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-notes.rows"

  # ----------------------------------------------------------------
  # Tags — per contact
  # ----------------------------------------------------------------
  contact-add-tag:
    trigger:
      type: http
      config:
        path: /api/v1/contacts/{id}/tags
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [tag]
          source: "steps.parse-body.body"
      - name: insert
        type: step.db_exec
        config:
          database: db
          # UNIQUE(contact_id, tag) prevents duplicates; ignore if exists
          query: "INSERT OR IGNORE INTO contact_tags (contact_id, tag) VALUES (?, ?)"
          params:
            - "{{ .id }}"
            - "{{ .body.tag }}"
      - name: respond
        type: step.json_response
        config:
          status: 201
          body:
            contact_id: "{{ .id }}"
            tag: "{{ .body.tag }}"
            message: tag added

  contact-list-tags:
    trigger:
      type: http
      config:
        path: /api/v1/contacts/{id}/tags
        method: GET
    steps:
      - name: get-tags
        type: step.db_query
        config:
          database: db
          query: "SELECT id, contact_id, tag, created_at FROM contact_tags WHERE contact_id = ? ORDER BY tag ASC"
          params:
            - "{{ .id }}"
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-tags.rows"

  # ----------------------------------------------------------------
  # Search contacts by tag
  # ----------------------------------------------------------------
  contact-search-by-tag:
    trigger:
      type: http
      config:
        path: /api/v1/contacts/search
        method: GET
    steps:
      - name: search
        type: step.db_query
        config:
          database: db
          query: |
            SELECT DISTINCT c.id, c.name, c.email, c.phone, c.company, c.created_at
            FROM contacts c
            JOIN contact_tags ct ON ct.contact_id = c.id
            WHERE ct.tag = ?
            ORDER BY c.name ASC
          params:
            - "{{ .query.tag }}"
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.search.rows"
