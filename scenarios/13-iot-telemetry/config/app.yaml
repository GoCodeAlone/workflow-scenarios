modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: db
    type: storage.sqlite
    config:
      dbPath: "/data/scenario.db"
      maxConnections: 5
      walMode: true

  - name: broker
    type: messaging.broker
    config:
      maxQueueSize: 1000
      deliveryTimeout: "30s"

  - name: cache
    type: cache.memory
    config:
      defaultTTL: "300s"
      maxEntries: 10000

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "13-iot-telemetry"

  init-db:
    trigger:
      type: http
      config:
        path: /internal/init-db
        method: POST
    steps:
      - name: create-sensors-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS sensors (
              id TEXT PRIMARY KEY,
              name TEXT NOT NULL,
              sensor_type TEXT NOT NULL,
              location TEXT NOT NULL,
              threshold_value REAL,
              threshold_operator TEXT DEFAULT 'gt',
              status TEXT NOT NULL DEFAULT 'active',
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              updated_at TEXT NOT NULL DEFAULT (datetime('now'))
            )
      - name: create-readings-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS sensor_readings (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              sensor_id TEXT NOT NULL,
              value REAL NOT NULL,
              unit TEXT,
              ts TEXT NOT NULL DEFAULT (datetime('now')),
              alert_triggered INTEGER NOT NULL DEFAULT 0
            )
      - name: create-alerts-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS sensor_alerts (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              sensor_id TEXT NOT NULL,
              reading_value REAL NOT NULL,
              threshold_value REAL NOT NULL,
              message TEXT NOT NULL,
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            )
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            message: database initialized

  register-sensor:
    trigger:
      type: http
      config:
        path: /api/v1/sensors/register
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate-sensor
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [name, sensor_type, location]
          source: "steps.parse-body.body"
      - name: gen-id
        type: step.set_variable
        config:
          name: sensor_id
          value: "sensor-{{ randHex 8 }}"
      - name: insert-sensor
        type: step.db_exec
        config:
          database: db
          query: "INSERT INTO sensors (id, name, sensor_type, location, threshold_value, threshold_operator, status, created_at, updated_at) VALUES (?, ?, ?, ?, ?, ?, 'active', datetime('now'), datetime('now'))"
          params:
            - "{{ .vars.sensor_id }}"
            - "{{ .body.name }}"
            - "{{ .body.sensor_type }}"
            - "{{ .body.location }}"
            - "{{ .body.threshold_value | default \"\" }}"
            - "{{ .body.threshold_operator | default \"gt\" }}"
      - name: respond
        type: step.json_response
        config:
          status: 201
          body:
            id: "{{ .vars.sensor_id }}"
            status: active
            message: sensor registered

  ingest-reading:
    trigger:
      type: http
      config:
        path: /api/v1/sensors/{id}/data
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate-reading
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [value]
          source: "steps.parse-body.body"
      - name: fetch-sensor
        type: step.db_query
        config:
          database: db
          query: "SELECT id, name, sensor_type, threshold_value, threshold_operator FROM sensors WHERE id = ? AND status = 'active'"
          params:
            - "{{ .path.id }}"
          mode: single
      - name: check-sensor-exists
        type: step.conditional
        config:
          field: steps.fetch-sensor.row.id
          routes:
            "": sensor-not-found
          default: store-reading
      - name: sensor-not-found
        type: step.json_response
        config:
          status: 404
          body:
            error: sensor not found or inactive
      - name: store-reading
        type: step.db_exec
        config:
          database: db
          query: "INSERT INTO sensor_readings (sensor_id, value, unit, ts) VALUES (?, ?, ?, datetime('now'))"
          params:
            - "{{ .path.id }}"
            - "{{ .body.value }}"
            - "{{ .body.unit | default \"\" }}"
      - name: update-cache
        type: step.cache_set
        config:
          cache: cache
          key: "sensor:latest:{{ .path.id }}"
          value_from: "steps.parse-body.body"
          ttl: "600s"
      - name: check-threshold
        type: step.conditional
        config:
          field: steps.fetch-sensor.row.threshold_value
          routes:
            "": respond-ok
            "<nil>": respond-ok
          default: evaluate-threshold
      - name: evaluate-threshold
        type: step.set_variable
        config:
          name: alert_triggered
          value: "{{ gt (float64 .body.value) (float64 .steps.fetch-sensor.row.threshold_value) }}"
      - name: check-alert
        type: step.conditional
        config:
          field: vars.alert_triggered
          routes:
            "true": fire-alert
          default: respond-ok
      - name: fire-alert
        type: step.db_exec
        config:
          database: db
          query: "INSERT INTO sensor_alerts (sensor_id, reading_value, threshold_value, message) VALUES (?, ?, ?, ?)"
          params:
            - "{{ .path.id }}"
            - "{{ .body.value }}"
            - "{{ .steps.fetch-sensor.row.threshold_value }}"
            - "Threshold exceeded: value {{ .body.value }} > threshold {{ .steps.fetch-sensor.row.threshold_value }}"
      - name: publish-alert
        type: step.publish
        config:
          topic: "sensor-alerts"
          broker: broker
      - name: respond-alert
        type: step.json_response
        config:
          status: 202
          body:
            sensor_id: "{{ .path.id }}"
            value: "{{ .body.value }}"
            alert: true
            message: reading ingested and alert triggered
      - name: respond-ok
        type: step.json_response
        config:
          status: 202
          body:
            sensor_id: "{{ .path.id }}"
            value: "{{ .body.value }}"
            alert: false
            message: reading ingested

  get-latest-reading:
    trigger:
      type: http
      config:
        path: /api/v1/sensors/{id}/latest
        method: GET
    steps:
      - name: check-cache
        type: step.cache_get
        config:
          cache: cache
          key: "sensor:latest:{{ .path.id }}"
      - name: cache-hit-check
        type: step.conditional
        config:
          field: steps.check-cache.hit
          routes:
            "true": respond-cached
          default: fetch-db-latest
      - name: fetch-db-latest
        type: step.db_query
        config:
          database: db
          query: "SELECT sensor_id, value, unit, ts, alert_triggered FROM sensor_readings WHERE sensor_id = ? ORDER BY ts DESC LIMIT 1"
          params:
            - "{{ .path.id }}"
          mode: single
      - name: check-has-reading
        type: step.conditional
        config:
          field: steps.fetch-db-latest.row.sensor_id
          routes:
            "": no-readings
          default: respond-db
      - name: no-readings
        type: step.json_response
        config:
          status: 404
          body:
            error: no readings found for sensor
      - name: respond-db
        type: step.json_response
        config:
          status: 200
          body_from: "steps.fetch-db-latest.row"
      - name: respond-cached
        type: step.json_response
        config:
          status: 200
          body_from: "steps.check-cache.value"

  get-alerts:
    trigger:
      type: http
      config:
        path: /api/v1/sensors/{id}/alerts
        method: GET
    steps:
      - name: check-sensor
        type: step.db_query
        config:
          database: db
          query: "SELECT id FROM sensors WHERE id = ?"
          params:
            - "{{ .path.id }}"
          mode: single
      - name: check-exists
        type: step.conditional
        config:
          field: steps.check-sensor.row.id
          routes:
            "": not-found
          default: get-alert-list
      - name: not-found
        type: step.json_response
        config:
          status: 404
          body:
            error: sensor not found
      - name: get-alert-list
        type: step.db_query
        config:
          database: db
          query: "SELECT id, sensor_id, reading_value, threshold_value, message, created_at FROM sensor_alerts WHERE sensor_id = ? ORDER BY created_at DESC LIMIT 50"
          params:
            - "{{ .path.id }}"
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-alert-list.rows"

  set-threshold:
    trigger:
      type: http
      config:
        path: /api/v1/sensors/{id}/threshold
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate-threshold
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [value]
          source: "steps.parse-body.body"
      - name: check-sensor
        type: step.db_query
        config:
          database: db
          query: "SELECT id FROM sensors WHERE id = ?"
          params:
            - "{{ .path.id }}"
          mode: single
      - name: check-exists
        type: step.conditional
        config:
          field: steps.check-sensor.row.id
          routes:
            "": not-found
          default: update-threshold
      - name: not-found
        type: step.json_response
        config:
          status: 404
          body:
            error: sensor not found
      - name: update-threshold
        type: step.db_exec
        config:
          database: db
          query: "UPDATE sensors SET threshold_value = ?, threshold_operator = ?, updated_at = datetime('now') WHERE id = ?"
          params:
            - "{{ .body.value }}"
            - "{{ .body.operator | default \"gt\" }}"
            - "{{ .path.id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            sensor_id: "{{ .path.id }}"
            threshold: "{{ .body.value }}"
            operator: "{{ .body.operator | default \"gt\" }}"
            message: threshold updated

  list-sensors:
    trigger:
      type: http
      config:
        path: /api/v1/sensors
        method: GET
    steps:
      - name: get-sensors
        type: step.db_query
        config:
          database: db
          query: "SELECT id, name, sensor_type, location, threshold_value, threshold_operator, status, created_at FROM sensors ORDER BY created_at DESC"
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-sensors.rows"

  alert-event-log:
    steps:
      - name: log
        type: step.log
        config:
          level: warn
          message: "Sensor alert triggered"

triggers:
  event:
    subscriptions:
      - topic: "sensor-alerts"
        workflow: "pipeline:alert-event-log"
        action: "log"
