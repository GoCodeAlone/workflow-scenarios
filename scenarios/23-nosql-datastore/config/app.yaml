modules:
  - name: server
    type: http.server
    config:
      address: ":18123"
  - name: router
    type: http.router
    dependsOn: [server]
  - name: items
    type: nosql.memory
    config:
      collection: items
workflows:
  http:
    router: router
    server: server
pipelines:
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "23-nosql-datastore"

  create-item:
    trigger:
      type: http
      config:
        path: /api/items
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          parse_body: true
          merge_body: true
      - name: store
        type: step.nosql_put
        config:
          store: items
          key: "item:{{ .id }}"
          item: body
      - name: respond
        type: step.json_response
        config:
          status: 201
          body:
            stored: true
            key: "{{ .key }}"
            item:
              _from: body

  get-item:
    trigger:
      type: http
      config:
        path: /api/items/{id}
        method: GET
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [id]
      - name: validate_id
        type: step.validate_path_param
        config:
          params: [id]
          source: steps.parse.path_params
      - name: fetch
        type: step.nosql_get
        config:
          store: items
          key: 'item:{{ index .steps "parse" "path_params" "id" }}'
          output: item
          miss_ok: true
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            found:
              _from: found
            item:
              _from: item

  list-items:
    trigger:
      type: http
      config:
        path: /api/items
        method: GET
    steps:
      - name: query
        type: step.nosql_query
        config:
          store: items
          prefix: "item:"
          output: items
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            items:
              _from: items
            count:
              _from: count

  delete-item:
    trigger:
      type: http
      config:
        path: /api/items/{id}
        method: DELETE
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [id]
      - name: validate_id
        type: step.validate_path_param
        config:
          params: [id]
          source: steps.parse.path_params
      - name: remove
        type: step.nosql_delete
        config:
          store: items
          key: 'item:{{ index .steps "parse" "path_params" "id" }}'
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            deleted: true
            key: "{{ .key }}"
