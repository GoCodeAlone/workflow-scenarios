apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-server
  namespace: wf-scenario-35
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: workflow-server
    spec:
      containers:
        - name: workflow-server
          image: workflow-server:local
          imagePullPolicy: Never
          args: ["-config", "/config/app.yaml", "-data-dir", "/tmp"]
          ports:
            - containerPort: 18135
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18135
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 20
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: app
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-server
  namespace: wf-scenario-35
spec:
  selector:
    app: workflow-server
  ports:
    - port: 18135
      targetPort: 18135
