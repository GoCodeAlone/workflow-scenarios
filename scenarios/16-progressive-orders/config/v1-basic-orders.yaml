# ============================================================
# Scenario 16 — Phase 1: Basic Order CRUD
#
# Simple order creation and listing. Orders have id, items
# (JSON), total, status=pending, created_at. No state machine.
# Data created here must survive Phase 2 and 3 upgrades.
# ============================================================

modules:
    - name: server
      type: http.server
      config:
        address: ":8080"
    - name: router
      type: http.router
      dependsOn: [server]
    - name: db
      type: storage.sqlite
      config:
        dbPath: "/data/orders.db"
        maxConnections: 5
        walMode: true
workflows:
    http:
        router: router
        server: server
        routes: []
pipelines:
    # ----------------------------------------------------------------
    # Health
    # ----------------------------------------------------------------
    health:
        trigger:
            type: http
            config:
                path: /healthz
                method: GET
        steps:
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    scenario: "16-progressive-orders"
                    phase: "v1-basic-orders"
    # ----------------------------------------------------------------
    # Internal — idempotent schema init (v1)
    # ----------------------------------------------------------------
    init-db:
        trigger:
            type: http
            config:
                path: /internal/init-db
                method: POST
        steps:
            - name: create_orders_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS orders (
                      id           TEXT    PRIMARY KEY,
                      customer_email TEXT  NOT NULL,
                      items        TEXT    NOT NULL,
                      total        REAL    DEFAULT 0,
                      status       TEXT    NOT NULL DEFAULT 'pending',
                      created_at   TEXT    NOT NULL DEFAULT (datetime('now')),
                      updated_at   TEXT    NOT NULL DEFAULT (datetime('now'))
                    )
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    message: "v1 schema initialised"
    # ----------------------------------------------------------------
    # Orders CRUD
    # ----------------------------------------------------------------
    create-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: validate
              type: step.validate
              config:
                strategy: required_fields
                required_fields: [customer_email, items]
                source: "steps.parse_body.body"
            - name: gen_id
              type: step.set
              config:
                values:
                    order_id: "order-{{ uuidv4 }}"
            - name: insert
              type: step.db_exec
              config:
                database: db
                query: |
                    INSERT INTO orders (id, customer_email, items, total, status)
                    VALUES (?, ?, ?, ?, 'pending')
                params:
                    - "{{ .order_id }}"
                    - "{{ .body.customer_email }}"
                    - "{{ json .body.items }}"
                    - "{{ .body.total }}"
            - name: respond
              type: step.json_response
              config:
                status: 201
                body:
                    id: "{{ .order_id }}"
                    status: pending
                    customer_email: "{{ .body.customer_email }}"
                    message: order created
    list-orders:
        trigger:
            type: http
            config:
                path: /api/v1/orders
                method: GET
        steps:
            - name: get_orders
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_email, total, status, created_at, updated_at FROM orders ORDER BY created_at DESC LIMIT 100"
                mode: list
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.get_orders.rows"
    get-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}
                method: GET
        steps:
            - name: fetch
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_email, items, total, status, created_at, updated_at FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_exists
              type: step.conditional
              config:
                field: steps.fetch.row.id
                routes:
                    "": not_found
                default: respond_order
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: respond_order
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch.row"
