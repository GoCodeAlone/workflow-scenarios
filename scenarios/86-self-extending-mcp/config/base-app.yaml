# ============================================================
# Scenario 86 — Self-Extending MCP Tooling: Base Task API
#
# A basic task CRUD API with SQLite. The agent will create new
# MCP-exposed tools (mcp_tool triggers) as workflow pipelines,
# then use those tools to analyze task data and create further
# tools iteratively.
# ============================================================

modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: db
    type: storage.sqlite
    config:
      dbPath: /data/tasks.db
      walMode: true
    dependsOn: [router]

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "86-self-extending-mcp"

  list_tasks:
    trigger:
      type: http
      config:
        path: /tasks
        method: GET
    steps:
      - name: query
        type: step.db_query
        config:
          database: db
          mode: list
          query: "SELECT id, title, description, status, priority, created_at, updated_at, completed_at FROM tasks ORDER BY created_at DESC"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.query.rows"

  create_task:
    trigger:
      type: http
      config:
        path: /tasks
        method: POST
    steps:
      - name: insert
        type: step.db_exec
        config:
          database: db
          query: "INSERT INTO tasks (title, description, status, priority, created_at, updated_at) VALUES (?, ?, 'pending', ?, datetime('now'), datetime('now'))"
          params:
            - "{{ .body.title }}"
            - "{{ .body.description | default \"\" }}"
            - "{{ .body.priority | default \"medium\" }}"
      - name: respond
        type: step.json_response
        config:
          status: 201
          body_from: "steps.insert"

  get_task:
    trigger:
      type: http
      config:
        path: /tasks/{id}
        method: GET
    steps:
      - name: query
        type: step.db_query
        config:
          database: db
          mode: single
          query: "SELECT id, title, description, status, priority, created_at, updated_at, completed_at FROM tasks WHERE id = ?"
          params:
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.query.row"

  update_task:
    trigger:
      type: http
      config:
        path: /tasks/{id}
        method: PUT
    steps:
      - name: update
        type: step.db_exec
        config:
          database: db
          query: "UPDATE tasks SET title = COALESCE(?, title), description = COALESCE(?, description), status = COALESCE(?, status), priority = COALESCE(?, priority), updated_at = datetime('now'), completed_at = CASE WHEN ? = 'done' THEN datetime('now') ELSE completed_at END WHERE id = ?"
          params:
            - "{{ .body.title | default nil }}"
            - "{{ .body.description | default nil }}"
            - "{{ .body.status | default nil }}"
            - "{{ .body.priority | default nil }}"
            - "{{ .body.status | default \"\" }}"
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: updated

  delete_task:
    trigger:
      type: http
      config:
        path: /tasks/{id}
        method: DELETE
    steps:
      - name: delete
        type: step.db_exec
        config:
          database: db
          query: "DELETE FROM tasks WHERE id = ?"
          params:
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: deleted
