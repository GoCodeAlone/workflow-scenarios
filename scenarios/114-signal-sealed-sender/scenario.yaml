name: Signal Sealed Sender
id: "114-signal-sealed-sender"
category: C
description: |
  Local-only Workflow app proof that workflow-plugin-signal can wrap a Signal
  session envelope in sealed-sender wire bytes, move only the sealed transport
  across a mock queue boundary, and reveal the sender only after a recipient-
  scoped Workflow route unseals and decrypts the message.

  The scenario builds workflow-plugin-signal v0.19.0 as an external plugin,
  launches workflow-server, prepares caller-selected participant bundles,
  sends sealed messages through participant-parametric HTTP routes, verifies
  the mock transport does not expose plaintext or sender identity, rejects
  wrong-principal, wrong-recipient, visible-routing-tamper, sealed-byte-tamper,
  and wrong-trust-root cases, then repeats the same route flow with a second
  participant pair. No official Signal service egress.
components:
  - workflow-plugin-signal
  - workflow-server
  - HTTP trigger routes
  - Workflow external plugin loader
  - signal.identity_store
  - step.signal_session_prepare
  - step.signal_encrypt
  - step.signal_sender_certificate_issue
  - step.signal_sender_seal
  - step.signal_sender_unseal
  - step.signal_decrypt
  - mock sealed transport boundary
status: testable
tags:
  - signal
  - sealed-sender
  - e2e-encryption
  - workflow-plugin
  - local-only
  - sender-privacy
  - tamper-rejection
runtime: local
