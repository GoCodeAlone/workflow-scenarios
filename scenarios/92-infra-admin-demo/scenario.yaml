name: Infra Admin GitOps Demo (v1.1)
id: "92-infra-admin-demo"
category: C
description: |
  Boots a full admin stack with workflow-plugin-admin + infra.admin module +
  stub iac.provider (in-process fixture). Demonstrates the infra GitOps
  workflow:

    1. Load catalog (regions + types) via GET /api/infra/providers/stub/catalog
    2. Plan resources via POST /api/infra/plan (stub: 1 "create" action per spec)
    3. Commit desired-state YAML to a bare-git-repo fixture via
       POST /api/infra/commit (step.sandbox_exec git clone/commit/push)
    4. Drift detection via GET /api/infra/drift (stub: no drift, supported:true)
    5. Secrets metadata management via GET/POST /api/infra/secrets

  AuthZ:
    - Mutation routes (plan/apply/commit/secrets-POST) require Bearer token → 401 unauthenticated
    - Cross-origin mutations without Bearer rejected (CSRF defence)
    - Operator role: full read + plan + apply + commit
    - Viewer role: read only

  The infra SPA at /admin/infra/ is served as an admin.dashboard contribution
  (id: infra-resources) and registered via the standard admin pipeline.

  Playwright spec (test/run.sh): ≥18 checks including catalog dropdowns,
  plan diff, commit branch verification, drift view, authZ 401/403, secrets.

components:
  - workflow (host-side infra.admin module)
  - workflow-plugin-admin (admin.dashboard)
  - workflow-plugin-auth (auth.jwt backend)
  - iac.state (memory)
  - iac.provider (in-process stub fixture)
  - stub-iac-provider (external gRPC fixture, Task 17)
  - nosql.memory (secrets metadata)
  - bare-git-repo fixture (commit/push target)

status: testable
tags:
  - admin
  - iac
  - gitops
  - proto-contracts
  - playwright
  - sandbox-exec
