modules:
    - name: server
      type: http.server
      config:
        address: ":8080"
    - name: router
      type: http.router
      dependsOn: [server]
    - name: db
      type: storage.sqlite
      config:
        dbPath: "/data/scenario.db"
        maxConnections: 5
        walMode: true
    - name: broker
      type: messaging.broker
      config:
        maxQueueSize: 1000
        deliveryTimeout: "30s"
workflows:
    http:
        router: router
        server: server
        routes: []
pipelines:
    health:
        trigger:
            type: http
            config:
                path: /healthz
                method: GET
        steps:
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    scenario: "09-order-management"
    init-db:
        trigger:
            type: http
            config:
                path: /internal/init-db
                method: POST
        steps:
            - name: create_orders_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS orders (
                      id TEXT PRIMARY KEY,
                      customer_email TEXT NOT NULL,
                      items TEXT NOT NULL,
                      shipping_address TEXT NOT NULL,
                      state TEXT NOT NULL DEFAULT 'pending',
                      total REAL DEFAULT 0,
                      created_at TEXT NOT NULL DEFAULT (datetime('now')),
                      updated_at TEXT NOT NULL DEFAULT (datetime('now'))
                    )
            - name: create_state_log_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS order_state_log (
                      id INTEGER PRIMARY KEY AUTOINCREMENT,
                      order_id TEXT NOT NULL,
                      from_state TEXT,
                      to_state TEXT NOT NULL,
                      reason TEXT,
                      created_at TEXT NOT NULL DEFAULT (datetime('now'))
                    )
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    message: database initialized
    create-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: validate_order
              type: step.validate
              config:
                strategy: required_fields
                required_fields: [items, shipping_address, customer_email]
                source: "steps.parse_body.body"
            - name: gen_id
              type: step.set
              config:
                values:
                    order_id: "order-{{ uuidv4 }}"
            - name: insert_order
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO orders (id, customer_email, items, shipping_address, state, total, created_at, updated_at) VALUES (?, ?, ?, ?, 'pending', ?, datetime('now'), datetime('now'))"
                params:
                    - "{{ .order_id }}"
                    - "{{ .body.customer_email }}"
                    - "{{ json .body.items }}"
                    - "{{ .body.shipping_address }}"
                    - "{{ .body.total | default 0 }}"
            - name: log_state
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO order_state_log (order_id, from_state, to_state, reason) VALUES (?, NULL, 'pending', 'Order created')"
                params:
                    - "{{ .order_id }}"
            - name: publish_created
              type: step.publish
              config:
                topic: "order-events"
                broker: broker
            - name: respond
              type: step.json_response
              config:
                status: 201
                body:
                    id: "{{ .order_id }}"
                    state: pending
                    message: order created
    list-orders:
        trigger:
            type: http
            config:
                path: /api/v1/orders
                method: GET
        steps:
            - name: get_orders
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_email, state, total, created_at, updated_at FROM orders ORDER BY created_at DESC LIMIT 100"
                mode: list
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.get_orders.rows"
    get-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}
                method: GET
        steps:
            - name: fetch_order
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_email, items, shipping_address, state, total, created_at, updated_at FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_exists
              type: step.conditional
              config:
                field: steps.fetch_order.row.id
                routes:
                    "": not_found
                default: respond_order
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: respond_order
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch_order.row"
    pay-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/pay
                method: POST
        steps:
            - name: fetch_order
              type: step.db_query
              config:
                database: db
                query: "SELECT id, state FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_order.row.state
                routes:
                    pending: do_pay
                    paid: already_paid
                    shipped: invalid_transition
                    delivered: invalid_transition
                    cancelled: invalid_transition
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: already_paid
              type: step.json_response
              config:
                status: 409
                body:
                    error: order already paid
            - name: invalid_transition
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot pay order in current state
            - name: do_pay
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET state = 'paid', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_pay
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO order_state_log (order_id, from_state, to_state, reason) VALUES (?, 'pending', 'paid', 'Payment received')"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    state: paid
                    message: order paid
    ship-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/ship
                method: POST
        steps:
            - name: fetch_order
              type: step.db_query
              config:
                database: db
                query: "SELECT id, state FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_order.row.state
                routes:
                    paid: do_ship
                    pending: not_paid
                    shipped: already_shipped
                    delivered: invalid_transition
                    cancelled: invalid_transition
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: not_paid
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot ship unpaid order
            - name: already_shipped
              type: step.json_response
              config:
                status: 409
                body:
                    error: order already shipped
            - name: invalid_transition
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot ship order in current state
            - name: do_ship
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET state = 'shipped', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_ship
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO order_state_log (order_id, from_state, to_state, reason) VALUES (?, 'paid', 'shipped', 'Shipment dispatched')"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    state: shipped
                    message: order shipped
    deliver-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/deliver
                method: POST
        steps:
            - name: fetch_order
              type: step.db_query
              config:
                database: db
                query: "SELECT id, state FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_order.row.state
                routes:
                    shipped: do_deliver
                    pending: invalid_transition
                    paid: invalid_transition
                    delivered: already_delivered
                    cancelled: invalid_transition
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: already_delivered
              type: step.json_response
              config:
                status: 409
                body:
                    error: order already delivered
            - name: invalid_transition
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot deliver order in current state
            - name: do_deliver
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET state = 'delivered', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_deliver
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO order_state_log (order_id, from_state, to_state, reason) VALUES (?, 'shipped', 'delivered', 'Delivered to customer')"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    state: delivered
                    message: order delivered
    cancel-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/cancel
                method: POST
        steps:
            - name: fetch_order
              type: step.db_query
              config:
                database: db
                query: "SELECT id, state FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_order.row.state
                routes:
                    pending: do_cancel
                    paid: do_cancel
                    shipped: cannot_cancel
                    delivered: cannot_cancel
                    cancelled: already_cancelled
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: cannot_cancel
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot cancel order that has already shipped
            - name: already_cancelled
              type: step.json_response
              config:
                status: 409
                body:
                    error: order already cancelled
            - name: do_cancel
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET state = 'cancelled', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_cancel
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO order_state_log (order_id, from_state, to_state, reason) VALUES (?, ?, 'cancelled', 'Customer cancelled')"
                params:
                    - "{{ .id }}"
                    - "{{ index (index (index .steps \"fetch_order\") \"row\") \"state\" }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    state: cancelled
                    message: order cancelled
    refund-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/refund
                method: POST
        steps:
            - name: fetch_order
              type: step.db_query
              config:
                database: db
                query: "SELECT id, state FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch_order.row.state
                routes:
                    delivered: do_refund
                    pending: cannot_refund
                    paid: cannot_refund
                    shipped: cannot_refund
                    cancelled: cannot_refund
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: cannot_refund
              type: step.json_response
              config:
                status: 422
                body:
                    error: can only refund delivered orders
            - name: do_refund
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET state = 'refunded', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_refund
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO order_state_log (order_id, from_state, to_state, reason) VALUES (?, 'delivered', 'refunded', 'Customer refund')"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    state: refunded
                    message: order refunded
    order-event-log:
        steps:
            - name: log
              type: step.log
              config:
                level: info
                message: "Order event received"
triggers:
    event:
        subscriptions:
            - topic: "order-events"
              workflow: "pipeline:order-event-log"
              action: "log"
