modules:
  - name: server
    type: http.server
    config:
      address: ":18105"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: encrypted_space_store
    type: encrypted_space.store
    config:
      space_id: space-1
      backend: memory
      max_operations: 128

  - name: encrypted_space_policy
    type: encrypted_space.proof_policy
    config:
      mode: vector-backed
      require_vector_backed: true
      deferred_domains:
        - message-backup
        - svr-svrb

  - name: encrypted_space_state
    type: encrypted_space.state_store
    config:
      backend: file
      storage_path: __STATE_STORE_PATH__
      allow_file_state_store: true
      max_spaces: 16

workflows:
  http:
    server: server
    router: router

pipelines:
  healthz:
    trigger: { type: http, config: { path: /healthz, method: GET } }
    steps:
      - name: ok
        type: step.json_response
        config:
          status: 200
          body: { status: ok, scenario: "105-encrypted-spaces-proof-workflow" }

  initialize-space:
    trigger:
      type: http
      config:
        path: /spaces/{space}/members
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [space]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse
          expression: '.body + {space_id: .path_params.space}'
      - name: init_state
        type: step.encrypted_space_state_init
      - name: save_state
        type: step.encrypted_space_state_save
        config:
          state_store: encrypted_space_state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            space: '{{ index .steps "parse" "path_params" "space" }}'
            state:
              _from: steps.save_state.state
            stored:
              _from: steps.save_state.stored
    on_error: stop

  check-member:
    trigger:
      type: http
      config:
        path: /spaces/{space}/members/{member}/check
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [space, member]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse
          expression: '{space_id: .path_params.space, member_id: .path_params.member}'
      - name: load_state
        type: step.encrypted_space_state_load
        config:
          state_store: encrypted_space_state
      - name: member_check
        type: step.encrypted_space_member_check
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            space: '{{ index .steps "parse" "path_params" "space" }}'
            member: '{{ index .steps "parse" "path_params" "member" }}'
            found:
              _from: steps.load_state.found
            member_allowed:
              _from: steps.member_check.member_allowed
            member_removed:
              _from: steps.member_check.member_removed
            membership_epoch:
              _from: steps.member_check.membership_epoch
    on_error: stop

  remove-member:
    trigger:
      type: http
      config:
        path: /spaces/{space}/members/{member}/remove
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [space, member]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse
          expression: '{space_id: .path_params.space, member_id: .path_params.member, action: "remove"}'
      - name: load_state
        type: step.encrypted_space_state_load
        config:
          state_store: encrypted_space_state
      - name: update_state
        type: step.encrypted_space_state_update
      - name: save_state
        type: step.encrypted_space_state_save
        config:
          state_store: encrypted_space_state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            space: '{{ index .steps "parse" "path_params" "space" }}'
            member: '{{ index .steps "parse" "path_params" "member" }}'
            action:
              _from: steps.update_state.action
            member_allowed:
              _from: steps.update_state.member_allowed
            state:
              _from: steps.save_state.state
    on_error: stop

  append-operation:
    trigger:
      type: http
      config:
        path: /spaces/{space}/members/{member}/operations
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [space, member]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse
          expression: '.body + {space_id: .path_params.space, member_id: .path_params.member}'
      - name: load_state
        type: step.encrypted_space_state_load
        config:
          state_store: encrypted_space_state
      - name: member_check
        type: step.encrypted_space_member_check
      - name: require_member
        type: step.conditional
        config:
          field: steps.member_check.member_allowed
          routes:
            "true": append
          default: not_allowed
      - name: not_allowed
        type: step.json_response
        config:
          status: 403
          body:
            error: member not allowed
            member: '{{ index .steps "parse" "path_params" "member" }}'
      - name: append
        type: step.encrypted_space_append
        config:
          allow_fake_verifier: true
          retention:
            max_operations: 10
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            space: '{{ index .steps "parse" "path_params" "space" }}'
            member: '{{ index .steps "parse" "path_params" "member" }}'
            member_allowed:
              _from: steps.member_check.member_allowed
            commitment:
              _from: steps.append.commitment
    on_error: stop

  verify-operation:
    trigger:
      type: http
      config:
        path: /spaces/{space}/proof
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [space]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse
          expression: '.body + {space_id: .path_params.space}'
      - name: append_verified
        type: step.encrypted_space_append_verified
        config:
          policy:
            require_vector_backed: true
      - name: proof_evidence
        type: step.encrypted_space_proof_evidence
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            space: '{{ index .steps "parse" "path_params" "space" }}'
            commitment:
              _from: steps.append_verified.commitment
            reports:
              _from: steps.append_verified.reports
            evidence:
              _from: steps.proof_evidence.evidence
            json:
              _from: steps.proof_evidence.evidence
    on_error: stop
