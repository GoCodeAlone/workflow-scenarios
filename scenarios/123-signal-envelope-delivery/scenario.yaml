name: Signal Envelope Delivery
id: "123-signal-envelope-delivery"
category: C
description: |
  Local-only Workflow app proof that workflow-plugin-signal v0.29.0 drives
  reliable encrypted envelope delivery through a running Workflow API. The
  scenario loads the released external plugin, starts workflow-server, and uses
  separate sender, worker, and recipient HTTP calls to send, claim, release,
  reclaim, deliver, ack, and decrypt a participant-parametric encrypted
  envelope. It verifies ciphertext-only worker visibility, release retry
  metadata, terminal ack behavior, duplicate ack rejection, and
  reclaim-after-ack rejection without contacting the official Signal service.
components:
  - workflow-plugin-signal
  - workflow-server
  - HTTP trigger routes
  - Workflow external plugin loader
  - signal.identity_store
  - signal.envelope_store
  - step.signal_session_prepare
  - step.signal_encrypt
  - step.signal_outbox_enqueue
  - step.signal_outbox_claim
  - step.signal_outbox_release
  - step.signal_inbox_receive
  - step.signal_outbox_ack
  - step.signal_inbox_decrypt
status: testable
tags:
  - signal
  - envelope-delivery
  - encrypted-transport
  - workflow-plugin
  - local-only
  - retry
  - ack
runtime: local
