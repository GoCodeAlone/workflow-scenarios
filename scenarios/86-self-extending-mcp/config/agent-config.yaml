# ============================================================
# Scenario 86 — Self-Extending MCP Tooling: Agent Config
#
# Architecture: Two-phase agent loop.
# Phase 1: Create task_analytics pipeline with mcp_tool trigger
# Phase 2: Use the new tool, then create task_forecast tool
# ============================================================

modules:
  - name: ratchet-db
    type: storage.sqlite
    config:
      dbPath: /data/agent-state.db
      walMode: true

  - name: ratchet-tool-policy-engine
    type: ratchet.tool_policy_engine
    config:
      default_policy: allow

  - name: server
    type: http.server
    config:
      address: ":8081"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: ai
    type: agent.provider
    config:
      provider: ollama
      model: gemma4:e2b
      base_url: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      max_tokens: 8192
      context_window: 16384

  - name: guardrails
    type: agent.guardrails
    config:
      defaults:
        enable_self_improvement: true
        enable_iac_modification: false
        require_human_approval: false
        require_diff_review: true
        max_iterations_per_cycle: 5
        deploy_strategy: hot_reload
        allowed_tools:
          - "mcp:wfctl:*"
          - "mcp_wfctl__*"
          - "mcp:self_improve:*"
          - "file_read"
          - "file_write"
          - "file_list"
          - "git_status"
          - "git_commit"
          - "web_fetch"
          - "shell_exec"
        command_policy:
          mode: allowlist
          allowed_commands:
            - "wfctl"
            - "curl"
          enable_static_analysis: true
          block_pipe_to_shell: true
          block_script_execution: true
      immutable_sections:
        - path: "modules.guardrails"
          override: challenge_token
      override:
        mechanism: challenge_token
        admin_secret_env: "${WFCTL_ADMIN_SECRET:-scenario-86-admin-secret}"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "86-self-extending-mcp"
            component: agent

  mcp_tool_creation_loop:
    trigger:
      type: http
      config:
        path: /create-tools
        method: POST
    steps:
      - name: load_config
        type: step.set
        config:
          values:
            config_path: "${CONFIG_PATH}"
            provider: ai
            system_prompt: |
              You are a workflow MCP tool designer.

              TOOLS (call by EXACT name, one at a time):
              | Tool | Description | Required Args |
              |------|-------------|---------------|
              | file_read | Read a file | {"path": "/data/config/app.yaml"} |
              | mcp_wfctl__inspect_config | Inspect config structure | {"yaml_content": "full yaml here"} |
              | mcp_wfctl__list_step_types | List available step types | {} |

              RULES:
              1. Call ONE tool at a time. Wait for the result before calling the next tool.
              2. Use EXACT tool names from the table above.
              3. The config file is at: ${CONFIG_PATH}
              4. After file_read returns content, pass that actual content to mcp_wfctl__inspect_config.
              5. Never use placeholder text.
            task: |
              Step 1: Call file_read with {"path": "${CONFIG_PATH}"} to read the config.
              Step 2: Call mcp_wfctl__inspect_config with {"yaml_content": <the full YAML from step 1>}.
              Step 3: Report what analytics and forecast endpoints can be added based on the inspection.

      - name: inspect
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 5
          parallel_tool_calls: false
          context:
            compaction_threshold: 0.80
          # NOTE: system_prompt and task come from load_config step.set above

      - name: post_design
        type: step.blackboard_post
        config:
          phase: design
          artifact_type: mcp_tool_proposal

      - name: set_analytics_context
        type: step.set
        config:
          values:
            system_prompt: |
              You are a workflow MCP tool designer.

              TOOLS (call by EXACT name, one at a time):
              | Tool | Description | Required Args |
              |------|-------------|---------------|
              | file_read | Read a file | {"path": "/data/config/app.yaml"} |
              | file_write | Write a file | {"path": "/data/config/app.yaml", "content": "full yaml here"} |
              | mcp_wfctl__validate_config | Validate YAML config | {"yaml_content": "full yaml here"} |
              | mcp_wfctl__list_step_types | List available step types | {} |
              | git_commit | Commit changes to git | {"message": "feat: ...", "paths": ["/data/config/app.yaml"]} |

              RULES:
              1. Call ONE tool at a time. Wait for the result before calling the next tool.
              2. Use EXACT tool names from the table above.
              3. The config file is at: ${CONFIG_PATH}
              4. After file_read returns content, use that actual content in all subsequent calls.
              5. Never write placeholder text — always use real YAML content.
              6. YAML rules: database not module; params not args; mode list/single; step.json_response.
            task: |
              Step 1: Call file_read with {"path": "${CONFIG_PATH}"} to read the config.
              Step 2: Add task_analytics pipeline (GET /tasks/analytics, step.db_query, database:db, mode:single, query: SELECT COUNT(*) as total FROM tasks).
              Step 3: Call mcp_wfctl__validate_config with {"yaml_content": <full modified YAML from step 2>}.
              Step 4: Call file_write with {"path": "${CONFIG_PATH}", "content": <same full YAML from step 3>}.
              Step 5: Call git_commit with {"message": "feat: add task_analytics endpoint", "paths": ["${CONFIG_PATH}"]}.
              Use the actual YAML content — never use placeholder text.

      - name: create_analytics_tool
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 20
          parallel_tool_calls: false
          context:
            compaction_threshold: 0.80

      - name: validate
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: deploy_tool
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH}"

      - name: use_tool
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 20
          parallel_tool_calls: false
          context:
            compaction_threshold: 0.80
          # system_prompt and task come from set_analytics_context above

      - name: set_forecast_context
        type: step.set
        config:
          values:
            system_prompt: |
              You are a workflow MCP tool designer.

              TOOLS (call by EXACT name, one at a time):
              | Tool | Description | Required Args |
              |------|-------------|---------------|
              | web_fetch | Fetch a URL | {"url": "http://..."} |
              | file_read | Read a file | {"path": "/data/config/app.yaml"} |
              | file_write | Write a file | {"path": "/data/config/app.yaml", "content": "full yaml here"} |
              | mcp_wfctl__validate_config | Validate YAML config | {"yaml_content": "full yaml here"} |
              | git_commit | Commit changes to git | {"message": "feat: ...", "paths": ["/data/config/app.yaml"]} |

              RULES:
              1. Call ONE tool at a time. Wait for the result before calling the next tool.
              2. Use EXACT tool names from the table above.
              3. After file_read returns content, use that actual content in all subsequent calls.
              4. Never write placeholder text — always use real YAML content.
            task: |
              Step 1: Call web_fetch with {"url": "${BASE_APP_URL}/tasks/analytics"} to verify it works.
              Step 2: Call file_read with {"path": "${CONFIG_PATH}"} to read the current config.
              Step 3: Add task_forecast pipeline (GET /tasks/forecast, step.db_query, database:db, mode:list, query: SELECT id,title,status,created_at FROM tasks ORDER BY created_at DESC LIMIT 10).
              Step 4: Call mcp_wfctl__validate_config with {"yaml_content": <full modified YAML from step 3>}.
              Step 5: Call file_write with {"path": "${CONFIG_PATH}", "content": <same full YAML from step 4>}.
              Step 6: Call git_commit with {"message": "feat: add task_forecast endpoint", "paths": ["${CONFIG_PATH}"]}.
              Use the actual YAML content — never use placeholder text.

      - name: post_iteration
        type: step.blackboard_post
        config:
          phase: iterate
          artifact_type: second_tool_proposal

      - name: validate_forecast
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: deploy_forecast
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH}"
