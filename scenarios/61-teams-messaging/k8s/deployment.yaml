apiVersion: v1
kind: Namespace
metadata:
  name: wf-scenario-61
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app
  namespace: wf-scenario-61
data:
  app.yaml: |
    # loaded from config/app.yaml via make deploy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-61
  namespace: wf-scenario-61
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-61
  template:
    metadata:
      labels:
        app: scenario-61
    spec:
      containers:
        - name: workflow
          image: workflow-server-teams:local
          imagePullPolicy: Never
          args: ["-config", "/config/app.yaml", "-data-dir", "/data"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
        - name: mock-teams
          image: mock-teams:local
          imagePullPolicy: Never
          env:
            - name: MOCK_PORT
              value: "19061"
          ports:
            - containerPort: 19061
      volumes:
        - name: config
          configMap:
            name: app
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-server
  namespace: wf-scenario-61
spec:
  selector:
    app: scenario-61
  ports:
    - port: 8080
      targetPort: 8080
