name: GitLab CI Integration
id: "29-gitlab-ci"
category: C
description: |
  Demonstrates workflow-plugin-gitlab as an external Workflow plugin. The
  scenario installs the plugin binary into a real Workflow server data
  directory, starts the configured Workflow app, and drives webhook parsing,
  pipeline trigger/status, merge-request creation, and MR commenting through
  HTTP requests. Caller-supplied request bodies provide the GitLab project,
  ref, branches, title, pipeline id, and comment body; the YAML only declares
  the reusable gitlab.client module and step wiring. GitLab API calls use the
  plugin's module-backed mock client so no official GitLab service is required.
components:
  - workflow (engine)
  - workflow-plugin-gitlab external plugin (gitlab.client)
  - gitlab pipeline steps (trigger, status, create_mr, mr_comment, parse_webhook)
status: testable
