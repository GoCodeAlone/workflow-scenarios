apiVersion: v1
kind: ConfigMap
metadata:
  name: app
  namespace: wf-scenario-25
data:
  app.yaml: |
    modules:
      - name: server
        type: http.server
        config:
          address: ":8080"

      - name: router
        type: http.router
        dependsOn: [server]

      - name: aws-production
        type: cloud.account
        config:
          provider: mock
          region: us-east-1
          credentials:
            type: static
            accessKey: "test-access-key"
            secretKey: "test-secret-key"

      - name: aws-staging
        type: cloud.account
        config:
          provider: mock
          region: us-west-2
          credentials:
            type: static
            accessKey: "staging-access-key"
            secretKey: "staging-secret-key"

      - name: local-k8s
        type: cloud.account
        config:
          provider: kubernetes
          region: ""
          credentials:
            type: static
            kubeconfig: "apiVersion: v1\nkind: Config\nclusters:\n- cluster:\n    server: https://minikube:6443\n  name: minikube\ncontexts:\n- context:\n    cluster: minikube\n    user: minikube\n  name: minikube\ncurrent-context: minikube\nusers:\n- name: minikube\n  user:\n    token: fake-token-for-demo\n"
            context: minikube

    pipelines:
      health:
        trigger:
          type: http
          config:
            path: /healthz
            method: GET
        steps:
          - name: respond
            type: step.json_response
            config:
              status: 200
              body:
                status: ok
                scenario: "25-cloud-account"

      validate-cloud:
        trigger:
          type: http
          config:
            path: /api/v1/cloud/validate
            method: POST
        steps:
          - name: parse-body
            type: step.request_parse
            config:
              parse_body: true
          - name: validate-aws-production
            type: step.cloud_validate
            config:
              account: "aws-production"
          - name: respond
            type: step.json_response
            config:
              status: 200
              body_from: "."

      list-accounts:
        trigger:
          type: http
          config:
            path: /api/v1/cloud/accounts
            method: GET
        steps:
          - name: respond
            type: step.json_response
            config:
              status: 200
              body:
                accounts:
                  - name: aws-production
                    provider: mock
                    region: us-east-1
                  - name: aws-staging
                    provider: mock
                    region: us-west-2
                  - name: local-k8s
                    provider: kubernetes
                    region: ""

      get-account-aws-production:
        trigger:
          type: http
          config:
            path: /api/v1/cloud/accounts/aws-production
            method: GET
        steps:
          - name: validate
            type: step.cloud_validate
            config:
              account: "aws-production"
          - name: respond
            type: step.json_response
            config:
              status: 200
              body:
                name: aws-production
                provider: mock
                region: us-east-1
                valid: "{{.valid}}"

      get-account-aws-staging:
        trigger:
          type: http
          config:
            path: /api/v1/cloud/accounts/aws-staging
            method: GET
        steps:
          - name: validate
            type: step.cloud_validate
            config:
              account: "aws-staging"
          - name: respond
            type: step.json_response
            config:
              status: 200
              body:
                name: aws-staging
                provider: mock
                region: us-west-2
                valid: "{{.valid}}"

      get-account-local-k8s:
        trigger:
          type: http
          config:
            path: /api/v1/cloud/accounts/local-k8s
            method: GET
        steps:
          - name: validate
            type: step.cloud_validate
            config:
              account: "local-k8s"
          - name: respond
            type: step.json_response
            config:
              status: 200
              body:
                name: local-k8s
                provider: kubernetes
                region: ""
                valid: "{{.valid}}"
