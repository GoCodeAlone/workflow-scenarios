apiVersion: v1
kind: Namespace
metadata:
  name: wf-scenario-62
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app
  namespace: wf-scenario-62
data:
  app.yaml: |
    # loaded from config/app.yaml via make deploy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-62
  namespace: wf-scenario-62
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-62
  template:
    metadata:
      labels:
        app: scenario-62
    spec:
      containers:
        - name: workflow
          image: workflow-server-cross_platform:local
          imagePullPolicy: Never
          args: ["-config", "/config/app.yaml", "-data-dir", "/data"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
        - name: mock-cross-platform
          image: mock-cross-platform:local
          imagePullPolicy: Never
          env:
            - name: DISCORD_PORT
              value: "19062"
            - name: SLACK_PORT
              value: "19063"
            - name: TEAMS_PORT
              value: "19064"
          ports:
            - containerPort: 19062
            - containerPort: 19063
            - containerPort: 19064
      volumes:
        - name: config
          configMap:
            name: app
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-server
  namespace: wf-scenario-62
spec:
  selector:
    app: scenario-62
  ports:
    - port: 8080
      targetPort: 8080
