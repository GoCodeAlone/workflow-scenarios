modules:
  - name: http
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [http]

  - name: auth
    type: auth.jwt
    config:
      secret: scenario-90-admin-jwt-secret-do-not-use-in-prod
      issuer: scenario-90-admin
      tokenExpiry: 24h
      allowRegistration: true
    dependsOn: [router]

  - name: admin
    type: admin.dashboard
    config:
      route_prefix: /admin
      app_name: Scenario 90 - Workflow Admin Tailnet Demo
      target_app: scenario-90-workflow-native

  - name: authz-ui-static
    type: static.fileserver
    config:
      root: /opt/workflow-authz-ui
      prefix: /admin/authz
      spaFallback: true
      router: router
    dependsOn: [router]

  - name: admin-ui-static
    type: static.fileserver
    config:
      root: /opt/workflow-admin-ui
      prefix: /admin
      spaFallback: true
      router: router
    dependsOn: [router]

  - name: app-ui-static
    type: static.fileserver
    config:
      root: /opt/workflow-app-ui
      prefix: /app
      spaFallback: false
      router: router
    dependsOn: [router]

  - name: authn
    type: auth.credential
    config:
      rp_id: 127.0.0.1
      origin: http://127.0.0.1:18080
      rp_display_name: Scenario 90 Workflow App

  - name: authz-ui
    type: authz.ui
    config:
      api_base_path: /api/authz
      admin_base_path: /admin/authz
      app_context: app
      frontend_context: frontend
      admin_context: admin
      scopes:
        - name: frontend:orders:read
          context: frontend
          resource: orders
          actions: [read]
          description: Read customer orders in the primary app.
        - name: frontend:orders:update
          context: frontend
          resource: orders
          actions: [update]
          description: Update customer orders in the primary app.
        - name: admin:authz.roles:read
          context: admin
          resource: authz.roles
          actions: [read]
          description: View role and scope assignments in admin.
        - name: admin:authz.roles:update
          context: admin
          resource: authz.roles
          actions: [update]
          description: Manage role and scope assignments in admin.
      admin:
        enabled: true
        module: admin
        id: authz-roles
        title: Authorization
        category: security
        path: /admin/authz/
        render_mode: iframe
        app_context: admin
        permissions:
          - admin:authz.roles:read

workflows:
  http:
    server: http
    router: router
    routes:
      - method: POST
        path: /api/admin/auth/register
        handler: auth
      - method: POST
        path: /api/admin/auth/login
        handler: auth
      - method: GET
        path: /api/admin/auth/profile
        handler: auth
      - method: POST
        path: /api/app/auth/register
        handler: auth
      - method: POST
        path: /api/app/auth/login
        handler: auth
      - method: GET
        path: /api/app/auth/profile
        handler: auth

pipelines:
  app-root:
    trigger:
      type: http
      config:
        path: /
        method: GET
    steps:
      - name: respond
        type: step.raw_response
        config:
          status: 200
          content_type: text/html; charset=utf-8
          body: |
            <!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Scenario 90 Workflow App</title>
              <link rel="stylesheet" href="/app/styles.css">
            </head>
            <body>
              <main>
                <header>
                  <div>
                    <h1>Scenario 90 Workflow App</h1>
                    <p>Primary app served by Workflow at the root. Admin is available at /admin/.</p>
                  </div>
                  <a class="button primary" href="/admin/">Open admin</a>
                </header>
                <div class="layout">
                  <section class="panel">
                    <h2>Sign in</h2>
                    <div class="form">
                      <label>Email <input id="email" type="email" value="app-user@tailnet"></label>
                      <label>Password <input id="password" type="password" value="app-password"></label>
                      <div class="buttons">
                        <button id="register" class="primary" type="button">Register</button>
                        <button id="login" type="button">Sign in</button>
                        <button id="logout" type="button">Sign out</button>
                      </div>
                      <div id="status" class="status">Not signed in</div>
                    </div>
                  </section>
                  <div class="stack">
                    <section class="panel">
                      <h2>SPA access projection</h2>
                      <pre id="access">Loading...</pre>
                    </section>
                    <section class="panel">
                      <h2>Orders API</h2>
                      <div class="buttons"><button id="update" class="primary" type="button">Update order</button></div>
                      <pre id="orders">Loading...</pre>
                    </section>
                  </div>
                </div>
              </main>
              <script src="/app/app.js"></script>
            </body>
            </html>

  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            runtime: workflow-go-server

  admin-redirect:
    trigger:
      type: http
      config:
        path: /admin
        method: GET
    steps:
      - name: redirect
        type: step.raw_response
        config:
          status: 308
          content_type: text/plain
          headers:
            Location: /admin/
          body: ""

  scenario-status:
    trigger:
      type: http
      config:
        path: /api/status
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            scenario: "90-admin-tailnet-demo"
            runtime: "workflow-go-server"
            harness: "workflow"
            app_server_language: "go"
            plugin_runtime: "external-go-binaries"
            primary_app: "/"
            admin_app: "/admin/"

  scenario90-role-bootstrap:
    trigger:
      type: http
      config:
        path: /api/scenario90/seed/roles
        method: POST
    steps:
      - name: parse_seed
        type: step.request_parse
        config:
          parse_headers: [X-Scenario90-Seed-Token]
      - name: route-seed-token
        type: step.db_query
        config:
          database: admin-db
          query: |
            SELECT 1 AS allowed
            WHERE ? != '' AND ? = ?
          params:
            - '{{ index .steps "parse_seed" "headers" "X-Scenario90-Seed-Token" }}'
            - '{{ index .steps "parse_seed" "headers" "X-Scenario90-Seed-Token" }}'
            - '${SCENARIO90_SEED_TOKEN}'
          mode: single
      - name: route-seed-grant
        type: step.conditional
        config:
          field: steps.route-seed-token.found
          routes:
            'true': create-role-table
          default: deny-seed
      - &scenario90_create_role_table_step
        name: create-role-table
        type: step.db_exec
        config:
          database: admin-db
          query: |
            CREATE TABLE IF NOT EXISTS scenario90_role_assignments (
              user TEXT NOT NULL,
              role TEXT NOT NULL,
              context TEXT NOT NULL,
              scopes_json TEXT NOT NULL,
              updated_at TEXT NOT NULL DEFAULT (datetime('now')),
              PRIMARY KEY (user, role, context)
            )
          ignore_error: true
      - &scenario90_seed_admin_scopes_step
        name: seed-admin-scopes
        type: step.db_exec
        config:
          database: admin-db
          query: |
            INSERT OR IGNORE INTO scenario90_role_assignments (user, role, context, scopes_json)
            VALUES (?, ?, ?, ?)
          params:
            - admin@tailnet
            - admin
            - admin
            - '["admin:auth.config:read","admin:auth.config:update","admin:auth.providers.read","admin:authz.roles:read","admin:authz.roles:update"]'
      - &scenario90_seed_support_admin_authz_read_step
        name: seed-support-admin-authz-read
        type: step.db_exec
        config:
          database: admin-db
          query: |
            INSERT OR IGNORE INTO scenario90_role_assignments (user, role, context, scopes_json)
            VALUES (?, ?, ?, ?)
          params:
            - app-user@tailnet
            - support-admin-read
            - admin
            - '["admin:authz.roles:read"]'
      - &scenario90_seed_delegate_auth_admin_step
        name: seed-delegate-auth-admin
        type: step.db_exec
        config:
          database: admin-db
          query: |
            INSERT OR IGNORE INTO scenario90_role_assignments (user, role, context, scopes_json)
            VALUES (?, ?, ?, ?)
          params:
            - delegated-admin@tailnet
            - identity-admin
            - admin
            - '["admin:auth.config:read","admin:auth.providers.read"]'
      - &scenario90_seed_admin_frontend_step
        name: seed-admin-frontend
        type: step.db_exec
        config:
          database: admin-db
          query: |
            INSERT OR IGNORE INTO scenario90_role_assignments (user, role, context, scopes_json)
            VALUES (?, ?, ?, ?)
          params:
            - admin@tailnet
            - admin
            - frontend
            - '["frontend:orders:read","frontend:orders:update"]'
      - &scenario90_seed_support_frontend_step
        name: seed-support-frontend
        type: step.db_exec
        config:
          database: admin-db
          query: |
            INSERT OR IGNORE INTO scenario90_role_assignments (user, role, context, scopes_json)
            VALUES (?, ?, ?, ?)
          params:
            - app-user@tailnet
            - support
            - frontend
            - '["frontend:orders:read"]'
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            seeded: true
            roles: ["admin", "support", "delegated-admin"]
      - name: deny-seed
        type: step.json_response
        config:
          status: 403
          body:
            seeded: false
            reason: missing scenario seed token

  app-access:
    trigger:
      type: http
      config:
        path: /api/app/access
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - *scenario90_create_role_table_step
      - name: find-admin-profile
        type: step.db_query
        config:
          database: admin-db
          query: |
            SELECT user, role, context
            FROM scenario90_role_assignments
            WHERE user = ? AND role = ? AND context = ?
            LIMIT 1
          params:
            - '{{ index .steps "authenticate" "email" }}'
            - admin
            - admin
          mode: single
      - name: route-by-admin-profile
        type: step.conditional
        config:
          field: steps.find-admin-profile.found
          routes:
            'true': admin-access
          default: find-support-profile
      - name: admin-access
        type: step.json_response
        config:
          status: 200
          body:
            email: { _from: "steps.authenticate.email" }
            role: admin
            frontend_scopes: ["frontend:orders:read", "frontend:orders:update"]
            admin_scopes: ["admin:auth.config:read", "admin:auth.config:update", "admin:authz.roles:read", "admin:authz.roles:update"]
            visible_panels: ["orders", "order-update", "admin-auth", "admin-authz"]
      - name: find-support-profile
        type: step.db_query
        config:
          database: admin-db
          query: |
            SELECT user, role, context
            FROM scenario90_role_assignments
            WHERE user = ? AND role = ? AND context = ?
            LIMIT 1
          params:
            - '{{ index .steps "authenticate" "email" }}'
            - support
            - frontend
          mode: single
      - name: route-by-support-profile
        type: step.conditional
        config:
          field: steps.find-support-profile.found
          routes:
            'true': support-access
          default: viewer-access
      - name: support-access
        type: step.json_response
        config:
          status: 200
          body:
            email: { _from: "steps.authenticate.email" }
            role: support
            frontend_scopes: ["frontend:orders:read"]
            admin_scopes: ["admin:authz.roles:read"]
            visible_panels: ["orders", "admin-authz-readonly"]
      - name: viewer-access
        type: step.json_response
        config:
          status: 200
          body:
            email: { _from: "steps.authenticate.email" }
            role: viewer
            frontend_scopes: []
            admin_scopes: []
            visible_panels: []

  app-orders-read:
    trigger:
      type: http
      config:
        path: /api/app/orders
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - *scenario90_create_role_table_step
      - name: find-orders-read
        type: step.db_query
        config:
          database: admin-db
          query: |
            SELECT user, role, context
            FROM scenario90_role_assignments
            WHERE user = ?
              AND context = ?
              AND EXISTS (
                SELECT 1
                FROM json_each(scenario90_role_assignments.scopes_json)
                WHERE value = ?
              )
            LIMIT 1
          params:
            - '{{ index .steps "authenticate" "email" }}'
            - frontend
            - frontend:orders:read
          mode: single
      - name: route-by-orders-read
        type: step.conditional
        config:
          field: steps.find-orders-read.found
          routes:
            'true': allow-read-enforce
          default: deny-read-enforce
      - name: allow-read-enforce
        type: step.authz_enforce
        config:
          subject: '{{ index .steps "authenticate" "email" }}'
          resource: orders
          action: read
          permitted: true
          reason: frontend:orders:read granted by role assignment
      - name: allow-read-response
        type: step.json_response
        config:
          status: 200
          body:
            allowed: { _from: "steps.allow-read-enforce.permitted" }
            reason: { _from: "steps.allow-read-enforce.reason" }
            orders:
              - id: ORD-1001
                customer: Northwind
                status: ready
              - id: ORD-1002
                customer: Contoso
                status: review
      - name: deny-read-enforce
        type: step.authz_enforce
        config:
          subject: '{{ index .steps "authenticate" "email" }}'
          resource: orders
          action: read
          permitted: false
          reason: missing frontend:orders:read
      - name: deny-read-response
        type: step.json_response
        config:
          status: 403
          body:
            allowed: false
            reason: { _from: "steps.deny-read-enforce.reason" }

  app-orders-update:
    trigger:
      type: http
      config:
        path: /api/app/orders/update
        method: POST
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - *scenario90_create_role_table_step
      - name: find-orders-update
        type: step.db_query
        config:
          database: admin-db
          query: |
            SELECT user, role, context
            FROM scenario90_role_assignments
            WHERE user = ?
              AND context = ?
              AND EXISTS (
                SELECT 1
                FROM json_each(scenario90_role_assignments.scopes_json)
                WHERE value = ?
              )
            LIMIT 1
          params:
            - '{{ index .steps "authenticate" "email" }}'
            - frontend
            - frontend:orders:update
          mode: single
      - name: route-by-orders-update
        type: step.conditional
        config:
          field: steps.find-orders-update.found
          routes:
            'true': allow-update-enforce
          default: deny-update-enforce
      - name: allow-update-enforce
        type: step.authz_enforce
        config:
          subject: '{{ index .steps "authenticate" "email" }}'
          resource: orders
          action: update
          permitted: true
          reason: frontend:orders:update granted by role assignment
      - name: allow-update-response
        type: step.json_response
        config:
          status: 200
          body:
            allowed: { _from: "steps.allow-update-enforce.permitted" }
            reason: { _from: "steps.allow-update-enforce.reason" }
            updated_order:
              id: ORD-1002
              status: priority-review
      - name: deny-update-enforce
        type: step.authz_enforce
        config:
          subject: '{{ index .steps "authenticate" "email" }}'
          resource: orders
          action: update
          permitted: false
          reason: missing frontend:orders:update
      - name: deny-update-response
        type: step.json_response
        config:
          status: 403
          body:
            allowed: false
            reason: { _from: "steps.deny-update-enforce.reason" }

  list-admin-contributions:
    trigger:
      type: http
      config:
        path: /api/admin/contributions
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - *scenario90_create_role_table_step
      - name: find-auth-nav-grant
        type: step.db_query
        config:
          database: admin-db
          query: |
            SELECT user, role, context
            FROM scenario90_role_assignments
            WHERE user = ? AND context = ?
              AND EXISTS (
                SELECT 1
                FROM json_each(scenario90_role_assignments.scopes_json)
                WHERE value = ?
              )
            LIMIT 1
          params:
            - '{{ index .steps "authenticate" "email" }}'
            - admin
            - admin:auth.config:read
          mode: single
      - name: find-authz-nav-grant
        type: step.db_query
        config:
          database: admin-db
          query: |
            SELECT user, role, context
            FROM scenario90_role_assignments
            WHERE user = ? AND context = ?
              AND EXISTS (
                SELECT 1
                FROM json_each(scenario90_role_assignments.scopes_json)
                WHERE value = ?
              )
            LIMIT 1
          params:
            - '{{ index .steps "authenticate" "email" }}'
            - admin
            - admin:authz.roles:read
          mode: single
      - name: find-authz-update-grant
        type: step.db_query
        config:
          database: admin-db
          query: |
            SELECT user, role, context
            FROM scenario90_role_assignments
            WHERE user = ? AND context = ?
              AND EXISTS (
                SELECT 1
                FROM json_each(scenario90_role_assignments.scopes_json)
                WHERE value = ?
              )
            LIMIT 1
          params:
            - '{{ index .steps "authenticate" "email" }}'
            - admin
            - admin:authz.roles:update
          mode: single
      - name: describe-auth-contribution
        type: step.auth_admin_contribution_describe
        config: {}
      - name: register-auth
        type: step.admin_register_contribution
        config:
          module: admin
        input:
          contribution: { _from: "steps.describe-auth-contribution.contribution" }
      - name: admin-authz-contribution
        type: step.authz_admin_contribution
        config:
          admin_base_path: /admin/authz/
          app_context: admin
          admin:
            id: authz-roles
            title: Authorization
            category: security
            path: /admin/authz/
            render_mode: iframe
            app_context: admin
            permissions:
              - admin:authz.roles:read
              - admin:authz.roles:update
      - name: register-authz
        type: step.admin_register_contribution
        config:
          module: admin
        input:
          contribution: { _from: "steps.admin-authz-contribution.contribution" }
      - name: route-nav-grants
        type: step.conditional
        config:
          field: '{{ index .steps "find-auth-nav-grant" "found" }}|{{ index .steps "find-authz-nav-grant" "found" }}|{{ index .steps "find-authz-update-grant" "found" }}'
          routes:
            'true|true|true': list-both-admin
            'true|true|false': list-both-readonly
            'true|false|false': list-auth-only
            'false|true|true': list-authz-admin
            'false|true|false': list-authz-only
          default: viewer-respond
      - name: list-both-admin
        type: step.admin_list_contributions
        config:
          module: admin
          contribution_steps: [register-auth, register-authz]
          app_context: admin
          granted_permissions: [admin:auth.config:read, admin:authz.roles:read, admin:authz.roles:update]
        input:
          auth_contribution: { _from: "steps.register-auth.contribution" }
          authz_contribution: { _from: "steps.register-authz.contribution" }
          app_context: admin
          granted_permissions: [admin:auth.config:read, admin:authz.roles:read, admin:authz.roles:update]
      - name: respond-both-admin
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list-both-admin.contributions" }
            granted_permissions: [admin:auth.config:read, admin:authz.roles:read, admin:authz.roles:update]
      - name: list-both-readonly
        type: step.admin_list_contributions
        config:
          module: admin
          contribution_steps: [register-auth, register-authz]
          app_context: admin
          granted_permissions: [admin:auth.config:read, admin:authz.roles:read]
        input:
          auth_contribution: { _from: "steps.register-auth.contribution" }
          authz_contribution: { _from: "steps.register-authz.contribution" }
          app_context: admin
          granted_permissions: [admin:auth.config:read, admin:authz.roles:read]
      - name: respond-both-readonly
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list-both-readonly.contributions" }
            granted_permissions: [admin:auth.config:read, admin:authz.roles:read]
      - name: list-auth-only
        type: step.admin_list_contributions
        config:
          module: admin
          contribution_steps: [register-auth, register-authz]
          app_context: admin
          granted_permissions: [admin:auth.config:read]
        input:
          auth_contribution: { _from: "steps.register-auth.contribution" }
          authz_contribution: { _from: "steps.register-authz.contribution" }
          app_context: admin
          granted_permissions: [admin:auth.config:read]
      - name: respond-auth-only
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list-auth-only.contributions" }
            granted_permissions: [admin:auth.config:read]
      - name: list-authz-admin
        type: step.admin_list_contributions
        config:
          module: admin
          contribution_steps: [register-auth, register-authz]
          app_context: admin
          granted_permissions: [admin:authz.roles:read, admin:authz.roles:update]
        input:
          auth_contribution: { _from: "steps.register-auth.contribution" }
          authz_contribution: { _from: "steps.register-authz.contribution" }
          app_context: admin
          granted_permissions: [admin:authz.roles:read, admin:authz.roles:update]
      - name: respond-authz-admin
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list-authz-admin.contributions" }
            granted_permissions: [admin:authz.roles:read, admin:authz.roles:update]
      - name: list-authz-only
        type: step.admin_list_contributions
        config:
          module: admin
          contribution_steps: [register-auth, register-authz]
          app_context: admin
          granted_permissions: [admin:authz.roles:read]
        input:
          auth_contribution: { _from: "steps.register-auth.contribution" }
          authz_contribution: { _from: "steps.register-authz.contribution" }
          app_context: admin
          granted_permissions: [admin:authz.roles:read]
      - name: respond-authz-only
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list-authz-only.contributions" }
