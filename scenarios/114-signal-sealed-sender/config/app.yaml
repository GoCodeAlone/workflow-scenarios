modules:
  - name: server
    type: http.server
    config:
      address: ":18114"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: user_a_identity
    type: signal.identity_store
    config:
      identity_ref: user-a
      local_id: user-a@example.test
      device_id: 1
      registration_id: 6114

  - name: user_b_identity
    type: signal.identity_store
    config:
      identity_ref: user-b
      local_id: user-b@example.test
      device_id: 1
      registration_id: 6115

  - name: user_c_identity
    type: signal.identity_store
    config:
      identity_ref: user-c
      local_id: user-c@example.test
      device_id: 1
      registration_id: 6116

  - name: tenant_a_identity
    type: signal.identity_store
    config:
      identity_ref: tenant-a
      local_id: tenant-a@example.test
      device_id: 1
      registration_id: 6117

  - name: tenant_b_identity
    type: signal.identity_store
    config:
      identity_ref: tenant-b
      local_id: tenant-b@example.test
      device_id: 1
      registration_id: 6118

workflows:
  http:
    server: server
    router: router

pipelines:
  healthz:
    trigger: { type: http, config: { path: /healthz, method: GET } }
    steps:
      - name: ok
        type: step.json_response
        config:
          status: 200
          body: { status: ok, scenario: "114-signal-sealed-sender" }

  prepare-session:
    trigger:
      type: http
      config:
        path: /participants/{participant}/session
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [participant]
      - name: prepare
        type: step.signal_session_prepare
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "participant" }}'
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            participant: '{{ index .steps "parse" "path_params" "participant" }}'
            bundle:
              _from: steps.prepare.bundle
    on_error: stop

  issue-sender-certificate:
    trigger:
      type: http
      config:
        path: /participants/{sender}/certificate
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [sender]
      - name: issue
        type: step.signal_sender_certificate_issue
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "sender" }}'
          ttl_seconds: 3600
      - name: respond
        type: step.json_response
        config:
          status: 201
          body:
            sender: '{{ index .steps "parse" "path_params" "sender" }}'
            trust_root_public_key:
              _from: steps.issue.trust_root_public_key
            sender_certificate:
              _from: steps.issue.sender_certificate
            sender_id:
              _from: steps.issue.sender_id
            sender_device_id:
              _from: steps.issue.sender_device_id
            expires_at_unix:
              _from: steps.issue.expires_at_unix
    on_error: stop

  seal-message:
    trigger:
      type: http
      config:
        path: /participants/{sender}/sealed/{recipient}
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [sender, recipient]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse.body
          expression: "."
      - name: encrypt
        type: step.signal_encrypt
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "sender" }}'
      - name: issue
        type: step.signal_sender_certificate_issue
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "sender" }}'
          ttl_seconds: 3600
      - name: seal_input
        type: step.set
        config:
          values:
            envelope:
              sender_id: '{{ index .steps "encrypt" "envelope" "sender_id" }}'
              sender_device_id: '{{ index .steps "encrypt" "envelope" "sender_device_id" }}'
              recipient_id: '{{ index .steps "encrypt" "envelope" "recipient_id" }}'
              recipient_device_id: '{{ index .steps "encrypt" "envelope" "recipient_device_id" }}'
              message_type: '{{ index .steps "encrypt" "envelope" "message_type" }}'
              ciphertext: '{{ index .steps "encrypt" "envelope" "ciphertext" }}'
            sender_certificate: '{{ index .steps "issue" "sender_certificate" }}'
            recipient_identity_key: '{{ index .steps "parse" "body" "remote_bundle" "identity_key" }}'
      - name: seal
        type: step.signal_sender_seal
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "sender" }}'
          content_hint: '{{ index .steps "parse" "body" "content_hint" }}'
      - name: respond
        type: step.json_response
        config:
          status: 202
          body:
            sender: '{{ index .steps "parse" "path_params" "sender" }}'
            recipient: '{{ index .steps "parse" "path_params" "recipient" }}'
            sealed_message:
              _from: steps.seal.sealed_message
            sealed_message_size:
              _from: steps.seal.sealed_message_size
            trust_root_public_key:
              _from: steps.issue.trust_root_public_key
            certificate_expires_at_unix:
              _from: steps.issue.expires_at_unix
    on_error: stop

  unseal-message:
    trigger:
      type: http
      config:
        path: /participants/{recipient}/sealed/unseal
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [recipient]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse.body
          expression: "."
      - name: unseal
        type: step.signal_sender_unseal
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "recipient" }}'
          required_principal: 'principal://{{ index .steps "parse" "path_params" "recipient" }}'
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            recipient: '{{ index .steps "parse" "path_params" "recipient" }}'
            denied:
              _from: steps.unseal.denied
            error:
              _from: steps.unseal.error
            sender_id:
              _from: steps.unseal.sender_id
            sender_device_id:
              _from: steps.unseal.sender_device_id
            content_hint:
              _from: steps.unseal.content_hint
            envelope:
              _from: steps.unseal.envelope
    on_error: stop

  decrypt-sealed-message:
    trigger:
      type: http
      config:
        path: /participants/{recipient}/sealed/decrypt
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [recipient]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse.body
          expression: "."
      - name: unseal
        type: step.signal_sender_unseal
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "recipient" }}'
          required_principal: 'principal://{{ index .steps "parse" "path_params" "recipient" }}'
      - name: decrypt_input
        type: step.set
        config:
          values:
            principal: '{{ index .steps "parse" "body" "principal" }}'
            envelope:
              sender_id: '{{ index .steps "unseal" "envelope" "sender_id" }}'
              sender_device_id: '{{ index .steps "unseal" "envelope" "sender_device_id" }}'
              recipient_id: '{{ index .steps "unseal" "envelope" "recipient_id" }}'
              recipient_device_id: '{{ index .steps "unseal" "envelope" "recipient_device_id" }}'
              message_type: '{{ index .steps "unseal" "envelope" "message_type" }}'
              ciphertext: '{{ index .steps "unseal" "envelope" "ciphertext" }}'
      - name: decrypt
        type: step.signal_decrypt
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "recipient" }}'
          required_principal: 'principal://{{ index .steps "parse" "path_params" "recipient" }}'
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            recipient: '{{ index .steps "parse" "path_params" "recipient" }}'
            sender_id:
              _from: steps.unseal.sender_id
            sender_device_id:
              _from: steps.unseal.sender_device_id
            content_hint:
              _from: steps.unseal.content_hint
            plaintext:
              _from: steps.decrypt.plaintext
    on_error: stop
