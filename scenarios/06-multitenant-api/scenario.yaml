name: Multi-Tenant API Service
id: "06-multitenant-api"
category: B
description: |
  A multi-tenant API service managed by workflow-cloud. Each tenant gets
  isolated namespaces, rate limiting, and separate data stores. Validates
  the tenant lifecycle, org management, and billing integration.
components:
  - workflow-cloud
  - PostgreSQL
status: testable
notes: |
  workflow-cloud runs in the default namespace. Tests run against the live
  service via port-forward (port 8082). No k8s deploy needed — the service
  is already deployed as part of the platform.

  Tests cover: user registration and login, JWT auth, org create/list/invite,
  tenant provisioning, API key create/list/revoke, plugin search, and error
  handling (401, 409).

  Fix applied: cloud.yaml apikey-revoke path changed from {key_id} to {id}
  to match the step implementation.
