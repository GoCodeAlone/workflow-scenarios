modules:
  - name: server
    type: http.server
    config:
      address: ":18125"
  - name: router
    type: http.router
    dependsOn: [server]
  - name: aws-production
    type: cloud.account
    config:
      provider: mock
      region: us-east-1
      credentials:
        type: static
        accessKey: test-access-key
        secretKey: test-secret-key
  - name: aws-staging
    type: cloud.account
    config:
      provider: mock
      region: us-west-2
      credentials:
        type: static
        accessKey: staging-access-key
        secretKey: staging-secret-key
  - name: local-k8s
    type: cloud.account
    config:
      provider: kubernetes
      credentials:
        type: static
        kubeconfig: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://minikube:6443
            name: minikube
          contexts:
          - context:
              cluster: minikube
              user: minikube
            name: minikube
          current-context: minikube
          users:
          - name: minikube
            user:
              token: fake-token-for-demo
        context: minikube
workflows:
  http:
    router: router
    server: server
pipelines:
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "25-cloud-account"

  validate-cloud:
    trigger:
      type: http
      config:
        path: /api/cloud/validate
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          parse_body: true
          merge_body: true
      - name: validate
        type: step.cloud_validate
        config:
          account_from: account
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            account:
              _from: account
            valid:
              _from: valid
            provider:
              _from: provider
            region:
              _from: region

  list-accounts:
    trigger:
      type: http
      config:
        path: /api/cloud/accounts
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            accounts:
              - name: aws-production
                provider: mock
                region: us-east-1
              - name: aws-staging
                provider: mock
                region: us-west-2
              - name: local-k8s
                provider: kubernetes
                region: ""
            count: 3

  get-account:
    trigger:
      type: http
      config:
        path: /api/cloud/accounts/{account}
        method: GET
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [account]
      - name: validate
        type: step.cloud_validate
        config:
          account_from: steps.parse.path_params.account
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            account:
              _from: account
            valid:
              _from: valid
            provider:
              _from: provider
            region:
              _from: region
