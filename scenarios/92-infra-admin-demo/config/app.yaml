# ============================================================
# Scenario 92 — Infra Admin GitOps Demo (v1.1)
#
# Boots a full admin stack with:
#   - auth.jwt + authz.local (operator/viewer inline RBAC)
#   - http.middleware.auth (Bearer gate for infra.admin routes)
#   - health.checker (/healthz)
#   - admin.dashboard (workflow-plugin-admin)
#   - infra.admin (host-side IaC admin, stub iac.provider in-process)
#   - iac.state (memory — kept for step.iac_* access; NOT wired to infra.admin
#     due to v0.69.0 interfaces.IaCStateStore ≠ module.IaCStateStore mismatch)
#   - static.fileserver for infra SPA at /admin/infra/
#   - nosql.memory (secrets metadata)
#
# Pipeline routes:
#   GET  /api/infra/providers/stub/catalog  — stub regions + types
#   GET  /api/infra/resources               — proxy to infra.admin resources RPC
#   POST /api/infra/plan                    — stub plan (1 create per spec)
#   POST /api/infra/apply                   — stub apply
#   POST /api/infra/commit                  — step.sandbox_exec git clone/commit/push
#   GET  /api/infra/drift                   — stub drift (no drift, supported:true)
#   GET  /api/infra/secrets                 — metadata only (values never returned)
#   POST /api/infra/secrets                 — declare a secret name
#
# Admin contribution: infra-resources → /admin/infra/ (iframe)
#
# JWT secret (test-only): scenario-92-jwt-secret-do-not-use-in-prod
# ============================================================

modules:
  - name: auth
    type: auth.jwt
    config:
      issuer: "scenario-92"
      secret: "scenario-92-jwt-secret-do-not-use-in-prod"

  - name: authz
    type: authz.local
    config:
      policies:
        - ["operator@infra", "infra:read",    "allow"]
        - ["operator@infra", "infra:apply",   "allow"]
        - ["operator@infra", "infra:destroy", "allow"]
        - ["viewer@infra",   "infra:read",    "allow"]

  # auth-mw: wraps auth.jwt as HTTPMiddleware so infra.admin can resolve it.
  - name: auth-mw
    type: http.middleware.auth
    config:
      authType: Bearer

  - name: security-headers
    type: http.middleware.securityheaders
    config:
      frameOptions: SAMEORIGIN
      contentSecurityPolicy: >-
        default-src 'self'; script-src 'self'; style-src 'self';
        img-src 'self' data:; frame-ancestors 'self'

  - name: http
    type: http.server
    config:
      address: ":8080"

  # health.checker removed: it uses a random scan to find a router and would
  # bind /healthz to admin-router (:8081) rather than http-router (:8080).
  # /healthz is served by the healthz pipeline trigger instead.

  - name: router
    type: http.router
    dependsOn: [http]

  - name: admin
    type: admin.dashboard
    config:
      route_prefix: /admin
      app_name: "Scenario 92 — Infra Admin GitOps Demo"
      auth_module: auth
      authz_module: authz

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  - name: stub-provider
    type: iac.provider
    config:
      provider: stub

  - name: secrets-store
    type: nosql.memory

  - name: infra-admin
    type: infra.admin
    config:
      route_prefix:            /api/infra-admin
      asset_prefix:            /admin/infra-admin
      # state_module intentionally omitted: module.IaCStateStore (iac.state) ≠
      # interfaces.IaCStateStore (infra.admin expects); handlers are nil-safe.
      http_module:             router
      auth_module:             auth-mw
      authz_module:            authz
      security_headers_module: security-headers
      provider_modules:        [stub-provider]
      access_log_path:         /tmp/infra-admin-audit.jsonl
    dependsOn: [router, auth-mw, authz, security-headers, stub-provider]

  - name: infra-spa-static
    type: static.fileserver
    config:
      root: /opt/infra-spa
      prefix: /admin/infra
      spaFallback: true
      router: router
    dependsOn: [router]

  - name: admin-ui-static
    type: static.fileserver
    config:
      root: /opt/workflow-admin-ui
      prefix: /admin
      spaFallback: true
      router: router
    dependsOn: [router]

workflows:
  http:
    server: http
    router: router
    routes:
      - method: POST
        path: /api/admin/auth/register
        handler: auth
      - method: POST
        path: /api/admin/auth/login
        handler: auth
      - method: GET
        path: /api/admin/auth/profile
        handler: auth

pipelines:

  # ── /healthz ───────────────────────────────────────────────────────────────
  # Pipeline healthz: bound to http-router via custom trigger wrapper in cmd/server.
  # Replaces the health.checker module which uses a random router scan.
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "92-infra-admin-gitops"

  # ── Admin contribution registration ───────────────────────────────────────
  # Called by infra.admin.Start() via engine.TriggerWorkflow.
  register-infra-admin-resources:
    trigger:
      type: manual
    steps:
      - name: register
        type: step.admin_register_contribution
        config:
          module: admin

  register-infra-admin-resource-detail:
    trigger:
      type: manual
    steps:
      - name: register
        type: step.admin_register_contribution
        config:
          module: admin

  register-infra-admin-new-resource:
    trigger:
      type: manual
    steps:
      - name: register
        type: step.admin_register_contribution
        config:
          module: admin

  register-infra-admin-actions:
    trigger:
      type: manual
    steps:
      - name: register
        type: step.admin_register_contribution
        config:
          module: admin

  # ── GET /api/admin/contributions ──────────────────────────────────────────
  # Admin shell polls this. Registers infra-resources contribution
  # (id: infra-resources, path: /admin/infra/).
  list-admin-contributions:
    trigger:
      type: http
      config:
        path: /api/admin/contributions
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: infra-contribution
        type: step.set
        config:
          values:
            contribution:
              id: infra-resources
              title: Infra Resources
              category: infra
              path: /admin/infra/
              render_mode: iframe
              app_context: admin
              permissions:
                - permission: infra:read
                  resource: infra
                  action: read
      - name: register-infra
        type: step.admin_register_contribution
        config:
          module: admin
        input:
          contribution: { _from: "steps.infra-contribution.contribution" }
      - name: grants
        type: step.set
        config:
          values:
            app_context: admin
            granted_permissions:
              - infra:read
              - infra:apply
      - name: list
        type: step.admin_list_contributions
        config:
          module: admin
        input:
          app_context: { _from: "steps.grants.app_context" }
          granted_permissions: { _from: "steps.grants.granted_permissions" }
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list.contributions" }

  # ── GET /api/infra/providers/stub/catalog ─────────────────────────────────
  # Deterministic stub catalog: regions + types match stub-iac-provider gRPC.
  infra-catalog:
    trigger:
      type: http
      config:
        path: /api/infra/providers/stub/catalog
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: stub
            regions:
              - name: stub-east
                display_name: Stub East
              - name: stub-west
                display_name: Stub West
            types:
              - stub.database
              - stub.bucket

  # ── GET /api/infra/resources ──────────────────────────────────────────────
  # Proxies to the infra.admin typed resources RPC.
  infra-list-resources:
    trigger:
      type: http
      config:
        path: /api/infra/resources
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_query: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: call-backend
        type: step.http_call
        config:
          url: http://localhost:8080/api/infra-admin/resources
          method: POST
          content_type: application/json
          body: '{"evidence":{"authz_checked":true,"authz_allowed":true}}'
          headers:
            Authorization: "Bearer {{index .steps.parse_auth.headers \"Authorization\"}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            resources: { _from: "steps.call-backend.body.resources" }
            provider: stub

  # ── POST /api/infra/plan ──────────────────────────────────────────────────
  # {provider:"stub", specs:[{name,type,region}]}
  # Stub: 1 "create" action per spec; deterministic desired_hash.
  infra-plan:
    trigger:
      type: http
      config:
        path: /api/infra/plan
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: build-plan
        type: step.set
        config:
          values:
            plan:
              provider: stub
              actions:
                - action: create
                  resource_type: stub.database
                  change_summary: new stub resource will be created
            desired_hash: sha256-stub-deterministic-e3b0c44298fc1c149afb
      - name: audit
        type: step.log
        config:
          level: info
          message: "infra plan requested by {{.steps.authenticate.subject}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            plan: { _from: "steps.build-plan.plan" }
            desired_hash: { _from: "steps.build-plan.desired_hash" }

  # ── POST /api/infra/apply ─────────────────────────────────────────────────
  # {provider:"stub", specs:[...], desired_hash:"..."}
  infra-apply:
    trigger:
      type: http
      config:
        path: /api/infra/apply
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: apply-result
        type: step.set
        config:
          values:
            applied: true
            provider: stub
      - name: audit
        type: step.log
        config:
          level: info
          message: "infra apply by {{.steps.authenticate.subject}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            applied: { _from: "steps.apply-result.applied" }
            provider: { _from: "steps.apply-result.provider" }

  # ── POST /api/infra/commit ────────────────────────────────────────────────
  # {specs:[...], branch:"feat/...", message:"..."}
  # Uses step.sandbox_exec to run a git clone/commit/push via the alpine/git
  # image. The bare-git-repo fixture is at /data/gitrepo.git (container) and
  # ${GITREPO_HOST_PATH} (host) — the sandbox mount uses the HOST path.
  # seed.sh exports GITREPO_HOST_PATH (absolute host path) before docker compose up.
  infra-commit:
    trigger:
      type: http
      config:
        path: /api/infra/commit
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: git-commit
        type: step.sandbox_exec
        config:
          image: alpine:3.20
          security_profile: standard
          network: bridge
          timeout: 60s
          fail_on_error: true
          mounts:
            - source: "${GITREPO_HOST_PATH}"
              target: /gitrepo.git
              read_only: false
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache git -q 2>/dev/null
              git clone /gitrepo.git /tmp/repo
              cd /tmp/repo
              git config user.email "scenario-92@infra-admin.local"
              git config user.name "Scenario 92 GitOps"
              git checkout -B feat/gitops-demo
              mkdir -p infra
              printf '%s\n%s\n%s\n%s\n%s\n%s\n' \
                '# Desired infra state - committed via GitOps demo' \
                'provider: stub' \
                'resources:' \
                '  - name: demo-database' \
                '    type: stub.database' \
                '    region: stub-east' \
                > infra/desired-state.yaml
              git add infra/desired-state.yaml
              git commit -m "chore(infra): update desired state via admin UI" || echo "nothing to commit"
              git push origin feat/gitops-demo
              echo '{"branch":"feat/gitops-demo","committed":true}'
      - name: audit
        type: step.log
        config:
          level: info
          message: "infra commit by {{.steps.authenticate.subject}}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            branch: feat/gitops-demo
            committed: true

  # ── GET /api/infra/drift ──────────────────────────────────────────────────
  # Stub: DetectDrift always returns Drifted:false, supported:true.
  infra-drift:
    trigger:
      type: http
      config:
        path: /api/infra/drift
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_query: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: stub
            supported: true
            drifts: []
            summary:
              total: 0
              drifted: 0
              in_sync: 0

  # ── GET /api/infra/secrets ────────────────────────────────────────────────
  # Metadata only — values NEVER returned.
  infra-secrets-list:
    trigger:
      type: http
      config:
        path: /api/infra/secrets
        method: GET
    steps:
      - name: parse_auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_auth.headers.Authorization
          subject_field: subject
      - name: list-meta
        type: step.nosql_query
        config:
          store: secrets-store
          key_prefix: "secret:"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            secrets: { _from: "steps.list-meta.items" }
            note: "values are never returned — metadata only"

  # ── POST /api/infra/secrets ───────────────────────────────────────────────
  # {name:"STRIPE_KEY", backend:"env"} — declares a secret name.
  # Value is intentionally discarded (write-only in this demo).
  infra-secrets-declare:
    trigger:
      type: http
      config:
        path: /api/infra/secrets
        method: POST
    steps:
      - name: parse_request
        type: step.request_parse
        config:
          parse_headers: [Authorization]
          parse_body: true
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse_request.headers.Authorization
          subject_field: subject
      - name: store-meta
        type: step.nosql_put
        config:
          store: secrets-store
          key: "secret:demo"
          value:
            name: demo
            backend: env
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            declared: true
            note: "value is write-only and not stored in this demo"
