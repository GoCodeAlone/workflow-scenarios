            lease_ttl_seconds: '{{ default 60 (index .steps "parse" "body" "lease_ttl_seconds") }}'
      - name: claim
        type: step.signal_inbox_claim
        config:
          store_ref: signal_envelopes
          lease_ttl_seconds: 60
      - name: respond
        type: step.json_response
        config:
          status: 200
