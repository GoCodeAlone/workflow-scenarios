name: CLI Tool with Workflow Backend
id: "04-cli-tool"
category: A
description: |
  A developer CLI tool (wfctl) that uses the workflow engine as a backend
  for executing multi-step automation pipelines. Validates CLI-driven pipeline
  invocation, progress streaming, and artifact output.
components:
  - workflow (engine)
  - wfctl (CLI)
status: testable
notes: |
  Validated via wfctl pipeline list and pipeline run commands running locally.
  No k8s deployment required — the wfctl binary embeds the workflow engine.
  Tests cover: pipeline list, run with --var, --input, --verbose, invalid name,
  conditional branching, foreach iteration, template rendering, and validation.
