name: Bump Workflow Release

on:
  workflow_dispatch:
    inputs:
      workflow_version:
        description: Workflow release tag, for example v0.63.1. Defaults to latest release.
        required: false
        type: string
  repository_dispatch:
    types:
      - workflow-release
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump github.com/GoCodeAlone/workflow
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/GoCodeAlone/*
      GONOSUMDB: github.com/GoCodeAlone/*
      GIT_TERMINAL_PROMPT: "0"
      RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}
      WORKFLOW_VERSION: ${{ github.event.inputs.workflow_version || github.event.client_payload.tag || '' }}
    steps:
      - name: Check out scenarios
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Configure private Go modules
        run: |
          git config --global url."https://x-access-token:${RELEASES_TOKEN}@github.com/GoCodeAlone/".insteadOf "https://github.com/GoCodeAlone/"
          go env -w GOPRIVATE="${GOPRIVATE}"
          go env -w GONOSUMDB="${GONOSUMDB}"

      - name: Check GitHub CLI
        run: gh --version
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}

      - name: Bump workflow module
        id: bump
        run: |
          before="$(GOWORK=off go list -m -f '{{.Version}}' github.com/GoCodeAlone/workflow)"
          ./scripts/bump-workflow-release.sh
          after="$(GOWORK=off go list -m -f '{{.Version}}' github.com/GoCodeAlone/workflow)"
          echo "before=$before" >> "$GITHUB_OUTPUT"
          echo "after=$after" >> "$GITHUB_OUTPUT"
          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}

      - name: Create bump PR
        id: create-pr
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASES_TOKEN || github.token }}
          branch: automation/bump-workflow-${{ steps.bump.outputs.after }}
          delete-branch: true
          title: Bump workflow to ${{ steps.bump.outputs.after }}
          commit-message: "chore: bump workflow to ${{ steps.bump.outputs.after }}"
          body: |
            ## Summary
            - bump `github.com/GoCodeAlone/workflow` from `${{ steps.bump.outputs.before }}` to `${{ steps.bump.outputs.after }}`
            - run `GOWORK=off go mod tidy`

            ## Verification
            - `GOWORK=off go test ./...`

      - name: Queue bump PR for auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --add-reviewer copilot-pull-request-reviewer || true
          if ! gh pr merge "$PR_NUMBER" --squash --auto --delete-branch; then
            echo "::warning::Could not enable auto-merge for workflow bump PR #${PR_NUMBER}; leaving it open for manual merge."
          fi

      - name: Close superseded workflow bump PRs
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          superseded_prs="$(gh pr list --state open --search 'Bump workflow to in:title' --json number,headRefName \
            --jq '.[] | select((.number|tostring) != env.PR_NUMBER) | select(.headRefName | startswith("automation/bump-workflow-")) | .number')"
          [ -n "$superseded_prs" ] || exit 0
          while read -r old_pr; do
            [ -n "$old_pr" ] || continue
            gh pr close "$old_pr" --delete-branch --comment "Superseded by workflow bump PR #${PR_NUMBER}."
          done <<< "$superseded_prs"

      - name: Admin-merge bump PR after checks
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          review_threads_query='
            query($owner:String!, $repo:String!, $number:Int!) {
              repository(owner:$owner, name:$repo) {
                pullRequest(number:$number) {
                  reviewThreads(first:100) {
                    nodes { isResolved }
                  }
                }
              }
            }'
          for attempt in $(seq 1 60); do
            pr_state="$(gh pr view "$PR_NUMBER" --json state --jq .state)"
            [ "$pr_state" != "MERGED" ] || exit 0

            checks="$(gh pr checks "$PR_NUMBER" --json name,bucket,state,link 2>/dev/null || printf '[]')"
            failed="$(jq '[.[] | select(.bucket == "fail")] | length' <<< "$checks")"
            pending="$(jq '[.[] | select(.bucket == "pending")] | length' <<< "$checks")"
            if [ "$failed" != "0" ]; then
              jq -r '.[] | select(.bucket == "fail") | [.name,.state,.link] | @tsv' <<< "$checks"
              exit 1
            fi
            if [ "$pending" = "0" ]; then
              unresolved_threads="$(gh api graphql \
                -f owner="${GITHUB_REPOSITORY_OWNER}" \
                -f repo="${GITHUB_REPOSITORY#*/}" \
                -F number="$PR_NUMBER" \
                -f query="$review_threads_query" \
                --jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length')"
              if [ "$unresolved_threads" != "0" ]; then
                echo "::warning::Workflow bump PR #${PR_NUMBER} has unresolved review threads; leaving it open."
                exit 0
              fi
              gh pr merge "$PR_NUMBER" --squash --admin --delete-branch
              exit 0
            fi
            echo "workflow bump PR #${PR_NUMBER}: checks pending (${pending}); poll ${attempt}/60"
            sleep 20
          done
          echo "::error::Timed out waiting for workflow bump PR #${PR_NUMBER} checks."
          exit 1
