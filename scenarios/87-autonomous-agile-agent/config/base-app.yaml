# ============================================================
# Scenario 87 — Autonomous Agile Agent: Base Task API
#
# Minimal starting point. The agent audits this application and
# iteratively improves it over up to 5 agile-style iterations,
# committing each increment and verifying with HTTP requests.
# ============================================================

modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: db
    type: storage.sqlite
    config:
      dbPath: /data/tasks.db
      walMode: true
    dependsOn: [router]

workflows:
  http:
    router: router
    server: server
    # routes: [] is correct — HTTP bindings are registered by the workflow engine
    # from each pipeline's trigger definition (trigger.type: http, trigger.config.path).
    # The routes list is used only for the legacy router-based pattern.
    # This trigger-based routing pattern is used in 8+ existing scenarios including
    # 02-event-driven, 07-no-code-workflow, 26-config-to-binary, 85-self-improving-api.
    routes: []

pipelines:
  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "87-autonomous-agile-agent"
            version: "0.1.0"

  list_tasks:
    trigger:
      type: http
      config:
        path: /tasks
        method: GET
    steps:
      - name: query
        type: step.db_query
        config:
          database: db
          mode: list
          query: "SELECT id, title, description, status, created_at FROM tasks ORDER BY created_at DESC"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.query.rows"

  create_task:
    trigger:
      type: http
      config:
        path: /tasks
        method: POST
    steps:
      - name: insert
        type: step.db_exec
        config:
          database: db
          query: "INSERT INTO tasks (title, description, status, created_at) VALUES (?, ?, 'pending', datetime('now'))"
          params:
            - "{{ .body.title }}"
            - "{{ .body.description | default \"\" }}"
      - name: respond
        type: step.json_response
        config:
          status: 201
          body:
            status: created

  get_task:
    trigger:
      type: http
      config:
        path: /tasks/{id}
        method: GET
    steps:
      - name: query
        type: step.db_query
        config:
          database: db
          mode: single
          query: "SELECT id, title, description, status, created_at FROM tasks WHERE id = ?"
          params:
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.query.row"

  update_task:
    trigger:
      type: http
      config:
        path: /tasks/{id}
        method: PUT
    steps:
      - name: update
        type: step.db_exec
        config:
          database: db
          query: "UPDATE tasks SET title = ?, status = ? WHERE id = ?"
          params:
            - "{{ .body.title }}"
            - "{{ .body.status }}"
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: updated

  delete_task:
    trigger:
      type: http
      config:
        path: /tasks/{id}
        method: DELETE
    steps:
      - name: delete
        type: step.db_exec
        config:
          database: db
          query: "DELETE FROM tasks WHERE id = ?"
          params:
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: deleted
