apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-server
  namespace: wf-scenario-28
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: workflow-server
    spec:
      containers:
        - name: workflow-server
          image: workflow-server:local
          imagePullPolicy: Never
          args: ["-config", "/config/app.yaml"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 20
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: iac-state
              mountPath: /var/lib/workflow/iac-state
      volumes:
        - name: config
          configMap:
            name: app
        - name: iac-state
          persistentVolumeClaim:
            claimName: iac-state-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-server
  namespace: wf-scenario-28
spec:
  selector:
    app: workflow-server
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iac-state-pvc
  namespace: wf-scenario-28
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
