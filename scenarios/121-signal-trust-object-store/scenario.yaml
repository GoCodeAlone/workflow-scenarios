name: Signal Trust Object Store
id: "121-signal-trust-object-store"
category: C
description: |
  Local-only Workflow app proof that workflow-plugin-signal v0.27.0 can use
  signal.trust_store backend object_store and use step.signal_trust_policy_check
  as an application gate before encrypted send/enqueue. The scenario runs
  workflow-server, loads workflow-plugin-signal as a released external plugin,
  drives participant-parametric HTTP route pairs, verifies policy allow/deny,
  reset, history, restart persistence, hash-derived object keys, checksum
  tamper rejection, wrong-key rejection, and redacted outputs.
components:
  - workflow-plugin-signal
  - workflow-server
  - HTTP trigger routes
  - Workflow external plugin loader
  - signal.identity_store
  - signal.trust_store
  - signal.envelope_store
  - step.signal_session_prepare
  - step.signal_trust_observe
  - step.signal_trust_reset
  - step.signal_trust_history
  - step.signal_trust_policy_check
  - step.signal_encrypt
  - step.signal_outbox_enqueue
status: testable
tags:
  - signal
  - trust-reset
  - trust-policy
  - trust-history
  - object-store
  - safety-number
  - tofu
  - workflow-plugin
  - local-only
  - compare-and-set
  - tamper-rejection
runtime: local
