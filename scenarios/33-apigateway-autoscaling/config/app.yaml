modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: aws-provider
    type: iac.provider
    config:
      provider: aws
      credentials: env
      region: us-east-1

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  - name: production-gateway
    type: infra.api_gateway
    dependsOn: [aws-provider]
    config:
      provider: aws-provider
      name: my-api
      stage: prod
      cors:
        allow_origins: ["*"]
        allow_methods: ["GET", "POST", "PUT", "DELETE"]
      routes:
        - path: /api/v1/users
          method: "*"
          target: "http://users-service:8080"
          rate_limit: 100
        - path: /api/v1/orders
          method: "*"
          target: "http://orders-service:8080"
          auth_type: jwt

  - name: my-scaling
    type: infra.autoscaling_group
    dependsOn: [aws-provider]
    config:
      provider: aws-provider
      policies:
        - name: cpu-target
          type: target_tracking
          target_resource: staging-ecs
          min_capacity: 2
          max_capacity: 20
          metric_name: CPUUtilization
          target_value: 70
        - name: night-scale-down
          type: scheduled
          target_resource: staging-ecs
          schedule: "cron(0 22 * * ? *)"
          desired_capacity: 1

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "33-apigateway-autoscaling"

  gateway-plan:
    trigger:
      type: http
      config:
        path: /api/v1/gateway/plan
        method: POST
    steps:
      - name: plan
        type: step.iac_plan
        config:
          platform: production-gateway
          resource_id: production-gateway
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  gateway-apply:
    trigger:
      type: http
      config:
        path: /api/v1/gateway/apply
        method: POST
    steps:
      - name: apply
        type: step.iac_apply
        config:
          platform: production-gateway
          resource_id: production-gateway
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  gateway-status:
    trigger:
      type: http
      config:
        path: /api/v1/gateway/status
        method: GET
    steps:
      - name: status
        type: step.iac_status
        config:
          platform: production-gateway
          resource_id: production-gateway
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  gateway-destroy:
    trigger:
      type: http
      config:
        path: /api/v1/gateway
        method: DELETE
    steps:
      - name: destroy
        type: step.iac_destroy
        config:
          platform: production-gateway
          resource_id: production-gateway
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  scaling-plan:
    trigger:
      type: http
      config:
        path: /api/v1/scaling/plan
        method: POST
    steps:
      - name: plan
        type: step.iac_plan
        config:
          platform: my-scaling
          resource_id: my-scaling
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  scaling-apply:
    trigger:
      type: http
      config:
        path: /api/v1/scaling/apply
        method: POST
    steps:
      - name: apply
        type: step.iac_apply
        config:
          platform: my-scaling
          resource_id: my-scaling
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  scaling-status:
    trigger:
      type: http
      config:
        path: /api/v1/scaling/status
        method: GET
    steps:
      - name: status
        type: step.iac_status
        config:
          platform: my-scaling
          resource_id: my-scaling
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  scaling-destroy:
    trigger:
      type: http
      config:
        path: /api/v1/scaling
        method: DELETE
    steps:
      - name: destroy
        type: step.iac_destroy
        config:
          platform: my-scaling
          resource_id: my-scaling
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."
