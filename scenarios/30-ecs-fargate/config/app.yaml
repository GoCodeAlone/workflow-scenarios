modules:
  - name: server
    type: http.server
    config:
      address: ":18130"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: aws-provider
    type: iac.provider
    config:
      plugin: workflow-plugin-aws
      mode: mock
      region: us-east-1

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  - name: staging-ecs
    type: infra.container_service
    config:
      provider: aws-provider
      name: staging-ecs
      image: public.ecr.aws/nginx/nginx:latest
      cluster: staging-cluster
      region: us-east-1
      launchType: fargate
      replicas: 2
      subnet_ids:
        - subnet-abc123
        - subnet-def456
      security_group_ids:
        - sg-0123456789

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "30-ecs-fargate"

  ecs-plan:
    trigger:
      type: http
      config:
        path: /api/v1/services/plan
        method: POST
    steps:
      - name: plan
        type: step.iac_provider_plan
        config:
          provider: aws-provider
          resources:
            - staging-ecs
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.plan"

  ecs-apply:
    trigger:
      type: http
      config:
        path: /api/v1/services/apply
        method: POST
    steps:
      - name: plan
        type: step.iac_provider_plan
        config:
          provider: aws-provider
          resources:
            - staging-ecs
      - name: apply
        type: step.iac_provider_apply
        config:
          provider: aws-provider
          resources:
            - staging-ecs
          desired_hash_from: steps.plan.desired_hash
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.apply"

  ecs-status:
    trigger:
      type: http
      config:
        path: /api/v1/services/status
        method: GET
    steps:
      - name: status
        type: step.iac_provider_list
        config:
          provider: aws-provider
          resources:
            - staging-ecs
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.status"

  ecs-destroy:
    trigger:
      type: http
      config:
        path: /api/v1/services
        method: DELETE
    steps:
      - name: destroy
        type: step.iac_provider_destroy
        config:
          provider: aws-provider
          resources:
            - staging-ecs
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.destroy"
