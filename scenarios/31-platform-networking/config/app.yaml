modules:
  - name: server
    type: http.server
    config:
      address: ":18131"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: aws-provider
    type: iac.provider
    config:
      plugin: workflow-plugin-aws
      mode: mock
      region: us-east-1

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "31-platform-networking"

  network-plan:
    trigger:
      type: http
      config:
        path: /api/v1/networks/plan
        method: POST
    steps:
      - name: parse-request
        type: step.request_parse
        config:
          format: json
      - name: plan
        type: step.iac_provider_plan
        config:
          provider: aws-provider
          specs_from: steps.parse-request.body.specs
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: steps.plan

  network-apply:
    trigger:
      type: http
      config:
        path: /api/v1/networks/apply
        method: POST
    steps:
      - name: parse-request
        type: step.request_parse
        config:
          format: json
      - name: apply
        type: step.iac_provider_apply
        config:
          provider: aws-provider
          specs_from: steps.parse-request.body.specs
          desired_hash_from: steps.parse-request.body.desired_hash
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: steps.apply

  network-status:
    trigger:
      type: http
      config:
        path: /api/v1/networks/status
        method: POST
    steps:
      - name: parse-request
        type: step.request_parse
        config:
          format: json
      - name: status
        type: step.iac_provider_list
        config:
          provider: aws-provider
          refs_from: steps.parse-request.body.refs
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: steps.status

  network-destroy:
    trigger:
      type: http
      config:
        path: /api/v1/networks/destroy
        method: POST
    steps:
      - name: parse-request
        type: step.request_parse
        config:
          format: json
      - name: destroy
        type: step.iac_provider_destroy
        config:
          provider: aws-provider
          refs_from: steps.parse-request.body.refs
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: steps.destroy
