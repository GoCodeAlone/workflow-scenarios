# ============================================================
# Scenario 19 — v3 Breaking API (intentional breaking changes)
#
# Deliberately introduces breaking changes relative to v1 so
# the contract tooling can be verified to detect them:
#
#   BREAK 1 — Removed endpoint:
#     POST /api/v1/auth/login is GONE.  Clients expecting to
#     obtain a JWT via that path will receive 404.
#
#   BREAK 2 — Path change (register):
#     POST /api/v1/auth/register → POST /api/v2/auth/register
#     Any client calling the old path will receive 404.
#
#   BREAK 3 — Auth added to previously public endpoint:
#     GET /api/v1/items was public in v1.  In v3 it requires a
#     valid JWT.  Unauthenticated clients that previously worked
#     will now receive 401.
#
# The test script uses this config to CONFIRM that the contract
# comparison tool flags these three breaks.  If no breaks are
# reported, the tooling itself is broken.
# ============================================================

modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: db
    type: storage.sqlite
    config:
      dbPath: "/data/scenario19-v3.db"
      maxConnections: 5
      walMode: true

  - name: jwt
    type: auth.jwt
    config:
      secret: "${JWT_SECRET:-scenario19-dev-secret}"
      issuer: "scenario-19-v3"
      tokenExpiry: "1h"
    dependsOn: [router]

workflows:
  http:
    router: router
    server: server
    routes:
      # BREAK 2: register moved to /api/v2/auth/register
      - method: POST
        path: /api/v2/auth/register
        handler: jwt

      # BREAK 1: login endpoint REMOVED (not listed here)

      - method: GET
        path: /api/v1/auth/profile
        handler: jwt

      - method: POST
        path: /api/v1/items
        handler: jwt

      # BREAK 3: list-items now requires auth (middleware added)
      - method: GET
        path: /api/v1/items
        handler: jwt

pipelines:
  # ----------------------------------------------------------------
  # Health
  # ----------------------------------------------------------------
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            version: v3
            scenario: "19-version-contracts"

  # ----------------------------------------------------------------
  # Auth: Register — BREAK 2: path changed to /api/v2/
  # ----------------------------------------------------------------
  register:
    trigger:
      type: http
      config:
        path: /api/v2/auth/register
        method: POST
    steps:
      - name: validate-input
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [email, password, name]
      - name: create-user
        type: step.user_register
        config:
          database: db
          emailField: email
          passwordField: password
          nameField: name
      - name: respond
        type: step.json_response
        config:
          status: 201
          body:
            status: created
            message: "Account created successfully"

  # NOTE: login pipeline REMOVED — BREAK 1

  # ----------------------------------------------------------------
  # Auth: Profile (unchanged)
  # ----------------------------------------------------------------
  profile:
    trigger:
      type: http
      config:
        path: /api/v1/auth/profile
        method: GET
    steps:
      - name: require-auth
        type: step.auth_required
        config:
          jwtModule: jwt
      - name: get-profile
        type: step.user_profile
        config:
          database: db
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-profile.user"

  # ----------------------------------------------------------------
  # Items: Create (unchanged)
  # ----------------------------------------------------------------
  create-item:
    trigger:
      type: http
      config:
        path: /api/v1/items
        method: POST
    steps:
      - name: require-auth
        type: step.auth_required
        config:
          jwtModule: jwt
      - name: validate-input
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [name]
      - name: log-create
        type: step.log
        config:
          level: info
          message: "Creating item"
      - name: store-item
        type: step.cache_set
        config:
          key: "item:{{ .request.body.name }}"
          value: "{{ json .request.body }}"
          ttl: "24h"
      - name: respond
        type: step.json_response
        config:
          status: 201
          body:
            status: created
            name: "{{ .request.body.name }}"

  # ----------------------------------------------------------------
  # Items: List — BREAK 3: now requires auth
  # ----------------------------------------------------------------
  list-items:
    trigger:
      type: http
      config:
        path: /api/v1/items
        method: GET
    steps:
      - name: require-auth
        type: step.auth_required
        config:
          jwtModule: jwt
      - name: log-list
        type: step.log
        config:
          level: info
          message: "Listing items (auth required in v3)"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            items: []
            version: v3
