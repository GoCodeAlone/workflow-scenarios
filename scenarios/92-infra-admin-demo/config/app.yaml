# ============================================================
# Scenario 92 — Infra Admin (stub variant)
#
# Full app YAML mirroring docs/plans/2026-05-27-infra-admin-dynamic-design.md
# §App Integration. Boots:
#   - auth.jwt + authz.local (in-process RBAC, scenario_stub build tag)
#   - http.middleware.auth + http.middleware.securityheaders
#   - health.checker (/healthz)
#   - http.server + http.router
#   - admin.dashboard (workflow-plugin-admin)
#   - iac.state (memory) + stub iac.provider
#   - infra.admin (host-side module) — fires 4 registration pipelines on Start
#
# Four single-step pipelines register the iframe contributions via the
# STRICT_PROTO step.admin_register_contribution. The list-admin-contributions
# pipeline backs admin shell's GET /api/admin/contributions.
# ============================================================

modules:
  - name: auth
    type: auth.jwt
    config:
      issuer: "scenario-92"
      secret: "scenario-92-jwt-secret-do-not-use-in-prod"

  # authz.local is an in-process RBAC enforcer registered by the localauthz
  # plugin under the scenario_stub build tag. JWT `sub` claim = casbin subject.
  # Policies: [subject, object, action] triples — bare YAML sequence.
  - name: authz
    type: authz.local
    config:
      policies:
        - ["operator", "infra:read",    "allow"]
        - ["operator", "infra:apply",   "allow"]
        - ["operator", "infra:destroy", "allow"]
        - ["viewer",   "infra:read",    "allow"]

  # auth-mw wraps auth.jwt as an HTTPMiddleware so infra.admin can resolve
  # it via auth_module. The engine wires AuthProvider (auth.jwt) to
  # AuthMiddleware (auth-mw) automatically.
  - name: auth-mw
    type: http.middleware.auth
    config:
      authType: Bearer

  - name: security-headers
    type: http.middleware.securityheaders
    config:
      frameOptions: SAMEORIGIN
      contentSecurityPolicy: >-
        default-src 'self'; script-src 'self'; style-src 'self';
        img-src 'self' data:; frame-ancestors 'self'

  - name: http
    type: http.server
    config:
      address: ":8080"

  # health.checker registers /healthz so docker-compose healthcheck and
  # seed.sh precondition work. autoDiscover:true wires to the http.router.
  - name: health
    type: health.checker
    config:
      healthPath: /healthz
      autoDiscover: true

  - name: http-router
    type: http.router
    dependsOn: [http]

  - name: admin
    type: admin.dashboard
    config:
      route_prefix: /admin
      app_name: Scenario 92 — Infra Admin Demo
      auth_module: auth
      authz_module: authz

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  - name: stub-provider
    type: iac.provider
    config:
      provider: stub

  - name: infra-admin
    type: infra.admin
    config:
      route_prefix:            /api/infra-admin
      asset_prefix:            /admin/infra-admin
      # state_module omitted: module.IaCStateStore (old API) ≠ interfaces.IaCStateStore
      # (new API); all handlers nil-safe so the stack boots and mutations work.
      http_module:             http-router
      auth_module:             auth-mw
      # authz_module wires server-side RBAC via the in-process authz.local
      # enforcer (scenario_stub tag). operator→apply/destroy allowed;
      # viewer→apply/destroy denied (403).
      authz_module:            authz
      security_headers_module: security-headers
      provider_modules:        [stub-provider]
      access_log_path:         /tmp/infra-admin-audit.jsonl

workflows:
  http:
    server: http
    router: http-router
    routes: []   # routes mounted by infra.admin module + list-admin-contributions pipeline

pipelines:
  # Four single-step pipelines fired by infra.admin.Start() via
  # engine.TriggerWorkflow. Each merges its `data` payload into
  # PipelineContext.Current; the typed step reads TypedInput from
  # Current per the STRICT_PROTO RegisterContributionInput shape.
  register-infra-admin-resources:
    trigger: { type: manual }
    steps:
      - name: register
        type: step.admin_register_contribution
        config: { module: admin }

  register-infra-admin-resource-detail:
    trigger: { type: manual }
    steps:
      - name: register
        type: step.admin_register_contribution
        config: { module: admin }

  register-infra-admin-new-resource:
    trigger: { type: manual }
    steps:
      - name: register
        type: step.admin_register_contribution
        config: { module: admin }

  # T12: audit-viewer contribution registered by infra.admin.Start().
  register-infra-admin-actions:
    trigger: { type: manual }
    steps:
      - name: register
        type: step.admin_register_contribution
        config: { module: admin }

  # HTTP-triggered pipeline the admin shell GETs to enumerate contributions.
  list-admin-contributions:
    trigger:
      type: http
      config:
        path: /api/admin/contributions
        method: GET
    steps:
      - name: list
        type: step.admin_list_contributions
        config: { module: admin }
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "contributions" }
