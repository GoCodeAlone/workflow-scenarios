name: Infra Admin Migration Demo (step-based IaC)
id: "92-infra-admin-demo"
category: C
description: |
  Demonstrates the migration from the deleted engine module to the new
  step.iac_provider_* pipeline architecture (workflow v0.70.0).

  The stub IaC provider is an EXTERNAL gRPC plugin. The engine's WiringHook
  registers it as service "stub-iac-provider" so step.iac_provider_* steps
  resolve it at runtime.

  Pipelines (no infra.admin module type — that was deleted):
    - GET /api/infra/catalog → step.iac_provider_catalog (live regions via RegionLister)
    - GET /api/infra/resources → step.iac_provider_list
    - POST /api/infra/plan → step.iac_provider_plan (desired_hash, 1 create action)
    - POST /api/infra/apply → step.iac_provider_apply (two-phase hash guard)
    - GET /api/infra/drift → step.iac_provider_drift (DriftDetector, no drift)
    - POST /api/infra/commit → gitops commit response
    - GET /api/infra/secrets → metadata-only (no values)

  Auth/RBAC via step.auth_validate + step.conditional (JWT sub claim):
    operator → plan/apply/commit allowed
    viewer → read-only (catalog, list, drift); plan/apply/commit → 403
    unauthenticated → 401

  Playwright spec at e2e/tests/scenario-92-infra-admin.spec.ts covers:
    - catalog returns stub-east/stub-west regions + stub.database/stub.bucket types
    - plan returns desired_hash (64-char hex) + create action
    - apply with operator JWT succeeds (hash guard passes)
    - viewer cannot apply (403 RBAC)
    - unauthenticated mutations return 401
    - secrets metadata-only (no values)
components:
  - workflow v0.70.0 (step.iac_provider_* from platform plugin)
  - stub-iac-provider (external gRPC plugin, fixture)
  - workflow-plugin-admin (external gRPC plugin)
  - iac.state (memory)
status: testable
tags:
  - admin
  - iac
  - migration
  - step-based
  - external-plugin
  - playwright
  - iac_provider
