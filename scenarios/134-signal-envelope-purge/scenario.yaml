name: Signal Envelope Purge
id: "134-signal-envelope-purge"
category: C
description: |
  Local-only Workflow app proof that workflow-plugin-signal v0.34.0 persists
  terminal envelope retention purge behavior in a scenario-owned SQLite
  envelope store. The app exercises enqueue, claim, ack, inbox receive,
  dead-letter, purge preview, destructive terminal purge, status queries, and
  restart persistence without returning plaintext, ciphertext, custody refs,
  authorization refs, active lease refs, or unsafe raw failure text from public
  purge/status responses.
components:
  - workflow-plugin-signal
  - workflow-server
  - HTTP trigger routes
  - Workflow external plugin loader
  - signal.identity_store
  - signal.envelope_store
  - step.signal_session_prepare
  - step.signal_encrypt
  - step.signal_outbox_enqueue
  - step.signal_outbox_claim
  - step.signal_outbox_handoff
  - step.signal_outbox_release
  - step.signal_outbox_ack
  - step.signal_outbox_dead_letter
  - step.signal_inbox_receive
  - step.signal_inbox_decrypt
  - step.signal_envelope_status
  - step.signal_envelope_purge
status: testable
tags:
  - signal
  - envelope-purge
  - retention
  - workflow-plugin
  - local-only
  - encrypted
  - redaction
  - sqlite
  - restart-persistence
runtime: local
