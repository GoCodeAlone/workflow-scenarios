modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          body:
            status: ok

  build-binary-dry-run:
    trigger:
      type: http
      config:
        path: /api/v1/build/binary
        method: POST
    steps:
      - name: build
        type: step.build_binary
        config:
          config_file: /config/app.yaml
          module_path: generated-app
          go_version: "1.22"
          os: linux
          arch: amd64
          embed_config: true
          dry_run: true

      - name: respond
        type: step.json_response
        config:
          body_from: steps.build
