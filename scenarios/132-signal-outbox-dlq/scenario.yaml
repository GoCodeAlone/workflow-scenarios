name: Signal Outbox DLQ
id: "132-signal-outbox-dlq"
category: C
description: |
  Local-only Workflow app proof that workflow-plugin-signal v0.33.0 persists
  outbox dead-letter quarantine in a scenario-owned SQLite envelope store. The
  app exercises enqueue, claim, handoff, release retry exhaustion, explicit
  dead-letter, status queries, and restart persistence without returning
  plaintext, ciphertext, custody refs, authorization refs, active lease refs, or
  unsafe raw failure text from public status responses.
components:
  - workflow-plugin-signal
  - workflow-server
  - HTTP trigger routes
  - Workflow external plugin loader
  - signal.identity_store
  - signal.envelope_store
  - step.signal_session_prepare
  - step.signal_encrypt
  - step.signal_outbox_enqueue
  - step.signal_outbox_claim
  - step.signal_outbox_handoff
  - step.signal_outbox_release
  - step.signal_outbox_ack
  - step.signal_outbox_dead_letter
  - step.signal_inbox_receive
  - step.signal_inbox_decrypt
  - step.signal_envelope_status
status: testable
tags:
  - signal
  - outbox-dlq
  - workflow-plugin
  - local-only
  - encrypted
  - redaction
  - sqlite
  - restart-persistence
runtime: local
