name: Automated Workflow (No-Code)
id: "07-no-code-workflow"
category: A
description: |
  A no-code workflow automation created using the admin plugin's visual
  drag-and-drop builder. Non-developers connect integrations (webhooks,
  cron schedules), define trigger conditions, and chain processing steps
  — all via the visual builder, no code required. The admin plugin provides
  the builder; workflow-cloud provides management at scale.
components:
  - workflow (engine)
  - workflow-plugin-admin (visual builder)
  - PostgreSQL
status: testable
notes: |
  The visual pipeline builder already exists in the admin plugin. This
  scenario validates that a non-developer can create and run automated
  workflows entirely through the UI. The admin plugin is the open-source
  "Workflow Studio" — the builder and local execution tool. workflow-cloud
  adds multi-tenant management, not the builder itself.
