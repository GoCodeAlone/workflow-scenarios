modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: jwt
    type: auth.jwt
    config:
      secret: "${JWT_SECRET}"
      issuer: "scenario-01-idp"
      tokenExpiry: "1h"
    dependsOn: [router]

  - name: auth-middleware
    type: http.middleware.auth
    config:
      authType: Bearer
    dependsOn: [jwt]

pipelines:
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - type: step.json_response
        config:
          status: 200
          body:
            status: ok

workflows:
  http:
    router: router
    server: server
    routes:
      # Auth setup (first-user registration, creates admin)
      - method: POST
        path: /api/auth/setup
        handler: jwt

      - method: GET
        path: /api/auth/setup-status
        handler: jwt

      # Login
      - method: POST
        path: /api/auth/login
        handler: jwt

      # Profile (requires auth)
      - method: GET
        path: /api/auth/profile
        handler: jwt
        middlewares:
          - auth-middleware

      # Admin creates additional users
      - method: POST
        path: /api/auth/users
        handler: jwt
        middlewares:
          - auth-middleware
