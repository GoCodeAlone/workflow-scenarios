apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-server
  namespace: wf-scenario-33
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: workflow-server
    spec:
      containers:
        - name: workflow-server
          image: workflow-server-aws:local
          imagePullPolicy: Never
          args: ["-config", "/config/app.yaml", "-data-dir", "/data"]
          ports:
            - containerPort: 18133
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18133
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 20
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: app
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-server
  namespace: wf-scenario-33
spec:
  selector:
    app: workflow-server
  ports:
    - port: 18133
      targetPort: 18133
