name: Deployment Pipeline
id: "75-deployment-pipeline"
category: C
description: |
  Config-validation scenario for an end-to-end deployment pipeline combining IaC
  provisioning with container build and rolling deployment. Tests the complete
  CI/CD step sequence in a single workflow config.

  Pipeline: step.iac_plan → step.iac_apply → step.container_build →
            step.deploy_rolling → step.deploy_verify

  Covers:
    - iac.provider + iac.state
    - infra.container_service
    - step.iac_plan, step.iac_apply
    - step.container_build (build + push image)
    - step.deploy_rolling with the container service
    - step.deploy_verify (health check)

  No live cloud API calls — config-validation only.
components:
  - wfctl (config validation)
  - iac.provider (provider: digitalocean)
  - iac.state (backend: memory)
  - infra.container_service
  - step.iac_plan
  - step.iac_apply
  - step.container_build
  - step.deploy_rolling
  - step.deploy_verify
status: testable
tags:
  - iac
  - deployment
  - pipeline
  - ci-cd
  - config-validation
  - local-only
