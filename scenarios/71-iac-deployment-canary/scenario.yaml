name: IaC Deployment Canary
id: "71-iac-deployment-canary"
category: C
description: |
  Config-validation scenario for canary deployments using infra.container_service
  and step.deploy_canary with metric gates and staged rollout percentages. Verifies
  that canary stages, traffic weights, and promotion criteria are correctly configured.

  Covers:
    - iac.provider (provider: gcp)
    - iac.state (backend: memory)
    - infra.container_service
    - step.deploy_canary with stages (5% → 25% → 100%) and metric gates
    - step.deploy_verify for canary health checks

  No live cloud API calls — config-validation only.
components:
  - wfctl (config validation)
  - iac.provider (provider: gcp)
  - iac.state (backend: memory)
  - infra.container_service
  - step.deploy_canary
  - step.deploy_verify
status: testable
tags:
  - iac
  - deployment
  - canary
  - config-validation
  - local-only
