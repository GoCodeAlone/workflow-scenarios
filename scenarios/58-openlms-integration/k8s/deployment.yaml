apiVersion: v1
kind: Namespace
metadata:
  name: wf-scenario-58
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app
  namespace: wf-scenario-58
data:
  app.yaml: |
    # loaded from config/app.yaml via make deploy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-58
  namespace: wf-scenario-58
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-58
  template:
    metadata:
      labels:
        app: scenario-58
    spec:
      containers:
        - name: workflow
          image: workflow-server-openlms:local
          imagePullPolicy: Never
          args: ["-config", "/config/app.yaml", "-data-dir", "/data"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
        - name: mock-openlms
          image: mock-openlms:local
          imagePullPolicy: Never
          env:
            - name: MOCK_PORT
              value: "19058"
          ports:
            - containerPort: 19058
      volumes:
        - name: config
          configMap:
            name: app
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-server
  namespace: wf-scenario-58
spec:
  selector:
    app: scenario-58
  ports:
    - port: 8080
      targetPort: 8080
