apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: workflow-server
  template:
    metadata:
      labels:
        app: workflow-server
    spec:
      containers:
        - name: workflow-server
          image: workflow-server:local
          imagePullPolicy: Never
          args: ["-config", "/config/app.yaml", "-data-dir", "/data"]
          env:
            - name: DATABASE_URL
              value: "postgres://workflow:workflow@postgres:5432/idp?sslmode=disable"
            - name: JWT_SECRET
              value: "scenario-01-jwt-secret-for-testing"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: app
