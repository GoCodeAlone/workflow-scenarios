        type: step.set
        config:
          values:
            queue: '{{ default "" (index .steps "parse" "body" "queue") }}'
            status: '{{ default "" (index .steps "parse" "body" "status") }}'
            envelope_ref: '{{ default "" (index .steps "parse" "body" "envelope_ref") }}'
            message_ref: '{{ default "" (index .steps "parse" "body" "message_ref") }}'
            sender_ref: '{{ default "" (index .steps "parse" "body" "sender_ref") }}'
            recipient_ref: '{{ default "" (index .steps "parse" "body" "recipient_ref") }}'
            older_than_unix: '{{ default 0 (index .steps "parse" "body" "older_than_unix") }}'
            limit: '{{ default 100 (index .steps "parse" "body" "limit") }}'
            execute_purge: '{{ default false (index .steps "parse" "body" "execute_purge") }}'
            purged_by_ref: 'operator://{{ index .steps "parse" "path_params" "operator" }}'
            reason_ref: '{{ index .steps "parse" "body" "reason_ref" }}'
            requested_at_unix: '{{ default 3700 (index .steps "parse" "body" "requested_at_unix") }}'
      - name: purge
        type: step.signal_envelope_purge
        config:
          store_ref: signal_envelopes
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            items:
              _from: steps.purge.items
            matched_count:
              _from: steps.purge.matched_count
            purged_count:
              _from: steps.purge.purged_count
            preview:
              _from: steps.purge.preview
            purge_ref:
              _from: steps.purge.purge_ref
    on_error: stop
