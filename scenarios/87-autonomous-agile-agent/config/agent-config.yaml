# ============================================================
# Scenario 87 — Autonomous Agile Agent
#
# Architecture: Full autonomy. The agent audits the application,
# plans improvements, and iterates like an agile team. Each
# iteration produces a deployable increment committed to git.
# ============================================================

modules:
  - name: ratchet-db
    type: storage.sqlite
    config:
      dbPath: /data/agent-state.db
      walMode: true

  - name: server
    type: http.server
    config:
      address: ":8081"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: ai
    type: agent.provider
    config:
      provider: ollama
      model: gemma4:e2b
      base_url: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      max_tokens: 8192

  - name: guardrails
    type: agent.guardrails
    config:
      defaults:
        enable_self_improvement: true
        enable_iac_modification: false
        require_human_approval: false
        require_diff_review: true
        max_iterations_per_cycle: 5
        deploy_strategy: hot_reload
        allowed_tools:
          - "mcp:wfctl:*"
          - "mcp:wfctl:detect_project_features"
          - "mcp:wfctl:api_extract"
          - "file_read"
          - "file_write"
          - "file_list"
          - "git_status"
          - "git_commit"
          - "web_fetch"
          - "shell_exec"
        command_policy:
          mode: allowlist
          allowed_commands:
            - "go build"
            - "go test"
            - "wfctl"
            - "curl"
          enable_static_analysis: true
          block_pipe_to_shell: true
          block_script_execution: true
      immutable_sections:
        - path: "modules.guardrails"
          override: challenge_token
      override:
        mechanism: challenge_token
        admin_secret_env: "${WFCTL_ADMIN_SECRET:-scenario-87-admin-secret}"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  autonomous_improvement_loop:
    trigger:
      type: http
      config:
        path: /improve
        method: POST
    steps:
      - name: set_context
        type: step.set
        config:
          values:
            config_path: "${CONFIG_PATH:-/data/config/app.yaml}"
            base_app_url: "${BASE_APP_URL:-http://localhost:8080}"
            provider: ai
            repo_path: "${REPO_PATH:-/data/repo}"

      - name: audit
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 10
          workspace: /data
          system_prompt: |
            You are an autonomous agile development agent with full control
            over an application's design and evolution. You work iteratively
            and produce production-ready increments each cycle.

            PHASE: AUDIT — Analyze the current application state.

            AVAILABLE TOOLS:
            - file_read: Read files. Args: {"path": "/path"}
            - file_list: List directory. Args: {"path": "/dir"}
            - mcp:wfctl:detect_project_features: Detect project features. Args: {"path": "/path"}
            - mcp:wfctl:api_extract: Extract API surface. Args: {"yaml_content": "..."}
            - mcp:wfctl:inspect_config: Inspect structure. Args: {"yaml_content": "..."}
            - web_fetch: HTTP fetch. Args: {"url": "http://..."}

            WORKFLOW ENGINE YAML RULES:
            1. http.server uses 'address: ":8080"' NOT 'port: 8080'
            2. Database steps use 'database: db' NOT 'module: db'
            3. Query parameters use 'params:' NOT 'args:'
            4. DB query mode is 'list' or 'single' NOT 'many' or 'one'
            5. Response step type is 'step.json_response' NOT 'step.response'
            6. Request parse uses 'parse_body: true' NOT 'format: json'
            7. Pipelines have inline trigger blocks (type: http with path/method)

            TASK:
            1. Read current config via file_read
            2. Use mcp:wfctl:detect_project_features to identify capabilities
            3. Use mcp:wfctl:api_extract to map existing API surface
            4. Report: what endpoints exist, what's missing, what to add next

      - name: post_audit
        type: step.blackboard_post
        config:
          phase: audit
          artifact_type: audit_report

      - name: plan
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 10
          workspace: /data
          system_prompt: |
            You are an autonomous agile development agent planning the next
            iterative improvement. Based on the audit, design new endpoints.

            AVAILABLE TOOLS:
            - file_read: Read files. Args: {"path": "/path"}
            - mcp:wfctl:validate_config: Validate YAML. Args: {"yaml_content": "..."}
            - mcp:wfctl:list_step_types: List step types. Args: {}
            - mcp:wfctl:get_step_schema: Step schema. Args: {"type": "step.name"}

            TASK:
            1. Read current config
            2. Design a search endpoint (GET /tasks/search) and stats endpoint (GET /tasks/stats)
            3. Generate complete improved config YAML
            4. Validate with mcp:wfctl:validate_config

      - name: post_plan
        type: step.blackboard_post
        config:
          phase: plan
          artifact_type: improvement_plan

      - name: validate
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: deploy
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH:-/data/config/app.yaml}"

      - name: post_deploy
        type: step.blackboard_post
        config:
          phase: deploy
          artifact_type: deployment_result

      - name: verify
        type: step.agent_execute
        config:
          provider_service: ai
          max_iterations: 10
          workspace: /data
          system_prompt: |
            Verify the deployed endpoints work correctly. Test each new
            endpoint and confirm production-ready responses.

            AVAILABLE TOOLS:
            - web_fetch: HTTP fetch. Args: {"url": "http://..."}
            - file_read: Read files. Args: {"path": "/path"}

            TASK:
            1. Verify /tasks/search works via web_fetch
            2. Verify /tasks/stats works via web_fetch
            3. Confirm all existing endpoints still function

      - name: post_verify
        type: step.blackboard_post
        config:
          phase: verify
          artifact_type: verification_result

      - name: commit_iteration
        type: step.git_commit
        config:
          message: "feat(autonomous): iterative improvement — search and stats endpoints"
          paths:
            - "${CONFIG_PATH:-/data/config/app.yaml}"

  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "87-autonomous-agile-agent"
            component: agent
