name: SaaS Web Application
id: "05-saas-webapp"
category: A
description: |
  Validates the workflow-cloud SaaS control plane REST API: user registration,
  login, JWT auth, org management, plugin browsing, and API key lifecycle.
  Tests against the existing workflow-cloud deployment in the default namespace.
components:
  - workflow-cloud
  - PostgreSQL
status: testable
notes: |
  This scenario does not deploy its own server — it tests against the
  workflow-cloud deployment already running in the default namespace.
  Uses port-forward to reach workflow-cloud.default.svc:8080.
