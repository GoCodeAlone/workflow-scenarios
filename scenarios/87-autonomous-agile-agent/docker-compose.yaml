services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30

  app:
    image: ghcr.io/gocodealone/workflow:latest
    ports:
      - "8080:8080"
    volumes:
      - app-data:/data
      - ./config:/data/config
    environment:
      - WORKFLOW_ADMIN_SECRET=${WORKFLOW_ADMIN_SECRET:-scenario-87-admin-secret}
    command: ["-config", "/data/config/base-app.yaml", "-data-dir", "/data"]
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  agent:
    image: ghcr.io/gocodealone/workflow:latest
    ports:
      - "8081:8081"
    volumes:
      - app-data:/data
      - ./config:/data/config
      - agent-repo:/data/repo
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma4
      - WORKFLOW_ADMIN_SECRET=${WORKFLOW_ADMIN_SECRET:-scenario-87-admin-secret}
      - IMPROVEMENT_GOAL=You are in full control of this application's design and evolution. Audit the current state, identify missing features, gaps, and improvements. Plan and execute iterative improvements as an agile team would — each iteration should be a deployable increment. Interact with the running application to verify functionality. Continue improving until you believe the application is production-ready or you have completed 5 iterations.
    command: ["-config", "/data/config/agent-config.yaml", "-data-dir", "/data/agent"]
    depends_on:
      ollama:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  ollama-data:
  app-data:
  agent-repo:
