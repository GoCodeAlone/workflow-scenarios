apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data
  namespace: wf-scenario-self-improving-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: wf-scenario-self-improving-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-repo
  namespace: wf-scenario-self-improving-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
