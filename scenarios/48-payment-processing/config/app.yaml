# ============================================================
# Scenario 48 — Payment Processing
#
# Payment lifecycle simulation using core engine steps.
# No external payments gRPC plugin needed — charges and
# subscriptions are stored in SQLite with state transitions.
#
# Charge statuses:      pending → captured → refunded
# Subscription statuses: active → canceled
#
# Endpoints:
#   POST /internal/init-db                  — initialize schema
#   POST /api/v1/charges                    — create a charge (pending)
#   GET  /api/v1/charges/{id}               — get charge
#   POST /api/v1/charges/{id}/capture       — capture a charge
#   POST /api/v1/charges/{id}/refund        — refund a captured charge
#   POST /api/v1/subscriptions              — create a subscription (active)
#   GET  /api/v1/subscriptions/{id}         — get subscription
#   POST /api/v1/subscriptions/{id}/cancel  — cancel a subscription
#   GET  /healthz                           — health check
# ============================================================

modules:
    - name: server
      type: http.server
      config:
        address: ":8080"
    - name: router
      type: http.router
      dependsOn: [server]
    - name: db
      type: storage.sqlite
      config:
        dbPath: "/data/payments.db"
        maxConnections: 5
        walMode: true
workflows:
    http:
        router: router
        server: server
        routes: []
pipelines:
    # ----------------------------------------------------------------
    # Health
    # ----------------------------------------------------------------
    health:
        trigger:
            type: http
            config:
                path: /healthz
                method: GET
        steps:
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    scenario: "48-payment-processing"
    # ----------------------------------------------------------------
    # Internal — initialize DB schema
    # ----------------------------------------------------------------
    init-db:
        trigger:
            type: http
            config:
                path: /internal/init-db
                method: POST
        steps:
            - name: create_charges_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS charges (
                      id           TEXT PRIMARY KEY,
                      amount       REAL NOT NULL,
                      currency     TEXT NOT NULL DEFAULT 'USD',
                      status       TEXT NOT NULL DEFAULT 'pending',
                      description  TEXT NOT NULL DEFAULT '',
                      customer_id  TEXT NOT NULL DEFAULT '',
                      created_at   TEXT NOT NULL DEFAULT (datetime('now')),
                      updated_at   TEXT NOT NULL DEFAULT (datetime('now'))
                    )
                ignore_error: true
            - name: create_subscriptions_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS subscriptions (
                      id           TEXT PRIMARY KEY,
                      customer_id  TEXT NOT NULL,
                      plan         TEXT NOT NULL,
                      amount       REAL NOT NULL,
                      currency     TEXT NOT NULL DEFAULT 'USD',
                      interval     TEXT NOT NULL DEFAULT 'monthly',
                      status       TEXT NOT NULL DEFAULT 'active',
                      created_at   TEXT NOT NULL DEFAULT (datetime('now')),
                      updated_at   TEXT NOT NULL DEFAULT (datetime('now'))
                    )
                ignore_error: true
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    initialized: true
                    tables: ["charges", "subscriptions"]
    # ----------------------------------------------------------------
    # Create Charge
    # POST /api/v1/charges
    # Body: { "amount": 99.99, "currency": "USD", "description": "...", "customer_id": "..." }
    # ----------------------------------------------------------------
    create-charge:
        trigger:
            type: http
            config:
                path: /api/v1/charges
                method: POST
        steps:
            - name: gen_id
              type: step.set
              config:
                values:
                    charge_id: "ch-{{ uuidv4 }}"
            - name: insert_charge
              type: step.db_exec
              config:
                database: db
                query: |
                    INSERT INTO charges (id, amount, currency, description, customer_id)
                    VALUES (?, ?, ?, ?, ?)
                params:
                    - "{{ index .steps \"gen_id\" \"charge_id\" }}"
                    - "{{ .body.amount }}"
                    - "{{ default \"USD\" .body.currency }}"
                    - "{{ default \"\" .body.description }}"
                    - "{{ default \"\" .body.customer_id }}"
            - name: fetch_charge
              type: step.db_query
              config:
                database: db
                query: "SELECT id, amount, currency, status, description, customer_id, created_at FROM charges WHERE id = ?"
                params:
                    - "{{ index .steps \"gen_id\" \"charge_id\" }}"
                mode: single
            - name: respond
              type: step.json_response
              config:
                status: 201
                body_from: "steps.fetch_charge.row"
    # ----------------------------------------------------------------
    # Get Charge
    # GET /api/v1/charges/{id}
    # ----------------------------------------------------------------
    get-charge:
        trigger:
            type: http
            config:
                path: /api/v1/charges/{id}
                method: GET
        steps:
            - name: fetch_charge
              type: step.db_query
              config:
                database: db
                query: "SELECT id, amount, currency, status, description, customer_id, created_at, updated_at FROM charges WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_found
              type: step.conditional
              config:
                field: steps.fetch_charge.found
                routes:
                    "false": not_found
                default: respond
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: "charge not found"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch_charge.row"
    # ----------------------------------------------------------------
    # Capture Charge
    # POST /api/v1/charges/{id}/capture
    # Transitions: pending → captured
    # ----------------------------------------------------------------
    capture-charge:
        trigger:
            type: http
            config:
                path: /api/v1/charges/{id}/capture
                method: POST
        steps:
            - name: fetch_charge
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM charges WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_found
              type: step.conditional
              config:
                field: steps.fetch_charge.found
                routes:
                    "false": not_found
                default: check_pending
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: "charge not found"
            - name: check_pending
              type: step.conditional
              config:
                field: steps.fetch_charge.row.status
                routes:
                    "captured": already_captured
                    "refunded": already_refunded
                default: do_capture
            - name: already_captured
              type: step.json_response
              config:
                status: 409
                body:
                    error: "charge already captured"
            - name: already_refunded
              type: step.json_response
              config:
                status: 409
                body:
                    error: "charge already refunded"
            - name: do_capture
              type: step.db_exec
              config:
                database: db
                query: "UPDATE charges SET status = 'captured', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: fetch_updated
              type: step.db_query
              config:
                database: db
                query: "SELECT id, amount, currency, status, customer_id, updated_at FROM charges WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch_updated.row"
    # ----------------------------------------------------------------
    # Refund Charge
    # POST /api/v1/charges/{id}/refund
    # Transitions: captured → refunded
    # ----------------------------------------------------------------
    refund-charge:
        trigger:
            type: http
            config:
                path: /api/v1/charges/{id}/refund
                method: POST
        steps:
            - name: fetch_charge
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM charges WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_found
              type: step.conditional
              config:
                field: steps.fetch_charge.found
                routes:
                    "false": not_found
                default: check_captured
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: "charge not found"
            - name: check_captured
              type: step.conditional
              config:
                field: steps.fetch_charge.row.status
                routes:
                    "pending": not_captured
                    "refunded": already_refunded
                default: do_refund
            - name: not_captured
              type: step.json_response
              config:
                status: 409
                body:
                    error: "charge must be captured before refunding"
            - name: already_refunded
              type: step.json_response
              config:
                status: 409
                body:
                    error: "charge already refunded"
            - name: do_refund
              type: step.db_exec
              config:
                database: db
                query: "UPDATE charges SET status = 'refunded', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: fetch_updated
              type: step.db_query
              config:
                database: db
                query: "SELECT id, amount, currency, status, customer_id, updated_at FROM charges WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch_updated.row"
    # ----------------------------------------------------------------
    # Create Subscription
    # POST /api/v1/subscriptions
    # Body: { "customer_id": "...", "plan": "pro", "amount": 29.99, "interval": "monthly" }
    # ----------------------------------------------------------------
    create-subscription:
        trigger:
            type: http
            config:
                path: /api/v1/subscriptions
                method: POST
        steps:
            - name: gen_id
              type: step.set
              config:
                values:
                    sub_id: "sub-{{ uuidv4 }}"
            - name: insert_subscription
              type: step.db_exec
              config:
                database: db
                query: |
                    INSERT INTO subscriptions (id, customer_id, plan, amount, currency, interval)
                    VALUES (?, ?, ?, ?, ?, ?)
                params:
                    - "{{ index .steps \"gen_id\" \"sub_id\" }}"
                    - "{{ .body.customer_id }}"
                    - "{{ .body.plan }}"
                    - "{{ .body.amount }}"
                    - "{{ default \"USD\" .body.currency }}"
                    - "{{ default \"monthly\" .body.interval }}"
            - name: fetch_sub
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_id, plan, amount, currency, interval, status, created_at FROM subscriptions WHERE id = ?"
                params:
                    - "{{ index .steps \"gen_id\" \"sub_id\" }}"
                mode: single
            - name: respond
              type: step.json_response
              config:
                status: 201
                body_from: "steps.fetch_sub.row"
    # ----------------------------------------------------------------
    # Get Subscription
    # GET /api/v1/subscriptions/{id}
    # ----------------------------------------------------------------
    get-subscription:
        trigger:
            type: http
            config:
                path: /api/v1/subscriptions/{id}
                method: GET
        steps:
            - name: fetch_sub
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_id, plan, amount, currency, interval, status, created_at, updated_at FROM subscriptions WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_found
              type: step.conditional
              config:
                field: steps.fetch_sub.found
                routes:
                    "false": not_found
                default: respond
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: "subscription not found"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch_sub.row"
    # ----------------------------------------------------------------
    # Cancel Subscription
    # POST /api/v1/subscriptions/{id}/cancel
    # Transitions: active → canceled
    # ----------------------------------------------------------------
    cancel-subscription:
        trigger:
            type: http
            config:
                path: /api/v1/subscriptions/{id}/cancel
                method: POST
        steps:
            - name: fetch_sub
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM subscriptions WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_found
              type: step.conditional
              config:
                field: steps.fetch_sub.found
                routes:
                    "false": not_found
                default: check_active
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: "subscription not found"
            - name: check_active
              type: step.conditional
              config:
                field: steps.fetch_sub.row.status
                routes:
                    "canceled": already_canceled
                default: do_cancel
            - name: already_canceled
              type: step.json_response
              config:
                status: 409
                body:
                    error: "subscription already canceled"
            - name: do_cancel
              type: step.db_exec
              config:
                database: db
                query: "UPDATE subscriptions SET status = 'canceled', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: fetch_updated
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_id, plan, amount, currency, status, updated_at FROM subscriptions WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch_updated.row"
