modules:
  - name: server
    type: http.server
    config:
      address: ":18126"
  - name: router
    type: http.router
    dependsOn: [server]

workflows:
  http:
    router: router
    server: server

pipelines:
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "26-config-to-binary"

  build-binary-dry-run:
    trigger:
      type: http
      config:
        path: /api/build/binary
        method: POST
        include_raw_body: true
    steps:
      - name: build
        type: step.build_binary
        config:
          config_from: request_body
          module_path: generated-scenario-app
          go_version: "1.26"
          os: linux
          arch: amd64
          embed_config: true
          dry_run: true
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: steps.build
