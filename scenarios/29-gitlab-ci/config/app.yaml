modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: gitlab-client
    type: gitlab.client
    config:
      url: "mock://"
      token: "mock-token"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          body:
            status: ok

  # Receive a GitLab webhook, parse and normalize the event
  gitlab-webhook:
    trigger:
      type: http
      config:
        path: /webhooks/gitlab
        method: POST
    steps:
      - name: parse
        type: step.gitlab_parse_webhook
        config:
          secret: ""

      - name: respond
        type: step.json_response
        config:
          body_from: steps.parse

  # Trigger a GitLab pipeline (mock)
  trigger-pipeline:
    trigger:
      type: http
      config:
        path: /api/v1/gitlab/trigger
        method: POST
    steps:
      - name: trigger
        type: step.gitlab_trigger_pipeline
        config:
          client: gitlab-client
          project: "group/project"
          ref: main
          variables:
            DEPLOY_ENV: production

      - name: respond
        type: step.json_response
        config:
          body_from: steps.trigger

  # Get pipeline status (mock)
  pipeline-status:
    trigger:
      type: http
      config:
        path: /api/v1/gitlab/pipeline/{id}
        method: GET
    steps:
      - name: status
        type: step.gitlab_pipeline_status
        config:
          client: gitlab-client
          project: "group/project"
          pipeline_id: "42"

      - name: respond
        type: step.json_response
        config:
          body_from: steps.status

  # Create a merge request (mock)
  create-mr:
    trigger:
      type: http
      config:
        path: /api/v1/gitlab/mr
        method: POST
    steps:
      - name: create
        type: step.gitlab_create_mr
        config:
          client: gitlab-client
          project: "group/project"
          source_branch: feature-demo
          target_branch: main
          title: "Demo MR from scenario 29"

      - name: respond
        type: step.json_response
        config:
          body_from: steps.create

  # Post a comment on a merge request (mock)
  mr-comment:
    trigger:
      type: http
      config:
        path: /api/v1/gitlab/mr/comment
        method: POST
    steps:
      - name: comment
        type: step.gitlab_mr_comment
        config:
          client: gitlab-client
          project: "group/project"
          mr_iid: 1
          body: "Pipeline passed! Scenario 29 verified."

      - name: respond
        type: step.json_response
        config:
          body_from: steps.comment
