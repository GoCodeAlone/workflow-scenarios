# ============================================================
# Scenario 87 — Autonomous Agile Agent
#
# Architecture: Full autonomy. The agent audits the application,
# plans improvements, and iterates like an agile team. Each
# iteration produces a deployable increment committed to git.
# ============================================================

modules:
  - name: ratchet-db
    type: storage.sqlite
    config:
      dbPath: /data/agent-state.db
      walMode: true

  - name: server
    type: http.server
    config:
      address: ":8081"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: ratchet-ai
    type: agent.provider
    config:
      provider: ollama
      model: gemma4:e2b
      base_url: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      max_tokens: 8192

  - name: guardrails
    type: agent.guardrails
    config:
      defaults:
        enable_self_improvement: true
        enable_iac_modification: false
        require_human_approval: false
        require_diff_review: true
        max_iterations_per_cycle: 10
        deploy_strategy: hot_reload
        allowed_tools:
          - "mcp_wfctl_*"
          - "file_read"
          - "file_write"
          - "file_list"
          - "git_status"
          - "git_commit"
          - "web_fetch"
          - "shell_exec"
        command_policy:
          mode: allowlist
          allowed_commands:
            - "go build"
            - "go test"
            - "wfctl"
            - "curl"
          enable_static_analysis: true
          block_pipe_to_shell: true
          block_script_execution: true
      immutable_sections:
        - path: "modules.guardrails"
          override: challenge_token
      override:
        mechanism: challenge_token
        admin_secret_env: "${WFCTL_ADMIN_SECRET:-scenario-87-admin-secret}"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  autonomous_improve:
    trigger:
      type: http
      config:
        path: /improve
        method: POST
    steps:
      - name: set_context
        type: step.set
        config:
          values:
            config_path: "${CONFIG_PATH:-/data/config/app.yaml}"
            base_app_url: "${BASE_APP_URL:-http://localhost:8080}"
            provider: ratchet-ai
            repo_path: "${REPO_PATH:-/data/repo}"

      - name: autonomous_agent
        type: step.agent_execute
        config:
          provider_service: ratchet-ai
          max_iterations: 30
          system_prompt: |
            You are an autonomous agile development agent with full control
            over an application's design and evolution. You will perform
            multiple improvement iterations, each producing a deployable
            increment.

            AVAILABLE TOOLS:
            - file_read: Read files. Args: {"path": "/path"}
            - file_write: Write files. Args: {"path": "/path", "content": "..."}
            - file_list: List directory. Args: {"path": "/dir"}
            - mcp_wfctl_validate_config: Validate YAML. Args: {"yaml_content": "..."}
            - mcp_wfctl_inspect_config: Inspect structure. Args: {"yaml_content": "..."}
            - mcp_wfctl_list_step_types: List step types. Args: {}
            - mcp_wfctl_get_step_schema: Step schema. Args: {"type": "step.name"}
            - mcp_wfctl_list_module_types: List module types. Args: {}
            - git_status: Git status. Args: {}
            - git_commit: Commit. Args: {"message": "...", "paths": ["file"]}
            - web_fetch: HTTP fetch. Args: {"url": "http://..."}
            - shell_exec: Run command. Args: {"command": "..."}

            WORKFLOW ENGINE YAML RULES:
            1. http.server uses 'address: ":8080"' NOT 'port: 8080'
            2. Database steps use 'database: db' NOT 'module: db'
            3. Query parameters use 'params:' NOT 'args:'
            4. DB query mode is 'list' or 'single' NOT 'many' or 'one'
            5. Response step type is 'step.json_response' NOT 'step.response'
            6. Request parse uses 'parse_body: true' NOT 'format: json'
            7. Pipelines have inline trigger blocks (type: http with path/method)

            AGILE PROCESS — perform 3 iterations:

            ITERATION 1:
            1. Read current config via file_read
            2. Inspect with mcp_wfctl_inspect_config
            3. Audit: what endpoints exist? What's missing?
            4. Add a search endpoint (GET /tasks/search with LIKE query)
            5. Validate → Write → Commit as "feat(iter-1): add search endpoint"

            ITERATION 2:
            1. Re-read config (includes iter-1 changes)
            2. Add a stats/analytics endpoint (GET /tasks/stats)
            3. Validate → Write → Commit as "feat(iter-2): add stats endpoint"

            ITERATION 3:
            1. Re-read config
            2. Verify both new endpoints work via web_fetch
            3. Add a batch update endpoint (PUT /tasks/batch with status update)
            4. Validate → Write → Commit as "feat(iter-3): add batch update"

            After each iteration, verify the previous endpoints still work
            by calling them with web_fetch.

            IMPORTANT: Always validate before writing. Always commit after
            writing. Each commit message MUST start with "feat(iter-N):".

      - name: map_output
        type: step.set
        config:
          values:
            proposed_yaml: "{{ .steps.autonomous_agent.result }}"

      - name: post_result
        type: step.blackboard_post
        config:
          phase: complete
          artifact_type: autonomous_result

      - name: final_validate
        type: step.self_improve_validate
        config:
          validation_level: strict

      - name: final_deploy
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: "${CONFIG_PATH:-/data/config/app.yaml}"

  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "87-autonomous-agile-agent"
            component: agent
