# ============================================================
# Scenario 92 — Infra Admin MIGRATION Demo docker-compose
#
# Brings up the scenario-92 workflow server with external gRPC plugins
# (stub-iac-provider + workflow-plugin-admin + workflow-plugin-infra) baked into the image.
#
# The stub-iac-provider is loaded as an EXTERNAL plugin. The WiringHook
# registers it as an IaCProvider service under name "stub-iac-provider".
# The step.iac_provider_* steps resolve it via `provider: stub-iac-provider`.
#
# Port 18092: no collision with other scenarios (convention: 180<scenario-id>).
# ============================================================

services:
  app:
    image: workflow-admin:scenario-92
    container_name: workflow-scenario-92-app
    ports:
      - "127.0.0.1:18092:8080"
    volumes:
      - ./config:/etc/scenario-92:ro
    command:
      - "-config"
      - "/etc/scenario-92/app.yaml"
      - "-data-dir"
      - "/home/nonroot"
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - "wget -q -O- http://127.0.0.1:8080/healthz || exit 1"
      interval: 3s
      timeout: 2s
      retries: 30
