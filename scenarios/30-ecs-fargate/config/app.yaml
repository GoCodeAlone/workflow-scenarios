modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: aws-provider
    type: iac.provider
    config:
      provider: aws
      credentials: env
      region: us-east-1

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  - name: staging-ecs
    type: infra.container_service
    config:
      provider: aws-provider
      name: staging-ecs
      image: public.ecr.aws/nginx/nginx:latest
      cluster: staging-cluster
      region: us-east-1
      launchType: fargate
      replicas: 2
      vpc_subnets:
        - subnet-abc123
        - subnet-def456
      security_groups:
        - sg-0123456789

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "30-ecs-fargate"

  ecs-plan:
    trigger:
      type: http
      config:
        path: /api/v1/services/plan
        method: POST
    steps:
      - name: plan
        type: step.iac_plan
        config:
          platform: staging-ecs
          resource_id: staging-ecs
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  ecs-apply:
    trigger:
      type: http
      config:
        path: /api/v1/services/apply
        method: POST
    steps:
      - name: apply
        type: step.iac_apply
        config:
          platform: staging-ecs
          resource_id: staging-ecs
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  ecs-status:
    trigger:
      type: http
      config:
        path: /api/v1/services/status
        method: GET
    steps:
      - name: status
        type: step.iac_status
        config:
          platform: staging-ecs
          resource_id: staging-ecs
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  ecs-destroy:
    trigger:
      type: http
      config:
        path: /api/v1/services
        method: DELETE
    steps:
      - name: destroy
        type: step.iac_destroy
        config:
          platform: staging-ecs
          resource_id: staging-ecs
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."
