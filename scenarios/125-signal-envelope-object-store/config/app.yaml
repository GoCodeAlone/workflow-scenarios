modules:
  - name: server
    type: http.server
    config:
      address: ":18125"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: participant_a_identity
    type: signal.identity_store
    config:
      identity_ref: user-a
      local_id: user-a@example.test
      device_id: 1
      registration_id: 8125

  - name: participant_b_identity
    type: signal.identity_store
    config:
      identity_ref: user-b
      local_id: user-b@example.test
      device_id: 1
      registration_id: 8126

  - name: participant_c_identity
    type: signal.identity_store
    config:
      identity_ref: user-c
      local_id: user-c@example.test
      device_id: 1
      registration_id: 8127

  - name: signal_envelopes
    type: signal.envelope_store
    config:
      store_ref: signal_envelopes
      backend: object_store
      storage_path: __OBJECT_STORE_PATH__
      allow_object_store_backend: true
      retention_limit: 64

workflows:
  http:
    server: server
    router: router

pipelines:
  healthz:
    trigger: { type: http, config: { path: /healthz, method: GET } }
    steps:
      - name: ok
        type: step.json_response
        config:
          status: 200
          body: { status: ok, scenario: "125-signal-envelope-object-store" }

  prepare-session:
    trigger:
      type: http
      config:
        path: /participants/{participant}/session
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [participant]
      - name: prepare
        type: step.signal_session_prepare
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "participant" }}'
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            participant: '{{ index .steps "parse" "path_params" "participant" }}'
            bundle:
              _from: steps.prepare.bundle
    on_error: stop

  send-envelope:
    trigger:
      type: http
      config:
        path: /spaces/{space}/participants/{sender}/outbox/{recipient}
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [space, sender, recipient]
          parse_body: true
          merge_body: true
      - name: request_input
        type: step.jq
        config:
          input_from: steps.parse.body
          expression: "."
      - name: encrypt
        type: step.signal_encrypt
        config:
          identity_ref: '{{ index .steps "parse" "path_params" "sender" }}'
      - name: enqueue_input
        type: step.set
        config:
          values:
            envelope:
              sender_id: '{{ index .steps "encrypt" "envelope" "sender_id" }}'
              sender_device_id: '{{ index .steps "encrypt" "envelope" "sender_device_id" }}'
              recipient_id: '{{ index .steps "encrypt" "envelope" "recipient_id" }}'
              recipient_device_id: '{{ index .steps "encrypt" "envelope" "recipient_device_id" }}'
              message_type: '{{ index .steps "encrypt" "envelope" "message_type" }}'
              ciphertext: '{{ index .steps "encrypt" "envelope" "ciphertext" }}'
            sender_ref: 'participant://{{ index .steps "parse" "path_params" "sender" }}'
            recipient_ref: 'participant://{{ index .steps "parse" "path_params" "recipient" }}'
            custody_ref: 'custody://{{ index .steps "parse" "path_params" "sender" }}/device-1'
            authz_ref: 'authz://signal/{{ index .steps "parse" "path_params" "sender" }}/send/{{ index .steps "parse" "path_params" "recipient" }}'
            message_ref: '{{ index .steps "parse" "body" "message_ref" }}'
            idempotency_key: '{{ index .steps "parse" "path_params" "space" }}-{{ index .steps "parse" "path_params" "sender" }}-{{ index .steps "parse" "path_params" "recipient" }}-{{ index .steps "parse" "body" "message_ref" }}'
      - name: enqueue
        type: step.signal_outbox_enqueue
        config:
          store_ref: signal_envelopes
      - name: respond
        type: step.json_response
        config:
          status: 202
          body:
            space: '{{ index .steps "parse" "path_params" "space" }}'
            sender: '{{ index .steps "parse" "path_params" "sender" }}'
            recipient: '{{ index .steps "parse" "path_params" "recipient" }}'
            envelope_ref:
              _from: steps.enqueue.envelope_ref
            status:
              _from: steps.enqueue.status
            metadata:
              _from: steps.enqueue.metadata
    on_error: stop

  claim-envelope:
    trigger:
      type: http
      config:
        path: /workers/{worker}/outbox/claim
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [worker]
          parse_body: true
          merge_body: true
      - name: claim_input
        type: step.set
        config:
          values:
            envelope_ref: '{{ index .steps "parse" "body" "envelope_ref" }}'
            claimant_ref: 'worker://{{ index .steps "parse" "path_params" "worker" }}'
            lease_id: '{{ index .steps "parse" "body" "lease_id" }}'
      - name: claim
        type: step.signal_outbox_claim
        config:
          store_ref: signal_envelopes
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            worker: '{{ index .steps "parse" "path_params" "worker" }}'
            envelope_ref:
              _from: steps.claim.envelope_ref
            status:
              _from: steps.claim.status
            lease_ref:
              _from: steps.claim.lease_ref
            envelope:
              _from: steps.claim.envelope
            metadata:
              _from: steps.claim.metadata
    on_error: stop

  release-envelope:
    trigger:
      type: http
      config:
        path: /workers/{worker}/outbox/release
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [worker]
          parse_body: true
          merge_body: true
      - name: release_input
        type: step.set
        config:
          values:
            envelope_ref: '{{ index .steps "parse" "body" "envelope_ref" }}'
            lease_ref: '{{ index .steps "parse" "body" "lease_ref" }}'
            released_by_ref: 'worker://{{ index .steps "parse" "path_params" "worker" }}'
            last_error_ref: '{{ index .steps "parse" "body" "last_error_ref" }}'
      - name: release
        type: step.signal_outbox_release
        config:
          store_ref: signal_envelopes
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            worker: '{{ index .steps "parse" "path_params" "worker" }}'
            envelope_ref:
              _from: steps.release.envelope_ref
            status:
              _from: steps.release.status
            metadata:
              _from: steps.release.metadata
    on_error: stop

  deliver-envelope:
    trigger:
      type: http
      config:
        path: /workers/{worker}/inbox/deliver/{recipient}
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [worker, recipient]
          parse_body: true
          merge_body: true
      - name: receive_input
        type: step.set
        config:
          values:
            envelope_ref: '{{ index .steps "parse" "body" "envelope_ref" }}'
            envelope:
              sender_id: '{{ index .steps "parse" "body" "envelope" "sender_id" }}'
              sender_device_id: '{{ index .steps "parse" "body" "envelope" "sender_device_id" }}'
              recipient_id: '{{ index .steps "parse" "body" "envelope" "recipient_id" }}'
              recipient_device_id: '{{ index .steps "parse" "body" "envelope" "recipient_device_id" }}'
              message_type: '{{ index .steps "parse" "body" "envelope" "message_type" }}'
              ciphertext: '{{ index .steps "parse" "body" "envelope" "ciphertext" }}'
            recipient_ref: 'participant://{{ index .steps "parse" "path_params" "recipient" }}'
            idempotency_key: '{{ index .steps "parse" "path_params" "worker" }}-deliver-{{ index .steps "parse" "body" "envelope_ref" }}'
      - name: receive
        type: step.signal_inbox_receive
        config:
          store_ref: signal_envelopes
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            worker: '{{ index .steps "parse" "path_params" "worker" }}'
            recipient: '{{ index .steps "parse" "path_params" "recipient" }}'
            envelope_ref:
              _from: steps.receive.envelope_ref
            status:
              _from: steps.receive.status
            metadata:
              _from: steps.receive.metadata
    on_error: stop

  ack-envelope:
    trigger:
      type: http
      config:
        path: /workers/{worker}/outbox/ack
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [worker]
          parse_body: true
          merge_body: true
      - name: ack_input
        type: step.set
        config:
          values:
            envelope_ref: '{{ index .steps "parse" "body" "envelope_ref" }}'
            lease_ref: '{{ index .steps "parse" "body" "lease_ref" }}'
            acked_by_ref: 'worker://{{ index .steps "parse" "path_params" "worker" }}'
      - name: ack
        type: step.signal_outbox_ack
        config:
          store_ref: signal_envelopes
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            worker: '{{ index .steps "parse" "path_params" "worker" }}'
            envelope_ref:
              _from: steps.ack.envelope_ref
            status:
              _from: steps.ack.status
            metadata:
              _from: steps.ack.metadata
    on_error: stop

  decrypt-inbox:
    trigger:
      type: http
      config:
        path: /participants/{recipient}/inbox/decrypt
        method: POST
    steps:
      - name: parse
        type: step.request_parse
        config:
          path_params: [recipient]
          parse_body: true
          merge_body: true
      - name: decrypt_input
        type: step.set
        config:
          values:
            envelope_ref: '{{ index .steps "parse" "body" "envelope_ref" }}'
            principal: '{{ index .steps "parse" "path_params" "recipient" }}'
            custody_ref: 'custody://{{ index .steps "parse" "path_params" "recipient" }}/device-1'
            authz_ref: 'authz://signal/{{ index .steps "parse" "path_params" "recipient" }}/decrypt/{{ index .steps "parse" "body" "envelope_ref" }}'
      - name: decrypt
        type: step.signal_inbox_decrypt
        config:
          store_ref: signal_envelopes
          identity_ref: '{{ index .steps "parse" "path_params" "recipient" }}'
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            recipient: '{{ index .steps "parse" "path_params" "recipient" }}'
            plaintext:
              _from: steps.decrypt.plaintext
            metadata:
              _from: steps.decrypt.metadata
    on_error: stop
