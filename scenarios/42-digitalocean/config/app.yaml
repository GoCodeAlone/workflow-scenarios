modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  # DigitalOcean provider — mock credentials, no real DO API calls.
  - name: do-provider
    type: iac.provider
    config:
      provider: digitalocean
      credentials: env
      region: nyc3

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  # DOKS: DigitalOcean Kubernetes Service cluster lifecycle.
  - name: doks-cluster
    type: infra.k8s_cluster
    config:
      provider: do-provider
      cluster_name: staging-k8s
      region: nyc3
      version: "1.29.1-do.0"
      node_pool:
        name: default
        size: s-2vcpu-2gb
        count: 3
        auto_scale: true
        min_nodes: 1
        max_nodes: 5

  # DO Networking: VPC and firewall management.
  - name: do-vpc
    type: infra.vpc
    config:
      provider: do-provider
      name: staging-vpc
      region: nyc3
      cidr: "10.20.0.0/16"

  - name: do-firewall
    type: infra.firewall
    config:
      provider: do-provider
      vpc: do-vpc
      firewalls:
        - name: allow-web
          inbound_rules:
            - protocol: tcp
              port_range: "80"
              sources: "0.0.0.0/0"
            - protocol: tcp
              port_range: "443"
              sources: "0.0.0.0/0"

  # DO DNS: domain and DNS record management.
  - name: do-dns
    type: infra.dns
    config:
      provider: do-provider
      domain: staging.example.com
      records:
        - name: api
          type: A
          data: "10.0.0.100"
          ttl: 300
        - name: www
          type: CNAME
          data: staging.example.com
          ttl: 3600

  # DO App Platform: deploy and manage containerized apps.
  - name: do-app
    type: infra.container_service
    config:
      provider: do-provider
      name: my-api
      region: nyc
      image: "registry.example.com/my-api:v1.0.0"
      replicas: 2
      http_port: 8080
      envs:
        APP_ENV: production
        PORT: "8080"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "42-digitalocean"

  # Deploy the DO App Platform app.
  do-deploy:
    trigger:
      type: http
      config:
        path: /api/v1/do/deploy
        method: POST
    steps:
      - name: deploy
        type: step.iac_apply
        config:
          platform: do-app
          resource_id: do-app
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  # Check app deployment status.
  do-status:
    trigger:
      type: http
      config:
        path: /api/v1/do/status
        method: GET
    steps:
      - name: status
        type: step.iac_status
        config:
          platform: do-app
          resource_id: do-app
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  # Retrieve app logs.
  do-logs:
    trigger:
      type: http
      config:
        path: /api/v1/do/logs
        method: GET
    steps:
      - name: logs
        type: step.iac_status
        config:
          platform: do-app
          resource_id: do-app
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  # Scale app instance count.
  do-scale:
    trigger:
      type: http
      config:
        path: /api/v1/do/scale
        method: POST
    steps:
      - name: scale
        type: step.iac_apply
        config:
          platform: do-app
          resource_id: do-app
          state_store: iac-state
          desired_replicas: 4
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  # Destroy the app deployment.
  do-destroy:
    trigger:
      type: http
      config:
        path: /api/v1/do
        method: DELETE
    steps:
      - name: destroy
        type: step.iac_destroy
        config:
          platform: do-app
          resource_id: do-app
          state_store: iac-state
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."
