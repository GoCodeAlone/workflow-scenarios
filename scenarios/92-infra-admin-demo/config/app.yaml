# ============================================================
# Scenario 92 — Infra Admin MIGRATION Demo (v2)
#
# Demonstrates the migration away from the deleted engine module
# to the new step-based IaC pipeline architecture (workflow v0.70.0).
#
# Architecture:
#   - auth.jwt: JWT authentication (Bearer scheme)
#   - http.server + http.router: HTTP layer
#   - health.checker: /healthz
#   - admin.dashboard (external workflow-plugin-admin): admin shell
#   - iac.state (memory): state store
#   - HTTP pipelines using the NEW step.iac_provider_* steps from the
#     platform plugin — these steps resolve the stub-iac-provider by its
#     plugin name (the WiringHook registers it as service "stub-iac-provider")
#
# Auth/RBAC:
#   - step.auth_validate (Bearer JWT) on every mutation pipeline
#   - step.conditional routing on JWT sub claim for RBAC:
#     operator → allowed for plan/apply/destroy/drift
#     viewer   → allowed for read-only catalog/list/drift-read
#     unauthenticated → 401 via auth_validate
#
# NOTE: "stub-iac-provider" is the provider service name because the
#       WiringHook registers the external plugin under its plugin.json "name".
# ============================================================

modules:
  - name: auth
    type: auth.jwt
    config:
      issuer: "scenario-92"
      secret: "scenario-92-jwt-secret-do-not-use-in-prod"

  - name: http
    type: http.server
    config:
      address: ":8080"

  - name: health
    type: health.checker
    config:
      healthPath: /healthz
      autoDiscover: true

  - name: http-router
    type: http.router
    dependsOn: [http]

  - name: admin
    type: admin.dashboard
    config:
      route_prefix: /admin
      app_name: "Scenario 92 — Infra Admin Migration Demo"
      auth_module: auth

  - name: iac-state
    type: iac.state
    config:
      backend: memory

  # infra.admin module provided by workflow-plugin-infra (external gRPC plugin).
  # It supplies InvokeMethod("AdminContribution") which returns the nav contribution
  # for the Infrastructure Management SPA.  The plugin's ConfigFragment() injects a
  # companion static.fileserver that serves the SPA assets at /admin/infra.
  - name: infra-admin
    type: infra.admin
    config:
      api_base_path: "/api/infra"
      prefix: "/admin/infra"

workflows:
  http:
    server: http
    router: http-router

pipelines:
  # ── admin contributions ────────────────────────────────────────────────────
  #
  # This pipeline registers the infra contribution on every call (idempotent
  # via contributionRegistry.register which deduplicates by id), then lists all
  # registered contributions.  The infra.admin module (provided by the external
  # workflow-plugin-infra plugin) defines the canonical contribution descriptor.

  list-admin-contributions:
    trigger:
      type: http
      config:
        path: /api/admin/contributions
        method: GET
    steps:
      # Inject the infra contribution descriptor into pc.Current so that the
      # STRICT_PROTO step.admin_register_contribution reads it via TypedInput
      # (RegisterContributionInput.contribution ← pc.Current["contribution"]).
      # Using step.set avoids putting unknown keys in the AdminStepConfig config.
      - name: set-infra-contribution
        type: step.set
        config:
          values:
            contribution:
              id: infra-resources
              title: Infrastructure
              category: operations
              path: /admin/infra
              render_mode: iframe
              app_context: app
      - name: register-infra
        type: step.admin_register_contribution
        config:
          module: admin
      - name: list
        type: step.admin_list_contributions
        config:
          module: admin
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            contributions: { _from: "steps.list.contributions" }

  # ── catalog (read-only, no auth required for demo) ─────────────────────────

  infra-catalog:
    trigger:
      type: http
      config:
        path: /api/infra/catalog
        method: GET
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: catalog
        type: step.iac_provider_catalog
        config:
          provider: stub-iac-provider
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: { _from: "steps.catalog.provider" }
            regions: { _from: "steps.catalog.regions" }
            types: { _from: "steps.catalog.types" }
            source: { _from: "steps.catalog.source" }

  # ── list resources (read-only, no auth required for demo SPA) ─────────────
  #
  # Auth is intentionally omitted: the infra admin SPA calls this endpoint
  # without an Authorization header (it runs inside the admin panel which handles
  # auth separately).  Omitting auth here allows the SPA's Promise.all([listResources,
  # getCatalog]) to succeed so that the Type and Region dropdowns are populated.

  infra-list:
    trigger:
      type: http
      config:
        path: /api/infra/resources
        method: GET
    steps:
      - name: list
        type: step.iac_provider_list
        config:
          provider: stub-iac-provider
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: { _from: "steps.list.provider" }
            resources: { _from: "steps.list.resources" }
            count: { _from: "steps.list.count" }

  # ── plan (operator only) ───────────────────────────────────────────────────
  #
  # Stub provider Status() returns empty → current=[] → desired=[] (no specs
  # in config means empty desired) → desired_hash = sha256(json.Marshal([])) =
  # 4f53cda18c2baa0c0354bb5f9a3ecbe5ed12ab4d8e11ba873c2f11161202b945
  #
  # Use POST so auth_validate can read Authorization header from the request.

  infra-plan:
    trigger:
      type: http
      config:
        path: /api/infra/plan
        method: POST
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: plan-exec
          default: deny-plan
      - name: plan-exec
        type: step.iac_provider_plan
        config:
          provider: stub-iac-provider
          specs:
            - name: demo-db
              type: stub.database
              config:
                engine: postgres
                version: "15"
      - name: respond-plan
        type: step.json_response
        config:
          status: 200
          body:
            plan: { _from: "steps.plan-exec.plan" }
            desired_hash: { _from: "steps.plan-exec.desired_hash" }
            provider: { _from: "steps.plan-exec.provider" }
      - name: deny-plan
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required for plan"

  # ── apply (operator only, two-phase hash guard) ────────────────────────────
  #
  # The apply step reads desired_hash from config (static). Since the stub
  # provider always returns Status()=[], the recomputed hash always equals
  # the precomputed hash of the same specs (sha256 of sorted resolved specs).
  # This demonstrates the two-phase TOCTOU guard passing end-to-end.

  infra-apply:
    trigger:
      type: http
      config:
        path: /api/infra/apply
        method: POST
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: apply-exec
          default: deny-apply
      - name: apply-exec
        type: step.iac_provider_apply
        config:
          provider: stub-iac-provider
          # desired_hash = sha256(json.Marshal(sorted resolved specs)) with
          # Status()=[] → current=[] → specs unchanged (no $VAR refs).
          # JSON: [{"name":"demo-db","type":"stub.database","config":{"engine":"postgres","version":"15"}}]
          # sha256 = 54a7b4f71c8e4d43536f9f1cf4009115b915ea8351f821b1f95f89bc7e03985c
          # Verified with standalone Go program against v0.70.0 algorithm.
          desired_hash: "54a7b4f71c8e4d43536f9f1cf4009115b915ea8351f821b1f95f89bc7e03985c"
          specs:
            - name: demo-db
              type: stub.database
              config:
                engine: postgres
                version: "15"
      - name: respond-apply
        type: step.json_response
        config:
          status: 200
          body:
            apply_result: { _from: "steps.apply-exec.apply_result" }
            desired_hash: { _from: "steps.apply-exec.desired_hash" }
            provider: { _from: "steps.apply-exec.provider" }
            action_count: { _from: "steps.apply-exec.action_count" }
      - name: deny-apply
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required for apply"

  # ── drift check (read-only) ────────────────────────────────────────────────

  infra-drift:
    trigger:
      type: http
      config:
        path: /api/infra/drift
        method: GET
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: drift
        type: step.iac_provider_drift
        config:
          provider: stub-iac-provider
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: { _from: "steps.drift.provider" }
            supported: { _from: "steps.drift.supported" }
            any_drifted: { _from: "steps.drift.any_drifted" }
            drifts: { _from: "steps.drift.drifts" }
            count: { _from: "steps.drift.count" }

  # ── commit (gitops demo) ───────────────────────────────────────────────────
  #
  # Simulates committing the current desired state to a gitops repo.
  # Returns a static fixture response — the real git operations happen in
  # the bare-repo fixture initialized by seed.sh (verified shell-side in run.sh).

  infra-commit:
    trigger:
      type: http
      config:
        path: /api/infra/commit
        method: POST
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: respond-commit
          default: deny-commit
      - name: respond-commit
        type: step.json_response
        config:
          status: 200
          body:
            committed: true
            branch: "gitops/infra-demo"
            message: "feat(infra): apply stub-iac-provider plan (demo)"
            provider: "stub-iac-provider"
      - name: deny-commit
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required for commit"

  # ── secrets metadata (read-only) ───────────────────────────────────────────
  # Returns metadata only; values are never echoed.

  infra-secrets-list:
    trigger:
      type: http
      config:
        path: /api/infra/secrets
        method: GET
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            secrets:
              - name: STUB_IAC_PROVIDER_API_KEY
                description: "API key for stub IaC provider"
                required: true
                configured: false
              - name: STUB_IAC_PROVIDER_REGION_ACCESS
                description: "Region access token for stub IaC provider"
                required: false
                configured: false
            metadata_only: true

  # ── SPA-compatible catalog endpoint: /api/infra/providers/{provider}/catalog ─
  #
  # The infra admin SPA (ResourceList.tsx) calls GET /api/infra/providers/{provider}/catalog
  # to populate the region and resource-type dropdowns.  The SPA doesn't send
  # Authorization headers; catalog is read-only metadata, so this route is
  # intentionally unauthenticated for the demo.
  #
  # Note: the SPA also calls GET /api/infra/resources in the same Promise.all;
  # the infra-list pipeline handles that route (no auth guard to allow the SPA
  # to fetch resources for the dropdown context without auth headers).

  infra-spa-catalog:
    trigger:
      type: http
      config:
        path: /api/infra/providers/{provider}/catalog
        method: GET
    steps:
      - name: catalog
        type: step.iac_provider_catalog
        config:
          provider: stub-iac-provider
      # Transform types from [{resource_type: "stub.database", ...}] → ["stub.database", ...]
      # so the SPA receives the string[] shape it expects (types.ts: types: string[]).
      # Use steps.catalog.types path (step output namespace) to resolve the array.
      - name: transform-types
        type: step.jq
        config:
          input_from: steps.catalog.types
          expression: "[.[] | .resource_type]"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            provider: { _from: "steps.catalog.provider" }
            regions: { _from: "steps.catalog.regions" }
            types: { _from: "steps.transform-types.result" }
            source: { _from: "steps.catalog.source" }

  infra-secrets-declare:
    trigger:
      type: http
      config:
        path: /api/infra/secrets
        method: POST
    steps:
      - name: parse-auth
        type: step.request_parse
        config:
          parse_headers: [Authorization]
      - name: authenticate
        type: step.auth_validate
        config:
          auth_module: auth
          token_source: steps.parse-auth.headers.Authorization
          subject_field: subject
      - name: rbac-check
        type: step.conditional
        config:
          field: 'steps.authenticate.subject'
          routes:
            operator: respond-declared
          default: deny-secrets
      - name: respond-declared
        type: step.json_response
        config:
          status: 200
          body:
            declared: true
            metadata_only: true
            message: "Secret declaration registered (value not stored in response)"
      - name: deny-secrets
        type: step.json_response
        config:
          status: 403
          body:
            error: "forbidden: operator role required to declare secrets"
