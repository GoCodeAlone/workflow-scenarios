name: Data Pipeline
id: "08-data-pipeline"
category: A
description: |
  A data processing pipeline using the workflow engine with the bento
  stream processing plugin. Ingests data via HTTP, processes it through
  Bento's Bloblang transform engine, stores results in SQLite, and
  publishes events to the internal messaging broker.
components:
  - workflow (engine)
  - workflow-plugin-bento
  - SQLite (storage)
  - InMemory broker (messaging)
status: testable
notes: |
  Uses workflow-server-bento:local image which bundles the bento plugin
  binary. The bento plugin provides step.bento for Bloblang transforms.
  Trigger support (bento trigger type) is disabled pending a fix in the
  external plugin adapter's TriggerFactory implementation.

  Key fixes applied during scenario development:
  - plugin.json must use flat arrays (not object) for moduleTypes/stepTypes
  - Binary must import components/pure to register mapping/bloblang processors
  - TriggerTypes() returns empty to avoid broken TriggerFactory registration
  - -data-dir /data flag baked into Dockerfile CMD to find plugin at startup
