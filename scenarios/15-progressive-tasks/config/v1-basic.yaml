# ============================================================
# Scenario 15 — Phase 1: Basic Task CRUD
#
# Simple task management: create, list, get, update, delete.
# No auth, no categories. Establishes the baseline data that
# must survive the Phase 2 and Phase 3 upgrades.
# ============================================================

modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: db
    type: storage.sqlite
    config:
      dbPath: "/data/tasks.db"
      maxConnections: 5
      walMode: true

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  # ----------------------------------------------------------------
  # Health
  # ----------------------------------------------------------------
  health:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "15-progressive-tasks"
            phase: "v1-basic"

  # ----------------------------------------------------------------
  # Internal — idempotent schema init
  # ----------------------------------------------------------------
  init-db:
    trigger:
      type: http
      config:
        path: /internal/init-db
        method: POST
    steps:
      - name: create-tasks-table
        type: step.db_exec
        config:
          database: db
          query: |
            CREATE TABLE IF NOT EXISTS tasks (
              id          INTEGER PRIMARY KEY AUTOINCREMENT,
              title       TEXT    NOT NULL,
              description TEXT    DEFAULT '',
              status      TEXT    NOT NULL DEFAULT 'open',
              created_at  TEXT    NOT NULL DEFAULT (datetime('now')),
              updated_at  TEXT    NOT NULL DEFAULT (datetime('now'))
            )
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            message: "v1 schema initialised"

  # ----------------------------------------------------------------
  # Tasks CRUD
  # ----------------------------------------------------------------
  task-create:
    trigger:
      type: http
      config:
        path: /api/v1/tasks
        method: POST
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: validate
        type: step.validate
        config:
          strategy: required_fields
          required_fields: [title]
          source: "steps.parse-body.body"
      - name: insert
        type: step.db_exec
        config:
          database: db
          query: |
            INSERT INTO tasks (title, description, status)
            VALUES (?, ?, 'open')
          params:
            - "{{ .body.title }}"
            - "{{ .body.description }}"
      - name: fetch-created
        type: step.db_query
        config:
          database: db
          query: "SELECT id, title, description, status, created_at FROM tasks WHERE id = last_insert_rowid()"
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 201
          body_from: "steps.fetch-created.row"

  task-list:
    trigger:
      type: http
      config:
        path: /api/v1/tasks
        method: GET
    steps:
      - name: get-tasks
        type: step.db_query
        config:
          database: db
          query: "SELECT id, title, description, status, created_at, updated_at FROM tasks ORDER BY created_at DESC LIMIT 100"
          mode: list
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.get-tasks.rows"

  task-get:
    trigger:
      type: http
      config:
        path: /api/v1/tasks/{id}
        method: GET
    steps:
      - name: fetch
        type: step.db_query
        config:
          database: db
          query: "SELECT id, title, description, status, created_at, updated_at FROM tasks WHERE id = ?"
          params:
            - "{{ .id }}"
          mode: single
      - name: check-exists
        type: step.conditional
        config:
          field: steps.fetch.row.id
          routes:
            "": not-found
          default: respond-task
      - name: not-found
        type: step.json_response
        config:
          status: 404
          body:
            error: task not found
      - name: respond-task
        type: step.json_response
        config:
          status: 200
          body_from: "steps.fetch.row"

  task-update:
    trigger:
      type: http
      config:
        path: /api/v1/tasks/{id}
        method: PUT
    steps:
      - name: parse-body
        type: step.request_parse
        config:
          parse_body: true
      - name: update
        type: step.db_exec
        config:
          database: db
          query: |
            UPDATE tasks
            SET title       = COALESCE(?, title),
                description = COALESCE(?, description),
                status      = COALESCE(?, status),
                updated_at  = datetime('now')
            WHERE id = ?
          params:
            - "{{ .body.title }}"
            - "{{ .body.description }}"
            - "{{ .body.status }}"
            - "{{ .id }}"
      - name: fetch-updated
        type: step.db_query
        config:
          database: db
          query: "SELECT id, title, description, status, updated_at FROM tasks WHERE id = ?"
          params:
            - "{{ .id }}"
          mode: single
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "steps.fetch-updated.row"

  task-delete:
    trigger:
      type: http
      config:
        path: /api/v1/tasks/{id}
        method: DELETE
    steps:
      - name: delete
        type: step.db_exec
        config:
          database: db
          query: "DELETE FROM tasks WHERE id = ?"
          params:
            - "{{ .id }}"
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            message: task deleted
