# ============================================================
# Scenario 16 — Phase 2: Add State Machine
#
# Extends Phase 1 with the order lifecycle state machine:
#   pending → paid → shipped → delivered
#   cancel: pending/paid → cancelled
#
# A state_transitions log table is added alongside the
# existing orders table (IF NOT EXISTS preserves data).
# Phase 1 orders remain in 'pending' state and can be paid.
# ============================================================

modules:
    - name: server
      type: http.server
      config:
        address: ":8080"
    - name: router
      type: http.router
      dependsOn: [server]
    - name: db
      type: storage.sqlite
      config:
        dbPath: "/data/orders.db"
        maxConnections: 5
        walMode: true
workflows:
    http:
        router: router
        server: server
        routes: []
pipelines:
    # ----------------------------------------------------------------
    # Health
    # ----------------------------------------------------------------
    health:
        trigger:
            type: http
            config:
                path: /healthz
                method: GET
        steps:
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    scenario: "16-progressive-orders"
                    phase: "v2-state-machine"
    # ----------------------------------------------------------------
    # Internal — idempotent schema init (v2)
    # ----------------------------------------------------------------
    init-db:
        trigger:
            type: http
            config:
                path: /internal/init-db
                method: POST
        steps:
            - name: create_orders_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS orders (
                      id           TEXT    PRIMARY KEY,
                      customer_email TEXT  NOT NULL,
                      items        TEXT    NOT NULL,
                      total        REAL    DEFAULT 0,
                      status       TEXT    NOT NULL DEFAULT 'pending',
                      created_at   TEXT    NOT NULL DEFAULT (datetime('now')),
                      updated_at   TEXT    NOT NULL DEFAULT (datetime('now'))
                    )
            - name: create_transitions_table
              type: step.db_exec
              config:
                database: db
                query: |
                    CREATE TABLE IF NOT EXISTS state_transitions (
                      id         INTEGER PRIMARY KEY AUTOINCREMENT,
                      order_id   TEXT    NOT NULL,
                      from_state TEXT,
                      to_state   TEXT    NOT NULL,
                      reason     TEXT,
                      created_at TEXT    NOT NULL DEFAULT (datetime('now'))
                    )
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    status: ok
                    message: "v2 schema initialised"
    # ----------------------------------------------------------------
    # Orders — existing CRUD
    # ----------------------------------------------------------------
    create-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders
                method: POST
        steps:
            - name: parse_body
              type: step.request_parse
              config:
                parse_body: true
            - name: validate
              type: step.validate
              config:
                strategy: required_fields
                required_fields: [customer_email, items]
                source: "steps.parse_body.body"
            - name: gen_id
              type: step.set
              config:
                values:
                    order_id: "order-{{ uuidv4 }}"
            - name: insert
              type: step.db_exec
              config:
                database: db
                query: |
                    INSERT INTO orders (id, customer_email, items, total, status)
                    VALUES (?, ?, ?, ?, 'pending')
                params:
                    - "{{ .order_id }}"
                    - "{{ .body.customer_email }}"
                    - "{{ json .body.items }}"
                    - "{{ .body.total }}"
            - name: log_created
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO state_transitions (order_id, from_state, to_state, reason) VALUES (?, NULL, 'pending', 'Order created')"
                params:
                    - "{{ .order_id }}"
            - name: respond
              type: step.json_response
              config:
                status: 201
                body:
                    id: "{{ .order_id }}"
                    status: pending
                    customer_email: "{{ .body.customer_email }}"
                    message: order created
    list-orders:
        trigger:
            type: http
            config:
                path: /api/v1/orders
                method: GET
        steps:
            - name: get_orders
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_email, total, status, created_at, updated_at FROM orders ORDER BY created_at DESC LIMIT 100"
                mode: list
            - name: respond
              type: step.json_response
              config:
                status: 200
                body_from: "steps.get_orders.rows"
    get-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}
                method: GET
        steps:
            - name: fetch
              type: step.db_query
              config:
                database: db
                query: "SELECT id, customer_email, items, total, status, created_at, updated_at FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_exists
              type: step.conditional
              config:
                field: steps.fetch.row.id
                routes:
                    "": not_found
                default: respond_order
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: respond_order
              type: step.json_response
              config:
                status: 200
                body_from: "steps.fetch.row"
    # ----------------------------------------------------------------
    # State machine transitions
    # ----------------------------------------------------------------
    pay-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/pay
                method: POST
        steps:
            - name: fetch
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch.row.status
                routes:
                    pending: do_pay
                    paid: already_paid
                    shipped: invalid_state
                    delivered: invalid_state
                    cancelled: invalid_state
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: already_paid
              type: step.json_response
              config:
                status: 409
                body:
                    error: order already paid
            - name: invalid_state
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot pay order in current state
            - name: do_pay
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET status = 'paid', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_pay
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO state_transitions (order_id, from_state, to_state, reason) VALUES (?, 'pending', 'paid', 'Payment received')"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: paid
                    message: order paid
    ship-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/ship
                method: POST
        steps:
            - name: fetch
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch.row.status
                routes:
                    paid: do_ship
                    pending: not_paid
                    shipped: already_shipped
                    delivered: invalid_state
                    cancelled: invalid_state
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: not_paid
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot ship unpaid order
            - name: already_shipped
              type: step.json_response
              config:
                status: 409
                body:
                    error: order already shipped
            - name: invalid_state
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot ship order in current state
            - name: do_ship
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET status = 'shipped', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_ship
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO state_transitions (order_id, from_state, to_state, reason) VALUES (?, 'paid', 'shipped', 'Shipment dispatched')"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: shipped
                    message: order shipped
    deliver-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/deliver
                method: POST
        steps:
            - name: fetch
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch.row.status
                routes:
                    shipped: do_deliver
                    pending: invalid_state
                    paid: invalid_state
                    delivered: already_delivered
                    cancelled: invalid_state
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: already_delivered
              type: step.json_response
              config:
                status: 409
                body:
                    error: order already delivered
            - name: invalid_state
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot deliver order in current state
            - name: do_deliver
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET status = 'delivered', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_deliver
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO state_transitions (order_id, from_state, to_state, reason) VALUES (?, 'shipped', 'delivered', 'Delivered to customer')"
                params:
                    - "{{ .id }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: delivered
                    message: order delivered
    cancel-order:
        trigger:
            type: http
            config:
                path: /api/v1/orders/{id}/cancel
                method: POST
        steps:
            - name: fetch
              type: step.db_query
              config:
                database: db
                query: "SELECT id, status FROM orders WHERE id = ?"
                params:
                    - "{{ .id }}"
                mode: single
            - name: check_state
              type: step.conditional
              config:
                field: steps.fetch.row.status
                routes:
                    pending: do_cancel
                    paid: do_cancel
                    shipped: cannot_cancel
                    delivered: cannot_cancel
                    cancelled: already_cancelled
                default: not_found
            - name: not_found
              type: step.json_response
              config:
                status: 404
                body:
                    error: order not found
            - name: cannot_cancel
              type: step.json_response
              config:
                status: 422
                body:
                    error: cannot cancel order that has already shipped
            - name: already_cancelled
              type: step.json_response
              config:
                status: 409
                body:
                    error: order already cancelled
            - name: do_cancel
              type: step.db_exec
              config:
                database: db
                query: "UPDATE orders SET status = 'cancelled', updated_at = datetime('now') WHERE id = ?"
                params:
                    - "{{ .id }}"
            - name: log_cancel
              type: step.db_exec
              config:
                database: db
                query: "INSERT INTO state_transitions (order_id, from_state, to_state, reason) VALUES (?, ?, 'cancelled', 'Customer cancelled')"
                params:
                    - "{{ .id }}"
                    - "{{ index .steps \"fetch\" \"row\" \"status\" }}"
            - name: respond
              type: step.json_response
              config:
                status: 200
                body:
                    id: "{{ .id }}"
                    status: cancelled
                    message: order cancelled
