apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-52
  namespace: wf-scenario-52
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-52
  template:
    metadata:
      labels:
        app: scenario-52
    spec:
      containers:
        - name: workflow
          image: workflow-server-monday:local
          imagePullPolicy: Never
          args: ["-config", "/config/app.yaml", "-data-dir", "/data"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
        - name: mock-monday
          image: mock-monday:local
          imagePullPolicy: Never
          env:
            - name: MOCK_PORT
              value: "19052"
          ports:
            - containerPort: 19052
      volumes:
        - name: config
          configMap:
            name: app
