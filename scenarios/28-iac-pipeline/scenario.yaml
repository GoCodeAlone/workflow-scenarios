name: IaC Pipeline
id: "28-iac-pipeline"
category: C
description: |
  Demonstrates the IaC state backend (iac.state module) and generic IaC pipeline
  steps (step.iac_plan, step.iac_apply, step.iac_status, step.iac_destroy,
  step.iac_drift_detect).

  The test starts a real Workflow server from the scenario app config and drives
  lifecycle operations through HTTP pipelines. Infrastructure state is tracked by
  the iac.state module using the filesystem backend; the runner supplies a
  temporary state directory through config environment expansion. The platform
  provider is platform.kubernetes (kind backend), so no real cluster is created
  — all state transitions happen in memory/on disk.

  This scenario validates the full IaC lifecycle:
    plan → verify planned → apply → verify active → status → drift detect → destroy → verify destroyed
components:
  - workflow (engine)
  - cloud plugin (cloud.account)
  - platform plugin (platform.kubernetes, iac.state, iac pipeline steps)
status: testable
