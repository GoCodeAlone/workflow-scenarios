# ============================================================
# Scenario 85 — Self-Improving API: Agent + Guardrails Config
#
# Architecture: The agent step IS the iteration loop. It uses
# MCP tools + file tools + git tools internally to inspect,
# propose, validate, write, and commit changes. Pipeline steps
# after the agent handle the deployment gate.
# ============================================================

modules:
  - name: ratchet-db
    type: storage.sqlite
    config:
      dbPath: /data/agent-state.db
      walMode: true

  - name: ratchet-tool-policy-engine
    type: ratchet.tool_policy_engine
    config:
      default_policy: allow

  - name: server
    type: http.server
    config:
      address: ":8081"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: ratchet-ai
    type: agent.provider
    config:
      provider: ollama
      model: gemma4:e2b
      base_url: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      max_tokens: 8192
      context_window: 16384

  - name: guardrails
    type: agent.guardrails
    config:
      defaults:
        enable_self_improvement: true
        enable_iac_modification: false
        require_human_approval: false
        require_diff_review: true
        max_iterations_per_cycle: 5
        deploy_strategy: hot_reload
        allowed_tools:
          - "mcp:wfctl:*"
          - "mcp_wfctl__*"
          - "mcp:wfctl:validate_config"
          - "mcp:lsp:*"
          - "mcp:lsp:diagnose"
          - "file_read"
          - "file_write"
          - "file_list"
          - "git_status"
          - "git_commit"
          - "web_fetch"
          - "shell_exec"
        command_policy:
          mode: allowlist
          allowed_commands:
            - "go build"
            - "go test"
            - "wfctl"
            - "curl"
          enable_static_analysis: true
          block_pipe_to_shell: true
          block_script_execution: true
      immutable_sections:
        - path: "modules.guardrails"
          override: challenge_token
      override:
        mechanism: challenge_token
        admin_secret_env: "WFCTL_ADMIN_SECRET"

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  self_improvement_loop:
    trigger:
      type: http
      config:
        path: /improve
        method: POST
    steps:
      # Step 1: Set context — inject config path and provider alias
      # into pipeline data so the agent step resolves correctly.
      # Step 1: Set context — inject config path, provider alias, system prompt,
      # and task description into pipeline data so the agent step reads them.
      # NOTE: step.agent_execute reads system_prompt and task from pipeline data
      # (pc.Current), NOT from the step config block.
      - name: set_context
        type: step.set
        config:
          values:
            config_path: "${CONFIG_PATH}"
            base_app_url: "${BASE_APP_URL}"
            provider: ratchet-ai
            system_prompt: |
              You are an autonomous workflow configuration improvement agent.

              TOOLS (call by EXACT name, one at a time):
              | Tool | Description | Required Args |
              |------|-------------|---------------|
              | file_read | Read a file | {"path": "/data/config/app.yaml"} |
              | file_write | Write a file | {"path": "/data/config/app.yaml", "content": "full yaml here"} |
              | mcp_wfctl__validate_config | Validate YAML config | {"yaml_content": "full yaml here"} |
              | mcp_wfctl__inspect_config | Inspect config structure | {"yaml_content": "full yaml here"} |
              | mcp_wfctl__list_step_types | List available step types | {} |
              | mcp_wfctl__get_step_schema | Get schema for a step type | {"step_type": "step.db_query"} |
              | git_commit | Commit changes to git | {"message": "feat: ...", "paths": ["/data/config/app.yaml"]} |
              | web_fetch | Fetch a URL | {"url": "http://..."} |

              RULES:
              1. Call ONE tool at a time. Wait for the result before calling the next tool.
              2. Use EXACT tool names from the table above.
              3. The config file is at: ${CONFIG_PATH}
              4. After file_read returns content, use that actual content in all subsequent calls.
              5. Never write placeholder text like <content> or <yaml> — always use real content.
              6. YAML rules: http.server uses address not port; db steps use database not module; params not args; mode is list/single; response type is step.json_response.
            task: |
              Step 1: Call file_read with {"path": "${CONFIG_PATH}"} to read the current config.
              Step 2: Add a search_tasks pipeline (GET /tasks/search, step.db_query, database:db, mode:list, query: SELECT id,title,status FROM tasks WHERE title LIKE :q).
              Step 3: Call mcp_wfctl__validate_config with {"yaml_content": <the full modified YAML from step 2>}.
              Step 4: If validation passes, call file_write with {"path": "${CONFIG_PATH}", "content": <the same full YAML from step 3>}.
              Step 5: Call git_commit with {"message": "feat: add search_tasks endpoint", "paths": ["${CONFIG_PATH}"]}.
              Use the actual YAML content — never use placeholder text.

      # Step 2: The agent IS the loop. system_prompt and task come from pipeline data above.
      - name: designer
        type: step.agent_execute
        config:
          provider_service: ratchet-ai
          max_iterations: 20
          parallel_tool_calls: false
          context:
            compaction_threshold: 0.80

      # Step 3: Map agent output for downstream steps
      - name: map_output
        type: step.set
        config:
          values:
            proposed_yaml: "${ steps.designer.result }"

      # Step 4: Post design artifact to blackboard for audit
      - name: post_design
        type: step.blackboard_post
        config:
          phase: design
          artifact_type: config_proposal

      # Step 5: Validate the proposed config (deployment gate)
      - name: validate
        type: step.self_improve_validate
        config:
          validation_level: strict
          require_zero_errors: true

      # Step 6: Generate diff for audit trail
      - name: diff
        type: step.self_improve_diff
        config:
          force: true
          output_to_blackboard: true

      # Step 7: Deploy (hot reload — write config, signal watcher)
      - name: deploy
        type: step.self_improve_deploy
        config:
          strategy: hot_reload
          config_path: /data/config/app.yaml

  health_check:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: healthy
            scenario: "85-self-improving-api"
            component: agent
