name: Multi-Cloud Accounts — GCP and Azure Credentials
id: "35-multi-cloud-accounts"
category: infrastructure
description: |
  Demonstrates cloud.account with AWS (mock), GCP (service_account_key), and Azure
  (client_credentials) providers through a real Workflow application boundary.
  The app exposes list, validate, and account-detail HTTP APIs; callers select
  the account to validate at runtime, and the Workflow pipeline resolves that
  account through step.cloud_validate.
  No real cloud credentials required; all values are mock or inline test values.

  Endpoints:
    POST /api/v1/cloud/validate            — validate a named account's credentials
    GET  /api/v1/cloud/accounts           — list all configured accounts
    GET  /api/v1/cloud/accounts/{name}    — get account details + validation result
    GET  /healthz                         — health check

components:
  - workflow (engine)
  - cloud.account module (aws mock, gcp service_account_key, azure client_credentials)
  - step.cloud_validate pipeline step

tags:
  - cloud
  - infrastructure
  - credentials
  - gcp
  - azure
  - multi-cloud
  - iac

status: pending
notes: |
  Local proof: test/run.sh starts workflow-server, discovers account names from
  the list API, validates mock/GCP/Azure accounts through caller-selected request
  bodies and path parameters, and checks that responses do not expose credential
  material.
  Server listens on 18135.
  AWS-style coverage uses the mock provider.
  GCP uses an inline service_account_key (fake JSON key).
  Azure uses client_credentials with static values.
  No real cloud connectivity is attempted.
