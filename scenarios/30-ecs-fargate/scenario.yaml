name: ECS Fargate
id: "30-ecs-fargate"
category: C
description: |
  Demonstrates an AWS ECS/Fargate-style container service via the external
  workflow-plugin-aws provider in local mock mode.
  Exposes plan/apply/status/destroy operations via HTTP pipelines backed by
  typed step.iac_provider_plan/apply/list/destroy operations over a named
  infra.container_service app resource.
  Uses iac.provider + infra.container_service through Workflow's plugin host
  so provider-specific SDKs stay in plugins rather than workflow core.
components:
  - workflow (engine)
  - workflow-plugin-aws external plugin (iac.provider mock mode)
  - workflow typed IaC provider steps
status: testable
