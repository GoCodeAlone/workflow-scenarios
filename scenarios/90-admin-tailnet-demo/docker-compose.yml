services:
  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: scenario90-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 2s
      timeout: 2s
      retries: 30

  app:
    image: ${IMAGE_TAG:-workflow-admin:scenario-90}
    container_name: workflow-admin-tailnet-demo
    command: ["-data-dir", "/data", "-config", "/data/app.yaml"]
    environment:
      WFCTL_PLUGIN_DIR: /data/plugins
      JWT_SECRET: scenario-90-local-demo-secret-32-bytes-minimum
    ports:
      - "127.0.0.1:18080:8080"
    depends_on:
      vault:
        condition: service_healthy

  tailscale:
    image: tailscale/tailscale:stable
    container_name: workflow-admin-tailnet-demo-ts
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: workflow-admin-demo
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    command: >
      sh -c '
        tailscaled --state=$$TS_STATE_DIR/tailscaled.state &
        sleep 2
        if tailscale status >/dev/null 2>&1; then
          echo "tailscale sidecar using existing state"
        elif [ -n "$$TS_AUTHKEY" ]; then
          tailscale up --authkey=$$TS_AUTHKEY --hostname=$$TS_HOSTNAME
        else
          echo "TS_AUTHKEY not set and no reusable state; sidecar idle"
          wait
        fi
        tailscale serve --bg --http=80 http://app:8080 || true
        wait
      '
    depends_on:
      - app

volumes:
  tailscale-state:
