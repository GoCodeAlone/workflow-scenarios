name: DigitalOcean Cloud Provider
id: "42-digitalocean"
category: C
description: |
  Demonstrates DigitalOcean as an IaC provider through workflow-plugin-digitalocean.
  Covers five generic IaC modules:
    - infra.k8s_cluster: DigitalOcean Kubernetes (DOKS) cluster lifecycle
    - infra.vpc: VPC management
    - infra.firewall: firewall management
    - infra.dns: domain and DNS record management
    - infra.container_service: App Platform deployment

  Provider-specific SDKs live in the plugin. The scenario config uses
  iac.provider and generic step.iac_* lifecycle steps.

components:
  - workflow (engine)
  - workflow-plugin-digitalocean (iac.provider, infra.* resources)
  - workflow IaC steps (step.iac_apply/status/destroy)
status: testable

modules:
  iac.provider:
    provider: digitalocean
    region: nyc3
    credentials: env

  infra.k8s_cluster:
    cluster_name: staging-k8s
    region: nyc3
    version: "1.29.1-do.0"
    node_pool:
      name: default
      size: s-2vcpu-2gb
      count: 3
      auto_scale: true
      min_nodes: 1
      max_nodes: 5

  infra.vpc:
    provider: do-provider
    name: staging-vpc
    region: nyc3
    cidr: "10.20.0.0/16"

  infra.firewall:
    provider: do-provider
    vpc: do-vpc
    firewalls:
      - name: allow-web
        inbound_rules:
          - protocol: tcp
            port_range: "80"
            sources: "0.0.0.0/0"
          - protocol: tcp
            port_range: "443"
            sources: "0.0.0.0/0"

  infra.dns:
    provider: do-provider
    domain: staging.example.com
    records:
      - name: api
        type: A
        data: "10.0.0.100"
        ttl: 300
      - name: www
        type: CNAME
        data: staging.example.com
        ttl: 3600

  infra.container_service:
    provider: do-provider
    name: my-api
    region: nyc
    image: "registry.example.com/my-api:v1.0.0"
    replicas: 2
    http_port: 8080
    envs:
      APP_ENV: production
      PORT: "8080"

pipelines:
  do-deploy:
    steps:
      - type: step.iac_apply
        config:
          platform: do-app
          resource_id: do-app

  do-status:
    steps:
      - type: step.iac_status
        config:
          platform: do-app
          resource_id: do-app

  do-scale:
    steps:
      - type: step.iac_apply
        config:
          platform: do-app
          resource_id: do-app
          desired_replicas: 4

  do-destroy:
    steps:
      - type: step.iac_destroy
        config:
          platform: do-app
          resource_id: do-app
