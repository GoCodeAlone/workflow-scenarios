modules:
  - name: server
    type: http.server
    config:
      address: ":8080"

  - name: router
    type: http.router
    dependsOn: [server]

  - name: aws-mock
    type: cloud.account
    config:
      provider: mock
      region: us-east-1

  - name: prod-cluster
    type: platform.kubernetes
    dependsOn: [aws-mock]
    config:
      account: aws-mock
      type: kind
      version: "1.29"
      nodeGroups:
        - name: default
          instanceType: t3.medium
          min: 2
          max: 5

  - name: webapp
    type: app.container
    dependsOn: [prod-cluster]
    config:
      environment: prod-cluster
      image: nginx:1.25
      replicas: 2
      ports: [8080]
      cpu: "500m"
      memory: "256Mi"
      health_path: /healthz
      env:
        APP_ENV: production
        LOG_LEVEL: info

workflows:
  http:
    router: router
    server: server
    routes: []

pipelines:
  healthz:
    trigger:
      type: http
      config:
        path: /healthz
        method: GET
    steps:
      - name: respond
        type: step.json_response
        config:
          status: 200
          body:
            status: ok
            scenario: "34-app-container"

  app-deploy:
    trigger:
      type: http
      config:
        path: /api/v1/app/deploy
        method: POST
    steps:
      - name: deploy
        type: step.app_deploy
        config:
          app: webapp
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  app-status:
    trigger:
      type: http
      config:
        path: /api/v1/app/status
        method: GET
    steps:
      - name: status
        type: step.app_status
        config:
          app: webapp
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."

  app-rollback:
    trigger:
      type: http
      config:
        path: /api/v1/app/rollback
        method: POST
    steps:
      - name: rollback
        type: step.app_rollback
        config:
          app: webapp
      - name: respond
        type: step.json_response
        config:
          status: 200
          body_from: "."
